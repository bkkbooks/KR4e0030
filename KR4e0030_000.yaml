body:
  text: 髙太史扣舷集附後學周立編集念奴嬌自述策勳萬里笑書生骨相有誰曽許壯志平生還自負羞比紛紛兒女酒發雄談劍增竒氣詩吐驚人語風雲無便未容黃鵠輕舉何事匹馬塵埃東西南北十載猶羈旅只恐陳登容易笑負却故園雞黍笛裏關山樽前日月回首空凝佇吾今未老不須清淚如雨踈簾淡月秋柳殘結恨結是弱舞𥘉闌困眠才歇緑少黃多錯認早春時莭西風也送誰離别斷長條似人攀折謾思曽見燕邊分翠馬頭吹雪君莫問陏宫漠闕總寒煙細雨曉風殘月不帶流鶯却帶斷蟬悲咽老來腸緒應愁絶江南橫管吹切莫欺憔悴明年依舊萬隂成列石州慢春思落了􅉝夷風雨頓催庭院瀟灑春來長恁樂章懶按酒籌慵把辭鶯謝燕十年夢斷青樓情隨柳絮猶縈惹難覔舊知音把琴心重寫妖冶憶曽携手鬪草闌邊買花簾下看鹿盧低轉秋千髙打如今何處捴有團扇輕衫與誰更走章臺馬回首暮山青又離愁來也眉撫夫差女瓊姬墓悵紅蘭採罷白苧歌殘魂斷舊宫路長夜泉臺冷再誰把雲屏月帳遮護鈿車不度正館娃荆棘多露想還有舊日吹簫侶共來往煙霧城郭江山如故自國亡家破今幾朝暮水邊花下黃昏後誰逢環珮微步恨多莫訴任玉叉雙燕埋土待相約吳娃寒食到此澆墓水龍吟晝紅竹淇園丹鳳飛來幾時留得參差冀簫聲吹斷彩雲忽墮碧雲猶膈想是湘靈淚彈多處血痕都積看蕭踈瘦影隔簾欲動應似落花狼籍莫道清髙也俗再相逢子猷還惜此君未老歲寒猶有少年顔色誰把珊瑚和煙換去琅玕千尺細看來不是天工却是那春風筆天仙子懷舊憶共當年逰冶伴愛聽秦娥青玉案瑣窗春曉酒𥘉醒鶯也喚人也喚不問誰家花惜看舊事那知回首換畫舫空間楊柳岸相思日暮隔梁園山一半水一半望眼别腸齊欲斷一剪梅間居竹門茅屋槿籬笆道似田家又似山家敞披鶴袖岸烏紗看過黃花待看梅花晚時飲酒早時茶風也由他雨也由他從來不會治生涯誰與些些天與些些玉漏遲夕陽無限好憑闌却怨昏鴉歸早一片寒煙鎖㝎幾家臺沼料想青山笑我自亂後逰􅍡不到憔悴了將軍故柳王孫芳草寂寞椘舞吳歌歎轉眼前歡水空雲杳試問天涯故人近來應老只為微知世故比别箇倍添煩惱須信道人生稱心時少多麗弔七姫倩嫦娥呼天試問如何向人間生成尤物等間又把消磨揉群花亂飄塵土毀聮璧碎擲煙波謾説無雙傾城曾數八人少箇六人多一般樣細腰梟裊髙髻峩峩奈干戈筵上艷曲忽翻做帳中歌忍教受項纒素帛渾忘記臂結紅羅翠𬒳都間玉鈿盡落魂逰應去馬嵬坡誰能發香裀解看怕肉尚溫和堪腸斷空樓月落廢院春過謁金門渡江風怗怗江與暮天相接欲鬪白鷗飛得捷兩童搖兩楫試解祫羅香摺秋似緑荷先怯收拾詩愁都在篋比山多幾疊倦尋芳曉雞喚回好夢呼起間愁何處咿喔呌得霜飛早似戍樓梅角征鐸車前都巳動朝衣燈下應𥘉著最匆匆念帳中驚聽送郎行却問何事不能緘口催得人間許多離索我厭功名怕候曉關開鑰但戀五更衾枕暖不知千里程途惡且髙眠任窗月被他啼落太常引丁校理邀觀妓失期不赴幾時相約畫樓中同賞小枝紅尊酒太匆匆剛少個風流醉翁歌聲巳逺夢魂𥘉斷無分見春風不見尚愁濃若見後愁添萬重賀新郎喜徐卿逺訪人事浮雲變為如何忽然而别偶然而見今古這些離合夢多少酒愁詩怨君共我任隨蓬轉當見望窮天際眼却今宵看熟燈前面談笑處兩忘倦淮鄉椘澤知逰遍問江南歸時誰有故家庭院拂了征衫舊塵土再整賞笻吟卷隨處裏山留水戀作個東坡來往友算平生富貴非吾碩舉此酒祝長健昭君怨催梅試問南枝何故未肯將春全露意欲吐些香且啇量雖是花中最早更放早開尤好火急報花知要題詩沁園春寄內兄周思誼憶昔𥘉逢意氣相期一何壯哉擬獻三千牘呌開漢關躡一雙蹻走上燕臺我勸君酬君歌我舞天地踈狂兩秀才驚回首謾十年風月四海塵埃摩挲舊劍生苔歎同掩衡門盡草萊視黃金百鎰巳隨手去素絲幾縷欲上頭來莫厭栖栖但存耿耿淂失區區何足哀心惟碩長對尊中酒滿樹上花開木蘭花慢過城東廢苐正春來夢好春忽去怎留將早月墜筝樓塵生戟户草滿毬場美人盡為黃壤恨溫柔難把作家鄉桃李一番狼籍燕鶯幾許凄涼虛言地久天長回首巳斜陽算只為當年多些歡樂少個思量不見門前繁馬有栖鴉獨占垂楊試問朝來過客誰人肯為悲傷清平樂夜坐新詩吟罷兀坐寒窗下寂寞家中如客舍風雨江南今夜侍兒勸我湥杯好懷恰待舒開叵奈燈前過鴈一聲又送秋來憶秦娥感歎㓛名驟時人笑我真迂繆真迂繆不能進取幾年落後一埸翻䨱難收救布衣惟我還如舊還如舊思量前事是天成就酹江月遣愁問愁何似似掃除不斷無根狂絮應是羈懷難著盡𣪚入江雲江樹夜雨心頭秋風鬢腳總是相尋處重門雖掩幾曽障得他住難學盧女情腸江淹庾信空賦凄涼句偏要相欺間裹客端的此情難恕見月還悲逢花也惱對酒方無慮他來休怕但教能遣他去沁園春鴈水落時來花發時歸一年又年記南樓望信夕陽簾外西窗驚夢夜雨燈前寫月書斜戰霜陳整橫破瀟湘萬里天風吹斷見兩三低去侣落筝絃相呼共宿寒煙想只在蘆花淺水邊恨嗚嗚戍角忽催飛起悠悠漁火長照愁眠隴塞間關江湖冷落莫戀遺糧猶在田須髙舉教弋人空慕雲海茫然行鄉子芙蓉如此紅粧不見春光向菊前蓮後才芳鴈來時莭寒沁羅裳正一畨風一畨雨一畨霜蘭舟不採寂寞橫塘強相依暮柳成行湘江路逺吳苑池荒恨月濛濛人杳杳水茫茫滿江紅客館對雪古硯生氷衾潑水酒醒寒切窗竹裏似風非雨蕭颼騷屑欹枕夜聽孤館靜開門曉看千山潔問人間何處是乾坤無分别茅店外青旗折畫閣上朱簾揭憶少年酥狂偏在探梅時莭深帳酒巵歌宛轉小爐茶碗詩清絶歎如今歲晚客天涯人離别如夢令寒夜蕙火紅銷金鼎鴉樹不驚風靜多事月明來照出小窗孤影宵永宵永鐵做梅花愁冷酹江月送金吾石將軍赴鄧州守虎頭猿臂問立㓛何處風塵邊障身帶寶刀歸宿衛人識金吾名將鐃吹聲中旌旗影裏愼識翠輿行仗周廬直罷建章幾度雞唱君恩特念勳勞鳳銜新誥忽墮丹霄上官在臥龍人隱處看繞郡白雲青嶂莫射雙雕好乘五馬試問野人無恙梅花江路送行何用惆悵卜算子亰師早起窗燈漸漸昏樓鼓頻打不是寒宵不肯明想是鄰雞啞氷生半井泉霜𣪚千家瓦強起披衣逐早朝門外聞珂馬卜算子有懷帶得片情來留下多愁去不繁羅裙帶上詩知向誰家住離程渺渺山别意重重樹須信江東日暮雲自古相思處江神子江上偶見夫容裙􅙳最宜秋柳邊頭自撑舟一道眼波斜共晚波流驀地逢人回首笑不識恨却知羞夕陽猶在水西樓慢歸休欲相留教喝彎彎月子照湖州不怕鴛鴦驚起了怕江上有人愁天仙子秋夜客中炙了青燈𥘉掩帳四壁蛩鳴催旅況瀟瀟索索雨兒來梧葉上栁葉上兩處秋聲愁一樣此夜江雲迷疊嶂好夢欲歸難倚仗巳涼未冷惱人天眠一餉坐一餉白髮明朝應幾丈清平樂春晚看花過了剩得春多少新緑滿園庭院悄鳥啄櫻桃紅小夢隨蝴蝶東家覺來空掩琵琶不見侍兒纎手自籠紗帽煎茶摸魚兒自適近年稍諳時事傍人休笑頭縮賭棊幾局輸嬴注正似世情翻覆思算熟向前去不如退後無羞辱三般撿束莫恃微才莫誇髙論莫趂間追遂雖都道富貴人之所欲天曽付幾多福倘來入手還須做底用看人眉目聊自足見放著有田可種有書堪讀村醪且漉這後段行藏從天發付何須問龜卜水調歌頭謝惠酒晝夢驚起雞呌鬪喈喈是誰扣我門户道是麯生來今日江頭風雨生怕詩人岑寂特地到寒齋一見即傾倒笑口為頻開洗愁空催句就挽春回不憂席帽衝冷便欲去尋梅却笑盧同何苦偶得酪奴相過也擬上蓬萊此味正不淺看我玉山頽鷓鴣天秋懷鼓動江城一鴈秋夕陽山色滿長洲十年舊事都成夢半篋新詩總是愁書咄咄歎休休文君笑典鷫鸘裘不如俠少渾無賴醉殺東家燕子樓髙太史扣舷集終
