front:
  text: 髙太史傳髙啓字季迪吳郡人生元丙子少警頴力學遂工於詩上窺建安下逮開元大曆以後則藐之天資秀敏故其發越特超詣擬鮑謝則似之法李杜則似之庖丁解牛肯綮迎刃千彚萬類規摸同一軌山龍華蟲如其貴也象犀珠玉如其富也秋月氷壷如其清也夏姬王嬙如其麗也田文趙勝如其豪也鳴鶴翔雲如其逸也仍和陶韋大羮元酒之味不間二宋粟布之征所謂前齒古人於曠代後冠來學於當時者矣東吳騷雅士悉推之無慊為文尚氣多辨難攻擊之體讀之亹亹忘倦大抵以先聲掩其兼美張士誠有浙右時羣彥多從仕者啓獨挈家依外舅周仲達居吳淞江上歌詠終日以自適焉陪臣饒介之丁仲容輩以詩自豪及見啓為歎服啓尤好權略論事聳人聽故與饒如授左契之交者若王彛揚基杜寅張憲張羽周砥王行宋克徐賁之徒胥不羈贍才爽邁有文談辨華給􅍀然以為天下無人一時武勇多下之眀興以某臣薦偕謝徽等聞於朝與修元史授翰林國史編修官復命教授諸王久之推任喉舌之司待以不次與徽等懇辭乞歸田里制可仍賜金以還復居江上遨逰青丘甫里之墟始號槎軒又號青丘子鋭志亦不少衰矣居幾何忽從故時一二俠入逰于郛適江夏魏觀為郡老而好士延見王彛輩啓嘗會于亰尤禮遇之不得巳亦厠為客復強辭之歸故里殊悒悒不樂遂蹇連以沒年甫三十九嗟乎使啓少延則駸駸入曹劉李杜之壇奚止此哉其詩類藁藏於家未即顯𥘉富啇陳寶生欲為夀諸梓啓不許乃止凡傳録而誦之者無不歆羡必不泯焉余與啓同里知其人為詳故特為傳庶貽不朽云洪武乙卯二月隴西李志光書髙太史鳬藻集序文以理為主而氣以發之理明矣而氣或不充則意雖精辭雖達而萎薾不振之病有所不免蘇文㝎公曰文者氣之所形文不可以學而能氣可以養而至善觀文者觀其氣之所養何如耳唐虞三代之文尚矣自秦而下文莫盛于漢唐宋漢之賈董班馬劉揚唐之李杜韓栁宋之歐蘇曽王之數公者各以文章名家其初豈必追琢絺繪學為如是之言乎其所以寬􅌋宏博汪洋放肆而不可掩者則其浩然之氣所養可知也我太祖髙皇帝龍飛之初鑒近世華靡之弊制誥典册之文一尚淳朴當時在兩制居史館者皆極天下之選而髙先生季迪其一人也先生名啓姑蘇人自少警敏力學弱冠即以詩文鳴于鄉郡張士誠據有浙右屢以禮招之不就避地居吳淞江上以詩文自娛樂洪武初以廷臣薦與修元史授翰林國史院編修官復命教授諸王久之拜户部侍郎以年吵不敢驟膺重任辭歸故鄉益肆力于詩文居數載不幸以故人得罪沒于亰師年甫三十九其詩有缶鳴集有婁江吟藁有姑蘇雜詠皆已久傳于世四方之人莫不知其詩名而獨未見其文也豫來姑蘇訪求于先生之內姪周立得其手抄先生之文曰鳬藻集凡五卷因取而讀之愛其意精而深辭達而暢有溫純典則之風而不流于踈略有謹嚴峻潔之度而不涉于險僻詼洽而非綴緝明白而非淺近不粉􅎖而華彩自呈不追琢而光輝自著蓋由其理明氣昌不求其工而自無不工也讀之不忍釋手自是其集留豫所者十有餘載今年春監察御史錢唐鄭公士昻過豫公館中論及先生之詩而亦以未見其文為慊豫因出是編相示鄭公讀之既卷而歎曰古人論文章謂一代不數人一人不數篇先生沒巳七十年是數篇者幸而尚存豈易得哉是不可以無傳乃屬司訓張素略加校正命長洲縣丞邵盺以公錢刻置郡學且徵豫為之序嗟乎方張士誠據浙右時士大夫之欲苟且貴富者莫不從仕以就陪臣之列先生獨脫然去之而以詩文自娛樂此其浩然之氣所養為何如哉觀于是集從可知矣序而傳之使世之讀是集者非惟知先生于詩文有兼至之長抑使知浩然之氣在天地間不以貴賤夀夭而有所增損也正統九年六月望日正議大夫資治尹工部左侍郎雙崖周忱序
