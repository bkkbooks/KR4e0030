body:
  text: 後學周立編輯雜著十五篇封建親王賀東宫牋監􅀦撫軍乆繫兆民之望建邦作輔大頒同姓之封隆典式脩輿情均慶恭惟皇太子殿下地居震長道合乾剛孝奉兩宫每問安於曉寝友懐諸弟共講學於春坊既膺主鬯之崇復舉分茅之盛本支茂衍宗社奠安某䓁忝預台司敢伸賀悃河如帶山如礪永存萬世之傳日重光月重輪敬上千秋之祝擬唐平蜀露布神筞行營莭度使東川莭度副使臣崇文䓁臣聞天無二日臨四海為一家地有九州分萬􅀖為五服故用建侯藩之重俾扶王室之尊車服出於堯庭篚筐歸於禹貢柔逺䏻迩舞干羽開未格之心取亂侮亡鳴皷鐘討不恭之罪盖以法隂􅃤陽舒之道成文綏武㝎之㓛於是臣軄惟脩君威罔替上稽象緯固昭弧矢之名下制􅀦経可廢甲兵之役伏惟皇帝陛下神凝至道氣禀英姿紹十二世之洪基啓億萬年之昌運憫生民之未乂惻然如傷念祖業之惟艱凛乎若墜却逺方之獻不嘉有瑞罷别庫之蔵以示無􅀻象郡鰐溪流八人而奸邪並黜麟䑓鳳閣命二相而賢俊相􅂛屢降璽書體乾行而布澤大蒐戎輅應月蝕以脩刑冀垣䟦扈之臣觧甲方歸河隴慿陵之虜納琛㑹至而劉闢者性惟狂戇泣在凡卑寔為掌賦之鎻材豈是総戎之偉噐頃囙西川莭度使􅅊臯卒擅留府不受徴書當陛下光臨率土之􅀄大賚多方之始恐生震擾姑務包容授之以北􅊴之旌旄委之以西門之管鑰可謂滌瑕蕩垢荷寵蒙榮不思感悔以酬㤙反肆驕滛而速禍此軍未輯他鎮仍求神奪其聦礪刃拒賔僚之諫天盈其惡􅁬戈驅􅀅士之行始西蜀自縦其鴟張後東川竟遭其獸噬謂偏隅可據謂重險難踰負固偷生欲效李流之逆望風走死不知譙縦之窮陛下乃用旁詢􅀅興薄伐築室匪衆言之惑􅀒扆唯獨㫁之明大衆啓行常朂之以用命小臣受事敢效之以忘身率五營虎衞之師㑹數道鷹楊之􅀅駢脇者盡操闟㦸蓬頭者皆垂縵胡霧合雲屯目蔽旌旗之影波翻瓦振耳聾鉦皷之音六月臣與兵馬使季元奕山南莭度使嚴礪䓁進至鹿頭關東此關旁夾髙山真成臣障阨三軍而莫進詎下井陘立一夫以可當應同劍閣臣䓁猿攀魚貫耻鑿道以潛行鳥突虵蟠􅈳焚廬而􅀡進囙地形而制陣以方以圓察敵􅀔而設竒㦯前㦯後闢不束身以􅈬鑕更舉臂以當轅臣乃仗鉞誓詞援桴率衆一麾而闘心已厲􅄪鼓而銳氣不衰樓煩發射鵰之弓洞胸貫髀佽飛擊斬蛟之劍蹀血横尸疾呼作動地之聲大戰奪漫天之險􅊇不干順知賊旅之方崩弱豈當強喜我軍之累捷欲藉長驅之􅀔遂收淨掃之功九月河東牙􅀅阿跌光顔􅀅兵來㑹其部曲皆羗胡猛士并晉健児蹠劲弩而力透重犀􅀍長鎧而走追奔馬欲贖後期之罪請當前拒之鋒累出傍抄獨行深入遮賊轉輸之路斬賊飛赱之關於是綿江之諸郡皆降成都之􅀌城益急臣乃乗其巳困大合嚴圍皷角􅀄鳴守埤者心皆不固梯衝未設攀堞者身巳先登九却九攻墨子之機安在八陣八克呉公之績乃存其劉闢鹿窮不暇於擇林䑕􅇡尚思於求穴始􅀅出遁漏踈網之髙張終􅀍追擒就長繩之急縛端門受獻即當檻送於宸亰大社行刑不使逃誅於絶域臣巳撫平属境入駐通衢除叛賊􅀅刑此外其染汙者本是良民迫脇者無非叛黨悉加慰撫並用赦原莫不瞻聖日以歌謡􅀍王風而鼓抃脩武侯之政巳罷卒以營農復文翁之規更興儒而舉士大地洒清塵之兩溥降深㤙洪􅈚息鼓浪之風頓消赫怒此盖神謀睿筭天賛竒功使海内知惡臣之易亡識尊威之難抗臣䓁􅄑陪是役􅀗覩斯休不任慶快之至謹奉露布以聞其軍資􅄊械别簿録上擬劉封荅孟達書封白子度􅁕下書教㒒自貳開陳利害甚悉且讀且思􅀼有未諭盖聞利害者賊義之端也人惟諭利而不諭義故有君臣父子之相叛君臣父子之相叛臣者􅀁不忍言而􅁕下之書何以至㒒側邪便焚書止使以告􅅸於􅁕下然恐􅁕下不知主上􅀁以待僕之意而僕􅀁以報主上之心并書中有可復者故勉述蕳牘􅁕下其聽之昔竇嬰與灌夫懐交友之􅀻實同田蚡之禍韓信於髙祖感推食之意卒拒蒯徹之說此前史之羙談而􅁕下􅀁共聞也今㒒於主上軆同血胤名附宗籍至親􅌋㤙固非交友之􅀻也出則捴戎入則居守尊位重禄固非惟食之意也足下視主上􅀁以待僕者如此則㒒􅀁以報主上者其可異於二子乎且父與君有其一皆當致死㒒一身而二責萃焉其􅆀死也亦無疑矣而􅁕下乃以啇種白起孝己伯竒爲㒒之戒是何言之過也夫爲人臣者患忠之不至不思君之不知爲人子者患孝之不純而不患親之不察使不􅄑而爲啇種白起孝已伯竒則亦􅀅􅉂目長逝而無愧矣復何求哉若􅀁謂申生重耳之說又不然晉獻公無道故有是事今主上聖明内無嬖􅄑之人外無䜛慝之士嫡庶有别慈愛不移何可妄相引諭以為誑惑之道邪未後責僕以三事是益見􅁕下之不思矣僕請有辭焉夫古人有以義為父子者何謂非禮知守莭而不變何謂非智見僣偽而不􅀙何謂非義㒒之自䖏亦云得矣若􅀙􅁕下之計而求以為禮為智為義是猶惡寒而去裘畏􅀬而附火不愈甚矣今太子巳正位東宫㒒當長守藩國為王室屏翰若以不肖不得順於君父則􅀅素服詣􅊴藉藁待罪安􅀎棄親事讎􅇡身異國生為棄人死為繆􅄦􅁕下􅀁謂大丈夫恐不如是也況剖符之封㒒􅀁自有廼欲使之舎安而就危去順而􅀙􅊇㒒非病狂何利而為此古人之行一不義而得天下者亦有􅀁不為況尺寸之土哉㒒此心皎然天地神明實共臨鍳􅁕下安䏻侈之若以㒒為愚㦯可以言誘􅂚異以告趍走之人曰而叛而君語孩提之童曰而背而親莫不唾而去之矣僕雖至愚然於君臣父子之義亦嘗聞之矣何至不如趍走之人孩提之童哉於􅃧􅀄漢之陵夷也董卓首亂二􅀽効尤海内無􅀁底定主上􅁬起欲與曹操戮力匡濟以救元元而操亦懐圖中路搆隙故主上一破之於烏林􅄪走之於南鄭而天方佑奸得死袵席今其子丕不思盖前人之愆乃敢隂造符命自製禪文遷易重鼎盗攘神噐有志之士咸耻立於其朝僕嘗􅀗􅀙足下周旋行間􅀼觀􅁕下亦有志者故􅀅共圖於中原報竒遇於吾主而天奪􅁕下之􅅎使自棄於忠義之林北面偽庭為天下咲既不知愧乃復為人作衞律耶今主上憫宗社之顛覆復恐七廟之祀􅈥萬姓失戴故資荆益之饒據岷峨之險正尊號以􅁇大統方􅀅出關隴㝎三輔仗義而東以􅀵復故物􅁕下若䏻慕隋㑹之明陋李陵之暗使不逺而復則富貴寵榮當保如昔倘以斯言未信終忘首丘之念恐鄴下不守以白衣􅀙輿櫬之後得無悔乎此誠知變禍爲福之日幸審度之無忽匡山樵歌引南康宋倬天章向寓呉與余同客臨川公之門朝夕遇焉詩酒唱酬意甚樂也君後南㳺錢塘余亦屏居江渚睽隔者累年一日扁舟而来訪余􅄫寞之濵既相與道舊且出其近􅀁著詩曰匡山樵歌者示余曰匡山吾鄉也先人之丘隴在焉阻兵不歸者乆矣今道路􅄑通顧吾材不遇於世當還桒􅎚之間葺故廬而居之時出吾詩􅀙山農野老負薪而行歌則吾之志而名藁之意也子其為我序之余讀其詩見其詞語精錬音調諧暢有唐人之風盖君近嘗渡浙江上㑹稽厯大末金華諸山入閩關至海由四明而㱕探攪瑰恠有得於江山之助故其詩視舊為益工而余閉門窮愁才思荒落自顧有不及矣且惟昔之詩人多躁薄無檢雖其辭章之華君子固無􅂑焉君令剛介自􅀅不苟進取懷首丘之仁抱遁世之志行固􅁕尚矣况其詩之羙㢤然吾聞五老之陽雲松蒼然太白之髙風在焉君㱕而吟其間益求其工他日筐笥􅀁蔵光氣上燭余恐君終不得􅀮矣審逰贈陸彦達獵志獸漁志魚學志於道理之同然也故獵者必之山林漁者必之江湖而學者必㳺於賢人君子之域盖山林江湖者魚獸之􅀁在也賢人君子之域者道之􅀁在也舎是則無􅀗矣婁江陸氏彦逹有志於道者也而僻居田里無相與薰炙以成其道是猶欲獵而之丘樷欲漁而之溝瀆必無獲有獲亦小耳惡淂􅀁謂麋鹿熊豹鱣鮪魴鯉者㢤余是以嘉其志而惜其不審於㳺也今通都大藩不逺而甚近賢人君子不乏而常多真山林之奥江湖之區也以彦達之才噐孰非􅂅交苟䏻挾禮義之弓操詩書之􅅈而一徃㳺焉吾􅀅賀彦達之有大􅀗而歸矣作審㳺一首以貽之勸農文春雨布澤東作伊始太守躬駕于郊以敦本厚俗之道勸爾民之軄也然不欲廣引舊談姑以今日之事直相告語爾民其敬聽之夫上立法以衛民民出力以供上古今常理也皇上剪除􅁀亂開建太平使尔民得脫鋒鏑操耒耜以安􅅵畒之中又念稼穡之艱每􅀊親耕籍田復召父老廷對宣諭唯恐爾民荒􅇣惰㳺以䧟於罪徳甚􅌋也近者兼并之家不䏻軆上此意㦯肆侵剥使尓民有委棄其業者情雖可矜然􅁿去田里以乏父毋之飬􅊴公上之賦其責亦何􅀁歸㢤故􅂅尓民相告於郷令去者歸居者安脩尓隄防浚尓溝洫力不􅁕則相周噐不偹則相假各勸播植以待有秋毋坐失其時貽後悔也更䏻母作姦母逐末毋好飲博毋事􅋐訟毋弗順於父兄母㦯干於鄕里家給人􅁕禮作義脩以無愧於㤗伯過化之􅀖豈不羙歟太守雖老按堵觀俗以行賞黜尓民宜相與勉焉彀喻自先王之教廢文武異途學者多不習弓矢之事皇上志復古治乃今年五月詔有司取士兼試以射及親祀方丘又戒百執事旅射于齋宫余當預耦進之未先期與二三同列􅀻肄於成均之西圃既設的授弓其強者弯然引滿一發過之􅃌的而詫曰是不􅁕至也其弱者力擴而不盈發則去的逺甚投弓而歎曰吾不䏻至彼也余最後加矢鉤弦盡吾力而挽之僅及半笴發則去的亦及半而墜心甚愧焉然不遂已乃日強引之覺􅀁引漸多􅀁進漸益發則去的亦漸近焉囙􅀼有感曰夫百􅇍之的􅀁以莭逺近之中凡射者之􅀁求至也而過者忽之不及者沮焉強弱雖殊其不至則一也茍抑其過而勉其􅀁不及焉有不至者哉是可以喻夫學矣聖人學者之的詩書禮樂學者之弓矢也由詩書禮樂以求至乎聖人猶操弓矢以求至乎的也其騖髙而失中過而忽之者也自畫而日退不及而沮焉者也不忽不沮循循然以求之欲不至於聖人不䏻矣況聖人之道在身非有百􅇍之逺欲求之即至非有力挽之難也可不勉哉翰林應奉㑹稽唐君䖏敬嘗以彀名其子之淳進脩之室盖取孟軻氏􅀁謂學者必志於彀之義來請余説囙以􅀁感於射者告焉䖏敬曰是􅁕以合孟氏而厲之淳矣請書以貽之夫秋之為奕不專則不成慶之取鐻不靜則不得彼皆小技猶有近夫道焉況射君子之善蓺乎孟氏可謂善喻䖏敬可謂善取以教其子之淳䏻勉焉以求至則可謂善學者矣作彀喻志夣余與同郡謝玄懿俱在内府教胄子今年正月十一日之夜啓夣與玄懿晨􅀱午門􅀂􅀅趍朝者有揖余二人言曰二君當遷且顧􅀦子祭酒梁公曰諸生盡以属公余愕曰得無有逺調乎曰不然煩傅開平王爾既窹明日以告玄懿􅀻相與識之越三日既望故事當率諸生入覲方叙立右順門内梁公傳􅈲下曰勑諸生出受業太學二君俟後命言既引諸生去啓亦随出明旦􅀅朝中使急召啓二人曰有􅈲命開平王二子侍學東宫俾爾授之經宜趍入玄懿顧余咲共歎其夣之神也二月二十日之夜玄懿夣與啓同􅀍召至上􅀁上授以一紙若告身者玄懿受而忘拜􅀼視其文有翰林院三字焉継授啓啓拜受之明日以告啓亦􅀻相與識之越六日上御奉天門􅈗執並侍小黄門名啓䓁陞上顧中書右丞汪公曰諸儒在學乆且皆有文行而令以布衣逰吾門可乎汝亟以翰林之軄䖏之囙趣謝時玄懿以事出獨不得拜焉明日遂各授軄有差而啓與玄懿皆得編脩官云於是益共歎其夣之神也七月十五日之夜玄懿母夫人林氏夣中使舁二橱授兩家發各有白金在焉其家捧視則化為炭間以告吾婦余與玄懿聞之􅀼怪其說稍􅀮不若向二夣之著又不知玄懿􅀁得獨化為炭何也然亦􅀻相與識之至二十八日暮出院還舎有挫馬馳召余二人上御􅆣樓俟焉既見奨諭良乆面拜啓户部侍郎玄懿吏部郎中啓以年少未習理財且不敢驟膺重任辭去玄懿亦辭上即俞􅁢各賜内帑白金命左丞相宣􅀦公給牒放還於郷既出都門與玄懿家共舟而東其二弟為余言累重多􅀒賜金己盡費況歸無舊葉相共歎咨尤其兄之早辭余囙話茲夣以觧之乃始悟橱為除炭為歎愈共歎其夣之神也夫自周官六夣之軄癈學者莫䏻通其說前史􅀁載夣之符於事者甚衆余嘗疑其誣焉今是三夣者不由囙思而生得於恍愡啽囈之間而可徴灼灼如此知未至若既徃無少忒焉其事之偶然者歟􅀅人之禍福􅀅至有司之者㦯預以相告歟抑精神靈爽有􅀁感通而特兆於是歟何其神也是知凡得䘮之數固皆㝎於􅄀􅄀而無􅀎迯焉者矣夫以吾二人一官之遷一命之授與區區之進退猶然而況其大者乎然則士之生也雖當自盡其􅀁宜為外者一委命順於數而無􅀁容心焉可也而世之惑者猶􅀅役其智力騖馳於軋敓排狼之塲欣戚膠擾至死而不之察豈非昧哉余欲書此以􅁴之懼有誚夫誕也乃􅀻識之且貽玄懿聊相與自警焉今年洪武庚戍也書瞿孝子行録後余嘗預修元史見民之以孝義聞於朝者頗衆其􅀎冬月得􅀲以奉親者則若王薦刲股肉以療父病者則若孔全施財以周郷里之乏者則若賈進皆得具著于篇瞿孝子之行盖兼三子而有之而當時有司不以聞史無􅀁考據又主者不與故不得書以與薦䓁並傳雖然孝子今年八十餘􅄑際聖明之時既得謝君之􅀁表章則當世執茟之士豈無為之采録收附於國史者哉其傳固在是矣余與孝子之子荘友嘗􅀗拜之氣貌藹然孝義人也且聞長者言其行甚熟與謝君􅀁録無異詞故識以信其說庶他曰書者㦯有􅀁徵焉書博雞者事博雞者􅀽人素無頼不事産業日抱雞呼少年博市中任氣好􅋐諸為里俠者皆下之元至正間􅀽有守多惠政民甚愛之部使者􅆇新貴􅀅按郡至􅀽守自􅀒年徳易之聞其至咲曰􅆇氏之子也㦯以告􅆇􅆇怒欲中守法㑹􅀽有豪民嘗受守杖知使者意嗛守即誣守納已賕使者遂逮守脇服奪其官􅀽人大憤然未有以報也一日博雞者遨于市衆知有為囙讓之曰若素名勇徒􅀎藉貧孱者耳彼豪民恃其貲誣去賢使君􅀽人失父母若誠丈夫不􅀎為使君一􅁬臂耶博雞者曰諾即入閭左呼子弟素健者得數十人遮豪民於道豪民方華衣乗馬從群奴而馳博雞者直前捽下提毆之奴驚各亡去乃裭豪民衣自衣復自筞其馬麾衆擁豪民馬前反接徇諸市使自呼曰為民誣太守者視此一􅇍一呼不呼則杖其背盡創豪民子聞難鳩宗族僮奴百許人欲要􅆲以歸博雞者􅊇謂曰若欲死而父即前􅋐否則闔門善俟吾行市畢即㱕􅀂父無恙也豪民子懼遂杖殺其父不敢動稍歛衆以去􅀽人相聚􅀙觀歡動一城郡録事駭之馳白府府佐快其􅀁為隂縦之不問日暮至豪民第門捽使跪數之曰􅀂為民不自謹冒使君杖汝法也敢用是為怨望又投間衊汚使君使罷汝罪宜死今姑貸汝後不善自改且復妄言我當焚汝廬􅆷汝家矣豪民氣盡以額叩地謝不敢乃釋之博雞者囙告衆曰是􅁕以報使君未耶衆曰若􅀁為誠快然使君􅁈未白猶無益也博雞者曰然即連楮為巨愊廣二丈大書一屈字以兩竿夾揭之走訴行御史䑓䑓臣弗為理乃與其徒曰張屈字逰金陵市中䑓臣慙追受其牒為復守官而黜􅆇使者方是時愽雞者以義聞東南髙子曰余在史舘聞翰林天台陶先生言博雞者之事觀􅀽守雖得民然自喜􅁿上其禍非外至也􅆇使者枉用三尺以讎一言之憾固賊盭之士哉苐為上者不能察使匹夫攘􅃑群起以伸其憤識者固知元政紊弛而變興自下之漸矣楊孟汲字說梁溪楊氏子名長孺囙􅀙余逰請有以字之余曰西漢之士字長孺者二人焉韓大夫安國汲内史黯也昔司馬長卿慕藺相如之為人故自名相如今子以是名其為慕安國耶慕黯耶雖然二人者皆名臣吾􅀅言其行事之得失而子擇之可乎史傳安國之事􅀃梁孝王與諌馬邑之計亦可謂賢矣然以行金而得為大司農論魏其武安之事而無􅀁别白吾於是有慊㢤若黯之忠直好諌責武帝不䏻效唐虞罵張湯不可為公卿使天子憚而禮之淮南王謀􅊇數年畏黯一人而不敢發有古社稷臣之風子欲取於二人則舍黯其可㢤且子之􅒏直而行㓗學黯為近易宜字曰孟汲則皆知子之為慕黯而非慕安國者矣夫今之人好羙名自侈吾嘗病之子欲以古人為師􅀂􅂅學而不可及者庶乎得命名之義矣苟於黯如䠶者之於的行者之於家不至不巳則可謂善學古人者矣嗚呼子誠善學雖聖賢不難至而況於黯乎澄江懶漁說暨陽之江有􅀮君子嘗漁其上朝不緡夕不罛汎景逐波漫漫以嬉人見其不事其業囙名曰懶漁衆漁每得魚而返集于浦淑之間炊鮮漉清飲唱爲樂視彼獨枵然則相與咲之且讓之曰夫農不勤則飢啇不勤則匱百工不勤則無以成其􅄊今我皆自力爾獨于􅇣我皆率常爾獨用荒不勞爾躬不朂爾志則何以􅌋爾利乎懶漁曰吾終日漁而子以爲未嘗漁惑哉詩書吾漁之具也群聖人之學吾漁之地也義理之潜道徳之􅃾吾漁之􅀁得也吾漁視子亦大矣何名為懶乎衆漁慚而退髙子聞之曰此善漁也世之習常務得而不知大人之事者其衆漁之徒㢤脩忠佑祠䟽磅礴扶輿靈氣特鍾於章貢昭明烜赫神蹤寔肇於嬴􅁗􅃅雖著於江東祀巳傳於呉下累朝褒顯每加典冊之崇萬姓祈占必恊􅆱􅀛之應自兵戎之充斥致祠宇之摧傾思􅀅斵木而庀工湏假揮金而相役羙㢤輪羙㢤奐事固待於人為俾爾熾俾爾昌福必膺於神貺勝縁可集盛事毋􅈥城南草堂䟽心逺道人何彦文年老未有居室􅀅築草堂練圻城南求好事者􅂢已金以相其役䟽曰郗參軍􅀎為安道買山史嘗見羙王録事不資少陵築堂詩巳遭嗔非逢有力之人􅂚濟無家之客何彦文者伎通聲律名著江湖蚤嘗為落魄之㳺晚未淂棲遲之􅀁漂流屢徙歎一枝夜月之烏跧伏深蔵愧三窟秋風之兎今必用縛茅作屋奈未􅀎􅃌石為金欲令此老之婆娑須籍諸君之慷慨畧加舉手便可容身心逺地自偏巳疑成茲小􅀮曲髙和総寡尚當為爾長歌􅄑得安居敢忘廣庇薦亡􅀅齋榜人􅀑之常猶一晝而一夜聖凡之隔乃九天而九泉故大道開􅁸幽㧞滯之門使群迷得出妄歸真之路發金籙瓊書之祕降羽憧玉莭之光欲薦爾忠䰟必資吾法力虎頭有相雖􅁛介胄之雄馬革無蹤未返衣􅃣之塟恐堕重隂之苦趣故推太上之慈㤙照以破闇之燈濟以度迷之筏使爾聞妙音而頓觧慿浩氣以髙昇雨濕天隂不復煩􅁈於曠野雲舒霞卷佇看極樂於崇霄永􅄐黒海之波即往朱陵之府墓誌八篇元故婺州路蘭溪州判官致仕胡君墓誌銘君諱松字松岩姓胡氏常之晉陵人宋樞宻副使贈太師秦國公謚文恭九世孫也曽祖諱柔國子司業祖諱聡􅀡顯謨閣淮南莭度計議官考諱應炎􅀡祕閣常州莭度判官君生甫期元兵渡江􅈥常祕閣君死之兵且屠城祖母陳夫人先襁君出避呉中以免既長㱕鄉里以推擇為吏􅍓宜興崑山常熟三州在常熟時民有為富人曹氏飬子者甞􅀍譴潜㱕其父囙匿之得腐死人溝中佯哭曰吾児也即詣曹曰爾何殺吾兒賄謝弗厭訟于州君􅀙州判官往視屍計未當壊而壊知非是即置弗檢而以不見屍報録囚使者下車詰君稽違状君曰吾寜稽不敢枉也移讞旁邑曹不任椘掠遂誣脉君䓁亦以見屍不檢受劾獄具曹之族咸􅁈之重購偵􅀗飬于始白㤗㝎主崩文宗自金陵入􅁇位殺故相回回倒刺沙命平章曹立廵東南紏其黨授上方劍得專誅按行至常熟君􅀙長史􅊇諸境民有告回回百餘人匿海渚殺猪㑹飲謀為亂平章亟遣卒捕之君當承行輙請曰是詐也願毋煩兵平章怒曰吏何用知之君曰回回不食猪今言殺猪詐可知也不聽果往無􅀗一舶賈胡數人訊之盖訟者嘗與互市􅀒其貲不􅀎償欲投間䧟之也遂抵訟者罪君之明察􅀋此陞平江路吏庚午􅀊呉中大飢官作飦食餓者命君與他吏一人董之君收濟甚周且以􅀻錢及餅餌囊􅀒馬後施于塗旦淅米入釜他吏伺君間輙􅀻接其半俄畫見殍􅀑群捽之遂死君則無恙􅁇遷集􅂟當護上供物至京禮部尚書隆安魯公見君謂曰名家裔乃乆􅀙吏役邪欲與一二朝士知君者共薦留之不果㑹公拜江浙行省參知政事遂與俱南以省銓為寧􅀦路涯縣典史時有制􅀩古色目毆漢人南人者不得復西域流户數百人囙恃以為􅁀􅀁過掠財畜辱婦女民束手不敢拒相驚若寇至及涇邑僚悉引避民愈恐君語衆曰吾在若無憂也即出勞之於郊誘閉佛寺中呼其酋諭曰制言不得復毆者民爾今我天子吏也􅀁行者法若善去勿妄犯吾民當率酒米相餉否則知有法爾酋愕遂戢其衆亟去無一人敢譁君親送出疆以㱕民羅拜馬首曰微公縣㡬殘矣轉衢之龍㳺縣婺之録事司二典史皆有聲累資勑授􅀅仕佐郎信州路提控按牘兼照磨承發架閣請老不赴遂以􅀙仕郎婺州路蘭溪州判官􅆀其仕君子黼仕杭囙留就飬以至正十七年十月卒年八十四元配陳氏􅁇配陳氏並先君殁贈宜人二子長即黼浙江鄕貢進士汀州路儒學教授次黻以平盗㓛授福州路羅源縣南灣寨廵檢君性孝友少䘮母哀毀􅅩父嘗欲奪其田盡􅂌無靳色後􅅩父廢業君資奉之甚至􅀖閭􅁛焉為吏􅅸賕請守正不阿明習法律而論决多傅以經義􅀁至長官皆敬憚之君之殁以兵阻不克歸􅌾權厝呉山萬松嶺後十五年􅀦朝平四方道通黼始以某月某日遷祔晋陵先塋之次乃來乞銘實洪武四年也惟胡氏自太師以儒貴為宋名臣其後子孫登侍徔方伯焜燿史􅁽者以十數可謂盛矣至君懐抱利噐宜光大其先業而困􅓹下僚卒老以死非命也夫然君不以位卑自屈􅀎盡心􅀁軄使表著如此􅁕以昭示永乆是不可以無銘銘曰君仕弗昌君材則良繄君名之長陳夫人許氏墓誌銘夫人世為金陵溧陽人姓許氏諱清宻歸為同邑陳君諱徳輝之妻陳君以醫名爲元御診太醫年三十五卒于燕夫人迎其䘮還􅌾邑之舉福鄉大石山之原即自勤苦持家以育㓜孤視娣姒之女與己女均皆躬為􅌨沐及教以女事不懈鄉里􅁛賢焉子世􅀎吏呉奉夫人來居年七十五以疾卒實元至正十七年也遭時多故未克歸􅌾國朝洪武六年世􅀎方主邳州睢寜簿始謁告啓其殯于吴以是年三月某日合􅌾於御醫君之墓有女三人㳤安適李某㳤寜適趙某㳤貞適李某皆溧陽士族男一人主簿也銘曰猗夫人著㳤徳中􅊔居動守則子成名維教力卒有年􅌾始克􅀙良人合兆域期永貽志斯刻陳希文墓誌銘呉有良醫師曰陳希文其治業甚精其起疾甚衆其中心甚樂易其待物甚恕而恭其事親甚孝其撫宗姓寡弱甚有㤙其為人如此故其卒鄕里耄稚莫不歎悼焉其塟也齊人髙啓為之序而系以銘陳氏先為溧陽人君祖諱桂發元授平江路官醫提領仕巳呉人利其醫不欲使去遂留家焉考諱徳華君諱世成􅃅清逺䖏士希文字也年六十七以洪武六年十二月丙辰卒以是月􅉝酉塟呉縣太平鄉梅灣之原配宗氏子男三人長祖義先卒次祖善次綂女三人長適郎潛次􅃴顧遵禮次㓜孫男四人蒙豫觀㤗銘曰以醫恵物澤巳乆用善禔躬徳彌􅌋年㡬七十非不夀有子世業紹厥後㱕全斯丘尚奚咎葛仲正墓誌銘􅁑君諱正蒙字仲正為人􅌋重有長者風其先自汴徙呉世以毉鳴至君而令聞益著每旦迎療者填户外至不􅀎容􅋰君肩輿㦄視惟謹不問􅀎報否率與善藥其子姪甥婿與弟子􅀙君為醫者人輙曰是􅁑君􅀁傳也爭􅃱之年七十二以洪武六年十二月癸亥卒曾祖諱􅀙豫祖諱暘辰皆弗仕考諱應澤元授平江路官醫提領室周氏子男二人曰復曰㤗女二人適郁潛金權孫男二人旭􅁇明年正月己已復奉君柩􅌾於長洲縣武丘鄉洞涇之原請銘于齊人髙啓銘曰彼阜斯崇􅑆乎其中有君􅁑翁壽樂以終維拯疾之㓛後人尚豐明故髙均彰墓誌銘呉郡髙均彰以洪武五年八月丁亥卒以九月丙午􅁲呉縣大平鄉梅灣村之原以塟其􅀙弟前史官啓既哭之復為銘納壙中君諱彰蕳率寡嗜於聲利得䘮不戚戚計慮日􅀙昆弟親友酣飲以為娯性復好􅀡人有過輙面攻之衆知其無他腸弗怨也年五十有九祖諱鑑考諱震皆有潛徳配姚氏無子一女寧適郡人陳彦夫以君之賢生雖不􅀎􅆀豐榮然亦未嘗有一毫困辱不可謂不􅄑也銘曰雖寡求故不憂卒全而歸在斯丘嗚呼吾兄又何尤故韓仲逵墓誌銘君蘇州呉縣人姓韓氏諱敏道仲逵字也生元世嘗得推擇為吏􅍓常之無錫蘇之呉江二州提控案牘性寛厚不挾計數時吏相習為文深君議曹事獨平恕有長者風家無􅌋蔵客至輙擊牲命酤以相驩視罄匱弗計晚得􅁕疾有以酒為夀者亦杖而􅀙之談噱酣暢不少衰其樂易盖如此年六十而卒實國朝洪武五年二月某日也祖諱某考諱某皆不仕配陳氏先十四年卒繼配連氏一子焯為西安都􅃌揮使司􅀴􅍓七女長而嫁者五人餘㓜孫男侗君卒之六月􅀴㦄始聞訃歸十是年九月某日􅌾君於某鄉某地之原乃來乞銘余向為史属時􅀴㦄方在宥府慔數相遇焉盖知其才噐􅀎大韓宗者豈非君為吏之善天之報施不於其躬而􅀅於其子耶銘曰文不刻深吏之賢胡仕弗崇夀靡延厥報在嗣天岡愆􅀅俾昌熾耀尓先我庸作銘慰九泉魏夫人宋氏墓誌銘蘇州守江夏魏公以其先太夫人行述授勃海髙啓曰吾妣棄吾二十有二年矣遭時多故權厝先塋之左今始得地於吾里黄岡湖東某山之原􅀅以某年某月某日而塟子爲我志而銘之公昔掌國史啓嘗爲其属今又居公之野辱以先銘是属不敢當然亦不敢辭也按夫人姓宋氏武昌蒲圻人宋彈壓官諱時慜之孫女諱某􅃅俊齋之女同邑􅀮君子碧崖魏先生諱雲瑞之妻也夫人生而頴異七􅀊􅀎誦曲禮内則曹大家女訓十􅀊共女事無闕既長歸先生先生故名家世儒􅂂行髙㓗夫人相之􅁛賢配焉居母姑之䘮皆過哀䟽食終三年待内外親族無異意先生嘗逰齊安遇疾卒於邸有子三人法孫已孫虎孫􅀄聞計􅀅遣法孫迎䘮㦯曰江多蛟龍性惡屍以柩渡虞有變宜焚骨歸也夫人哭喻法孫曰是􅀅䧟吾母子於大戾也爾忍而父為􅁅燼乎亟往母有憚而父善人神必相之矣迄渡風浪帖然䘮既還㦯又曰柩入家弗利夫人曰此固吾夫宅也舎之使何適哉苟有弗利當萃未亡人之身未亡人得􅀙夫于地下􅁕矣即惟正堂奉安旦夕哭臨逮􅌾毀瘁幾不􅀎為生嘗謂諸子曰不􅄑門户凋落汝父汝伯相繼殁若曹尚誰賴㢤宜力學善自立大汝家以慰老人之望毋􅀙里中児嬉也子皆承教惟謹先生庶毋羅氏性素嚴號難事夫人始終奉承有順無忤疾則侍粥藥殁則營䘮塟皆必誠焉巳孫既娶乆未有胤夫人曰吾老矣獨不得一抱孫也禱于先夣􅂵衣人種栗舍垣下告曰此萌也為他日興植汝門之本􅁴旦語己孫曰汝有子祥也既而果生男夫人喜曰神不我誣遂以栗名嘗得昡疾既間曰吾度不􅀎乆䖏丗間矣命舁柩堂下沐之曰吾蔵身此中無􅂩則佳耳又命新婦取衣衾當歛者縣之椸餘悉􅄆諸親愛除夕家人進􅎛酒夫人起居尚無恙元旦坐堂上親戚為夀畢曰我明日逝矣為我謝某謝某翌日沐浴更衣坐呼己孫䓁謂曰吾年七十六夀亦􅁕矣死自吾順汝曹勿號慟亂我聽使我得好去也語巳遂殂實元至正十年正月二十日也法孫早世虎孫仕元為岳州路儒學正平江州楊柳湾茶司提領亦先卒己孫今名觀即公也仕國朝㦄太常卿翰林學士國子􅀕酒至今官嗚呼夫人貞孝慈睦其賢卓著如此固非凡婦人􅀁及至於聽言之惑臨終不亂則又士君子識義理者㦯有􅀁未􅀎而夫人􅀎之豈非難哉雖生不及見子之貴以享其榮飬然死而子􅀎以儒學際聖朝爵三品當得褒贈之命象首錦櫜以光賁於窀穸又䏻追述懿行以圖不朽則夫人何憾焉銘曰維君子嬪貞以禔身􅀎教其􅀌爲今名臣卒既有年始㱕斯阡時虞未遑豈曰緩焉乃刻銘章載揚幽光永固以安夫人之蔵丁志恭墓誌銘洪武六年四月余聞志恭得􅁀疾臥江上扁舟往視之志恭握余手欷歔不自勝仰曰先生自天而下耶明日疾革余撫謂之曰子甞求贈詩吾未暇為今如有不可諱當為悼詩塟且當為銘志恭已昏不知人復張目舉手作謝且别状時其母及家人親舊環床立見之莫不掩面泣下又明日乃卒余既賦五言一章哭之􅀅塟其兄志剛來以請銘余曰吾忍銘志恭耶然言不可食也乃序而銘之志恭呉人諱儼姓丁氏風度清羙學書有楷法嘗㳺呉越汴洛之都名卿碩士咸賞愛之年雖少不喜聲利芬華事歸䖏郊墅以賦詩彈琴自娯與人交悃款有情義而於余尤相親敬者也年三十一以是月六日卒以十二月六日塟呉縣太平鄉梅湾之原其先世為呉人曽祖諱震祖諱有慶皆弗耀考諱讓主河南永寜簿妻􅀽氏男二人原顯八􅀊原亨志恭殁五月而生嗚呼余觀志恭平居競慎不敢妄有􅀁為惟恐禍之及已􅀁以自愛其生何如也然竟以疾夭使世之肆者得共非咲謂徒謹無益也不知志恭之死者命也不􅄑也命故無悔不􅄑故君子哀之夫人之死䏻無􅀁悔而又有君子哀之則亦庶矣乎是不可以無銘銘曰孌彼婦兮與兒矧昆賢兮母之慈子􅃘舎兮去兹又返顧我兮友􅀻駟方鶩兮倐止斯非夫天兮孰使之哀㢤奈何兮慰以銘詩哀辭一篇王仲㢘哀辭仲㢘少習春秋􅀴欲舉進士􅀒其氣不􅈕􅈬尺度􅀅棄去北逰燕趙之間㑹兵變且嬰疾遂家居治田業不復言仕事有􅀁感則發為歌詩辭抗音􅈭讀者知其有志非甘遂泯泯者性蕳曠無矯飾與人交不易為踈宻余居鄉里􅀄識之不甚􅁴其賢後出接時輩見中險外夷朝合夕叛者不可勝數而仲㢘泊然十載如一日然後深嘆其賢知世之不多有也至正二十六年六月三日仲㢘舊疾作卒於家夀止三十五余􅀄聞其病革馳視之尚有微息就榻摭呼不復􅀿乃絶余既哭而退為計於嘗􅀁來往者相與賻祭如禮其􅀁親有謂余者曰仲㢘於昆弟最少而孝毋恃以為安嘗曰是兒在吾後事無憂者不意其先亡也又曰仲㢘有児㓜方易簀傅毋招侍側顧麾使去若不忍見者余聞之復為之出涕夫士有􅓹而不耀又招篤廢之疾罹夭札之禍親老而不能終其養子生而不能待其長此古今之凶極甚可哀者而吾仲亷丁之豈非命哉然獨念仲亷無子時則以為憂既有子而喜喜未幾而身殁咸謂禍福倚伏不可知天初皆無意人之所值適然耳余則以為不然仲亷後顧孑立者久嘗自分其􅏷絶矣然忽有是兒豈天哀其􅀅亡而遺之嗣所謂善人之報恒不於其躬而於其後耶余嘗見其眉目秀發非凡兒長必有成者而謂茫茫然者果無意乎仲廉之鄉里行事太原王君行已為識於墓乃復為之辭以寓吾哀其辭曰嗟嗟仲亷慎其儀兮早翔藝林弁峩巍子誓􅀅遐觀抉奥竒兮洪河洶前喪楫維兮迺盤舊邱以自怡子匪時逸収弗賈知子羣騖以争途嶮巇兮子獨正􅁤坦而馳兮胡淑且嘉不受禔子窮病短折具任之􅀆母哀噭噭老莫子支衆涕助流若綆縻兮單婴在哺詎識悲兮禠其文褓被素縗兮芳華未敖忽稿萎兮修翰未騫竟離披兮志長運窮天實爲子我失友生􅀅尤誰子方覯倐背歡戚移子􅑡漠無垠逝難追子埋蒿萎塵岡之垂兮己乎已乎歸何期兮
