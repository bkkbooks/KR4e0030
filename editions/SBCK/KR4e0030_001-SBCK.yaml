body:
  text: 後學周立編輯論威愛論書曰威克厥愛􅁢濟愛克厥威􅁢罔㓛㦯以愛誠有以結於人者則趋事赴㓛有不期然而然何以威為㦲予曰不然此御軍之要也盖慶勝則姑息威勝則嚴明胤侯知其然故於誓師之際深警之若此欲其恐懼而用命也嗚呼以仲康之賢討羲和之沉亂其必濟可知矣然猶恐其威之不立而㓛之不成而況後世之衆人欲􅀙事之強敵者㢤夫三代之兵也出於民居則習其政教而知義出則聞其莭制而知法皆有尊君死上之心赴公戰如報􅀻仇者抑且有所謂孥戮之刑弗朂之戒焉近世之聚而為兵者非田野之惰夫則鄕里之惡少亡命行剽椎埋鼓鑄之流也政教不習而莭制不聞苟無威以臨之則其桀傲狼戾悻自肆者可勝道㢤今之人家有驕子非其子之性驕也愛之而􅆀其驕也教之而不􅀙役之而不動於是有悖􅊇干犯之患矣若小過則訓之大過則杖之子其有驕乎􅀅之御三軍者固無異於是然􅀅之於三軍又非若父子之有天性之親而不可一日􅄐者則愛之其可過於威乎况戰者所以驅之於死也好生惡死人之至情非得尊君死上之人則視白刄之交於前流矢之集於左其不震慴辟易顛倒而奔走者㡬希矣故兵法曰畏敵者不畏我畏我者不畏敵何以使其􅀎畏我也殺之者而已矣盖非􅄝殺而自殘也恐其畏敵而先後敵㦯乗而䨱之是舉軍而棄之於敵其自殘不巳多乎故愛其子者賊其子殺其軍者全其軍設使兩軍勇怯相若一樂其􅀅之寛一畏其􅀅之嚴卒然遇於原野之間援捊鼓之則嚴者莫不奮戈而爭前而寛者㦯有一二遁矣何則彼恃愛之而不殺也故有威則怯者勇無威則勇者怯且立威者非欲其若楊素之求人之過而殺之也亦曰令之嚴而罰之果不為煦煦姑息之計耳古之豪傑所以􅀎使士卒畏之􅀂􅀑神之不可犯納之於死而不避投之於險而無所辭百戰百勝功立於當時而名存於後世者用此道也㦯又曰然則威可以無􅋢矣乎曰何可以無愛也專􅋢則䙝䙝則怠專威則急急則怨怨與怠其敗一也故愛而恐其至於怠也則攝之以威而作其氣威而恐其至於怨也則濟之以愛而牧其心愛非威㤙不加威非􅋢􅀔不固威愛之道所以兼施並行而不可偏廢者也雖然豈特為􅀅之事㢤使國君而知此則國可以治天子而知此天下可得而理矣四臣論古之所以䏻國者有四臣焉何謂四臣曰社稷之臣腹心之臣諌諍之臣執法之臣也何謂社稷之臣忠藎孚於上下威望加於内外敵國聞之而不敢謀奸宄畏之而不敢發正色立朝招之不來而麾之不去若漢汲黯呉張昭唐郭子儀是也何謂腹心之臣識􅁕以達天下之機畧􅁕以濟天下之業徔容帷幄謀成而羣臣不知計㝎而􅀅軍不聞若漢良平魏荀㦯秦王猛是也何謂諌諍之臣匡君之非而納君於善不阿順以取容不迎合以求悅正言不逥觸犯忌諱雷霆發於上而不驚鼎鑊具於前而不顧若唐魏徴禇遂良張九齡是也何謂執法之臣直道而行不憚權貴逢奸必舉遇惡必擊使豺狼狐狸屏息而不敢動若漢王章盖寛饒唐宋璟是也盖社稷之臣以忠腹心之臣以智諌諍之臣以􅀡執法之臣以剛此四臣者國之不可以一日無者也夫以匹夫之取友尚有􅀎死義者􅀎忠謀者􅀎責善者􅀎禦侮者而況於國君乎而況於天子乎故􅀦無社稷之臣則無以抗大難無腹心之臣則無與圖大功無諌諍之臣則無以與格大過無執法之臣則無與除大奸無與抗大難必危無與圖大功必敗無與格大過必昏無與除大奸必弱故古之興者未甞無四臣而亡者未甞有四臣也嗚呼四臣者豈真不易得耶君無優養作起之術爾故􅀁以待社稷之臣者當尊以禮髙爵而重禄之使危言不􅀎中細故不䏻踈則彼必以社稷之憂為已憂社稷之辱為已辱毅然以身徇莭而不變而大難可抗矣待腹心之臣者當推以誠畧去苛禮示之坦然食則同噐坐則促席􅀁言無不用􅀁欲無不與則彼必竭思慮之精效勝負之計而大功可圖矣待諫諍之臣者則當納以寛凢有所論奏停輿以受之賜帛以旌之雖􅈭忉不怒雖􅃌斥不罪則彼必務盡直心政事之􅇅日間聦明之道益廣而大過可格矣待執法之臣當假以威不以􅀻愛撓其權不以譴辱挫其氣使強者不敢傷䜛者不敢毀則彼必竦踴風生刺舉無避以尊朝廷之勢而奸可除矣若㦯棄忠而擅智惡直而害剛平居而上唱下和相聚自賢勢􅀌而不知機去而不察政失而不聞威削而不悟及一旦臨變茫然而無􅀁救豈不可哀也哉詩曰如彼泉流無淪胥以敗予恐後世之君無四臣而致其敗也記逰天平山記至正二十二年九月九日積霖既霽灝氣澄肅予與同志之友以登髙之盟不可寒也廼治􅄿載醪相與􅃌天平山而逰焉山距城西南水行三十里至則捨舟就輿􅀴乎林淺塢間道傍竹石蒙翳有泉伏不見作泠泠琴筑聲予欣然停輿聽乆之而去至白雲寺謁魏公祠憇逺公菴然後由其麓狙杙以上山多怪石若卧若立若搏若噬蟠拏撑拄不可名状復有泉出亂石間曰白雲泉綫脉縈絡下墜于沼舉瓢酌甞味極甘汵泉上有亭名與泉同草木秀潤可䕃可息過此則峯迴磴盤十􅇍一折委曲而上至於龍門兩崖並峙若合而通窄險深黒過者側􅁕又其上有石屋二大可坐十人小可坐六七人皆石穴空洞廣石覆之如屋既入則懔然若􅀅壓者遂相引以去至此盖始及山之半矣乃復􅄐用􅄆伍竸逐幽勝登者止者哦者嘯者憊而喘者恐而咷者怡然若有樂者悵然俛仰感慨若有悲者雖􅀁遇不同然莫不皆有得也予居前益上􅁴石益怪徑益狹山之景益竒而人之力亦益以憊矣顧後者不予􅁇廼獨褰裳􅁬武窮山之高而止焉其上始平曠坦石為地拂石以坐則見山之雲浮浮天之風飂飂太湖之水渺乎其悠悠予超乎若舉泊乎若休然後知山之不負扵茲逰也既而欲下失其故路􅀣􅀮石蔽愈索愈迷遂困於荒茅叢篠之間時日欲暮大風忽来洞谷唅呀鳥獸鳴吼予心恐俯下疾呼有樵者聞之遂相導以出至白雲亭復與同逰者㑹衆莫不尤予好竒之過而予亦􅀏其惟怯頺敗不能得茲山之􅅸勝也於是采菊泛酒樂飲􅀅半予起言於衆曰今天下板蕩十年之間諸侯不􅀎保其國大夫士之不䏻保其家奔赱􅄐􅄆於四方者多矣而我與諸君蒙在上者之力得安於田里撫佳莭之來臨登名山以眺望舉觴一醉豈易得㢤然恐盛衰之不常􅄐合之難保也請書之於石明年􅀅復來使得有􅀁考焉衆曰諾遂書以為記生白室記荘周氏之言曰瞻彼關者虚室生白謂人􅀎遺耳目去心意而任夫性則道集至虚之宅而純白生焉四明陳君徳明恱其􅀃乃以生白名􅀁寓之室介友人求予記之予甞讀周之書􅀚是􅀃者雖仲尼􅀁以告顔子盖寓言耳其義雖羙然未􅀎盡合乎聖人也陳君豈􅀅學者邪周之道盖欲放心自得之塲以與物寘􅀁謂逰方之外者也君今筮仕昌朝出贊宥府蕳牘填委寔待剸裁而目欲無􅀁視耳欲無􅀁聽而心欲無􅀁思􅀎乎不􅀎也君既不􅀎為之則吾亦不能言之矣請言其可􅀎者以記君室可乎夫心之體本虚有不虚者物之窒也物非􅀎窒之也誘於物而為之累也故聖人教人目不􅀎使無視􅀎勿視於邪耳不能使無聽􅀎勿聽於滛心不􅀎使無思􅀎勿思於妄而巳爾苟三者之用皆出於理而不􅀻則雖日與物接其外蔽交而中之虚自若也吾虛既存然後光明洞徹昭然而不昧者發焉燭至幽而不遺察至􅀮而􅀎著此則明而誠誠則明之道也又豈務於虚􅄫而無為於世者之事㢤君好學善辯甞燕休是室之中尚䏻虚心而觀以審其取舎之㡬也夫蜀山書舎記蜀山書舎者友人徐君㓜文肄學之􅀁也㓜文嘗自呉興以書抵予曰吾山在城東若干里吾屋在山若千楹吾書在屋􅀂干卷山雖小而甚羙屋雖朴而粗完書雖不多而􅁕以俻閱吾􅀅於是卒業焉子􅄑為我記之予惟古之君子􅀁取以成其學者無常物􅀁居以致其學者無常地也故弁裳之於容珩瑀之於􅇍豆􅇼之於陳琴瑟之於樂弓矢車馬之於服度量權衡之於用凡接於物皆學也豈專於六籍之内㦲往于田入于市䖏于户庭覧于山川立于宗廟朝廷逰于庠序軍旅凢履之地皆學也豈限於一室之間㢤後丗講學之道既廢而人之不􅀎然也有志者始各占山水之勝築廬聚書而讀之雖其􅀁以學之者異手古然九事物之理與夫羣聖賢脩巳治人之要實皆不出於書況安修阻之區􅅸紛囂之役得一肆其力於是則其至於成􅈬豈不反有易者㢤今㓜文以方壮之齒有可用之材而不急進取益務於學以求其􅀁未至豈非有志之士哉而予也北郭之野有土東里之苐有書皆先人之遺也遭時多艱茀􅁾於榛蕪殘壊於塵蠧倀倀焉日事奔走而不知返則其荒陋宜有愧於糿文矣尚䏻為是記乎然而書此而不辭者盖姑復㓜文之請亦目以自厲焉清言室記􅅊應物詩有曰清言怡道心予友張君讀之有􅀁契囙掇句首二字名其室而屬予記之且曰吾室在􅆍門之内户庭宻深惟案絜素盖􅀅於此縱玄虚之談息世俗之論者也予惟昔魏之衰士大夫有擅聲勢之強溺酣滛之樂而唱為清談假以自髙者其流至於西晉卒亡人􅀦論者至今咎之張君豈蹈其轍㢤夫君子之􅀚人其道雖殊必先於其言非以其發於心志之微而善惡有不可掩者夫故靜者其言蕳躁者其言繁汙者其言卑達者其言逺理必然也張君嘗學道且究於醫得養生之理吐查滓而納清虗厭華􅃾而嗜澹泊事物之末􅀎為其累者寡矣邪􅁾之念不萌于心故煩濁之語不出于口内外一􅆀非若昔人之矯為也豈不􅁕尚乎然言不何以自述也必有問荅者焉張君室中􅀁與揮麈而相對者其誰㢤予聞此􅀖多異人道路塵埃中如魏伯陽許長史之倫安知不往來其間邪張君儻識之延於是室分據木榻為中夜之談予得執燭隅坐以聽之豈不􅄑㢤雖然猶未忘於言也有道者之教人黙焉而意巳傳予雖凡陋􅀎使預聞不言之妙乎煮石山房記昔者先王教民稼穡而使之粒食又命火官别五木順四時改火以利烹餁之用而後民有以養其生而無天札之患五糓之羙萬世寶之雖有芻豢之豐不敢使勝其氣􅀁以爲民之天而不䏻一日無焉後世神仙之說興方士始􅋚人以􅅸粒之術采草木錬金石而餌之謂可以去查滓而來清虗却衰老而􅆀􅁿舉余甞恠而疑之然獨念滋味人之大欲也自宴享飲食之禮廢而人之奉養無莭割鮮炙􅏂極海陸之珎以相侈尚罄萬錢於一飡俻百牢於一獻外則困衆人之力内則傷五臟之和卒至於廢其家􅀦而䘮其身與夫不甘粗糲遂􅈥其操􅁿冐危辱以營口腹之嗜者皆往往而是也而方士居窮岩􅅸谷之中禁斥􅅴􅃾啖粗礦之物卒􅀊而不厭亦難䏻之士㢤金華葉山人賣藥呉城南題其室曰煮石山房嘗邀余過之􅃌山而告曰是吾囷也苟不壊則無憂飢矣子䏻以文記吾居當授子是術焉余方有役於世未􅀎􅀙山人以學則雖有言未􅁕以知山人服食之妙也故獨以􅀁感於世者書之使㦯有囙余言而少警者去􅁋靡而樂􅌿泊亦豈非山人之志哉靜者居記潯陽張君來儀以靜者居名其􅀁寓之室嘗属余記之乆辭而未􅀗也一日與客往􅀱之入其室竹􅀣翳深庭户虗􅄫落然無囂聲客顧而歎曰羙哉居乎使張君不勤動於外有以自樂而成夫靜者非是居乎余謂客曰子何言之戾邪今有人焉䖏空谷之中棲長林之下干戈之聲不聞車馬之跡不至其居靜矣而利禄之念不忘於心窮約之憂每拂乎慮雖夷然而行塊然而坐顛倒攫攘無異奔騖於埃􅅽者子謂其果靜乎又有人焉逰於邑都宅於市里鄰有歌呼之喧門有造請之雜心倦乎􅀿荅身勞於􅀅迎其居非靜矣而抱廉退之莭慎出䖏之􅁩雖逐逐焉群於衆人而進不躁忽視世之揮霍變態倐往而倐來者若雲􅃄之過目漠然不􅁕以動之子謂其果非靜者乎盖靜也係於人不係於居人􅀎靜則無適而不靜是居之靜無與於人人之靜亦無待於居也雖然亦有待其居而靜者矣然非此之謂也傳曰居天下之廣居廣居仁也自克己以復之主敬以守之至於安重而不遷淵靚而莫測則其體靜矣故曰仁者靜張君之志盖在於是而假以名其室子豈未之思乎客未有以應張君起而謝曰居靜而非靜者吾知其􅀁警居不靜而靜者吾知其􅀁勉若居仁而靜者雖非愚􅀁及則􅂅學之焉子之言俻矣豈不􅁕記吾居㢤請書之顧余欲靜而末䏻者姑書以識之俟他日􅀙君而􅀙事焉夣松軒記昔馬璘嘗讀史見其祖援之㓛烈囙自感奮不忍使墜于地卒為名􅀅􅁇羙於前人矣近代卿相之後有不數傳其譜牒尚明家乗猶在而子孫巳失其業甚者目接其光輝身承其教訓纊窆未乆而棄衣冠之華趋沽販之賤不自知耻以玷厥祖者往往而是也璘乃䏻遐追逺慕繩其武於數十世之上可謂有志之士哉余友丁君志剛讀史書見其先有夣松生腹而為公者囙題􅀁居軒曰夣松以識追慕之意間属余記之余謂君今距公㡬世矣非有光輝教訓身承而目接也亦非譜牒之可㝷家傳之可續也乃欲逺繩其武亦可謂有志之士而無愧於璘者矣然君知公之夣松而亦知公之􅀁以夣松者乎盖公負挺特之才抱堅貞之操其徳有象乎松而􅀅為岩廊之用也故神䰟感㑹􅓹然之姿見於􅃦􅄰之間是非囙有斯夣之祥而䏻􅆀為么之貴盖有為公之噐而䏻召斯夣之样也若䡖詭䜛邪之徒而欲據台鼎之重者則其合睫之際松未生於腹上而蠅巳集於鼻端矣君今好學而脩盤礡田野茍䏻䖏是軒之中朝夕自厲以思紹公之徳則吉夣之来有時而其九重之上亦有徵夣而相求者矣傳曰公侯之子孫必復其始安晚堂記余在亰師同里朱君炳文以郡薦就試春官既雋而􅀅歸過余請曰天賚吾家使二親康強具存甞築堂奉之寛間靜深可以燕娯欲吾親之優㳺於是以樂其老也自題曰安晚􅂅子為我記之余惟孝子之安其親冝無時而不然何獨於其老㢤盖人朝而出晝而馳夕則宜息焉少而進壮而行老則宜休焉故凡届于桑榆之時筋力巳憊而猶勤動勞騖不使寜佚以享其餘年者非理之􅀁宜也傳曰老者安之然則孝子之於親雖無時不欲其安至於老也豈不尢􅀁當盡心㢤若夫安之亦有道矣奉觴調膳􅅴滑滫瀡以薦之親之口安矣而物有以拂其志則非􅀁謂䏻安也縣衾篋枕痒痾抑搔以事之親之軆安矣而行有以累其心則非􅀁謂䏻安也必也居而脩諸身出而事於君皆盡其道無一􅁕以貽親之憂則善矣不務於是而惟以口體之養為安豈未知其本哉余向居呉時嘗􅀗拜炳文之嚴君年六十餘而氣貌充充然固知其安之有素矣況逢今天子既定四海推大孝之心欲使天下之老者皆安炳文又以才進􅀅得禄而爲養其親有不安者乎吾又聞安則静静則難衰難衰則夀可必矣今炳文能安其親􅀅見蒼顔白髮婆娑於是堂之上者其樂未易艾也請記諸壁以俟水雲居記亰師四方之􅀁走集居人􅌨比而廬不􅂩尺地求遐曠之適無有也吳陵劉雨僑於東城之隅扁其室曰水雲居嘗請余為之記余間過其居而異之曰子之居前闤闠而後營衛固紛囂塵坌之區也惡覩夫水與雲㦲雨曰吾少家江海之上嘗觀夫洪波東馳浮雲飛􅀭吾則拏舟以娭泝洄瀾逐流景與之俯仰而上下心甚樂焉今雖􅄑䖏轂下顧以無材不􅀎備世用欲歸還鄕復􅀙二物者逰而未得也故名吾室以志之先生何疑焉余聞而愈異之囙告之曰夫雲之與水非􅀮者之􅀁宜􅀙也子見其滔滔於江湖悠悠於􅋁廓若無事然謂與己適相􅀋也欲狎而與之逰然不知舒布覆被而雨四海者雲也奔走放注而溉千里者水也彼皆有澤物之勞焉子乃以無事求之吾恐水逺逝而雲髙飛皆􅀅去子而不顧尚得而與之逰乎子今遭逢明時出門即朝廷之上其勢易達也當􅁬􅀭其光英􅆂泳其徳性進用於世使􅀁施有及於人則二物者皆即在子之身無􅀁往而不與之俱又何求於渺漫杳靄之郷乎雨瞿然謝曰先生命我矣遂書留其壁間以為記槎軒記槎浮木也余嘗客松江之上濵江之木當秋為大風􅀁摧折者随波而流顧而有感囙以名􅀁居之軒及逰亰師翰林學士金華宋公為􅂐二大字自是㦯仕㦯退東西旅寓􅀁至輙扁于室今年春自城南徙夏侯里苐復以掲于南軒客有過而疑者乃謂之曰子不觀夫槎乎衆槎之流同􅀉於水也而洄薄蕩汨㦯淪於泥沙㦯棲於洲渚㦯為漁樵之􅀁薪㦯為􅆉螘之􅀁蠧㦯乗洪濤東入於海茫洋浩汗莫得知其􅀁極而亦有一槎焉㦯墊㦯浮㦯泛㦯止方此倐彼而不可期者水實使之也然槎雖􅀉於水而無求於水水雖􅀎使槎而無意於槎其漂然而行泊然而滯随􅀁遭水之勢爾水盖未嘗有愛惡於槎槎亦不知有徳怨於水也人之生而繫命乎天者亦何異是哉夫林林而立者皆人也而有貴為王公有賤為輿隷有富有千駟有貧不􅀎飽一簞亦有一人之身而始困終亨前興後仆變遷無常而轇轕不齊者非天孰使之然天雖使之而豈有意哉磅礡絪緼厚薄随其􅀁得與人漠然而人自不䏻違爾世之不安乎天者乃疲智力以營􅀁欲悲失喜得而卒不知得失之不在已也非惑歟此余􅀁以有感於槎而取以名軒也且子又不觀夫水與天乎其奔渟也随地形而成其旋運也乗氣機而動二者猶不􅀎自任而況槎與人乎若余天地間一槎也其行其止往者既知之矣来者吾何􅀁計㢤亦安乎天而巳矣顧吾槎方止􅄑不為薪且蠧則是軒者其淪棲之地乎既對客遂書于壁以自厲洪武六年秋九月青丘退史記逰靈巖記呉城東無山唯西為有山其莑聮嶺属紛紛靡靡㦯起㦯伏而靈巖居其間㧞竒挺秀若不􅈕與衆峯列望之者咸知其有異也山仰行而上有亭焉居其半盖以莭行者之力至此而得少休也由亭而稍上有穴􅆼然曰西施之洞有泉泓然曰浣花之池皆呉王夫差宴逰之遺䖏也又其上則有草堂可以容栖遲有琴㙜可以周眺覧有軒以􅀡洞庭之峰曰抱翠有閣以瞰具區之波曰􅆂空虗明動盪用號竒􅀚盖專此􅀖之羙者山而專此山之羙者閣也啓呉人逰此雖甚亟然山毎匿幽閟勝莫可蒐剔如鄙予之陋者今年春􅀙淮南行省叅知政事臨川饒公與其客十人復来逰升于髙則山之佳者悠然來入于奥則石之竒者突然出氛嵐為之蹇舒杉檜為之拂舞幽顯巨細爭獻厥状披豁呈露無有隱遁然後知於此山為始識於今而素昧於昔也夫山之異於衆者尚􅀎待人而自見而況人之異於衆者哉公顧贍有得囙命客皆賦詩而属啓為之記啓謂天於詭竒之地不多設人於登臨之樂不常遇有其地而非其人有其人而非其地皆不􅁕以盡夫逰􅀚之樂也今靈巖為名山諸公為名士盖必相湏而適相値夫豈偶然哉宜其目領而心觧景㑹而理得也若啓之陋而亦與其有得焉顧非􅄑也歟啓為客最少然敢執茟而不辭者亦􅀅有以􅀻識其􅄑也十人者淮海秦約諸暨姜漸河南陸仁㑹稽張憲天台􅉟參豫章陳増呉郡金起金華王順嘉陵楊基呉陵劉勝也素軒記魯丹桓宫楹而春秋譏之夫以諸侯過飾其宗廟聖人猶見非於禮制之不可踰如是也後世習俗奢僣波頺風靡䏻循乎禮者寡矣浮屠之法又為世􅀁崇故往往大為其宫飾以金銀塗以彤碧輪奐絢爛以事其􅀁謂荘嚴者論者未嘗非之䖏者亦不自疑盖可歎也浩上人居呉之靈鷲院􅌿泊清苦持其律甚謹嘗被召赴亰而還治室於舎之西偏簡朴粗完無彩繪之飾榱桶壁牖悉塗以堊問之則曰吾非不􅀎為彼也誠以安居而食於人得此亦􅁕矣尚敢有加㢤囙自題曰素軒而求余記之上人可謂善居室者矣有自􅁕之心無踰禮之弊是皆可書則為之記也寔宜乃進而告之曰夫雕鏤􅅣刻不如璞玉之渾堅烹餁調和不如大羮之和羙文章詞令之工威儀容觀之盛不如忠信之􅁕貴則彼知輪奐絢爛者固不如兹軒之朴素也然吾聞􅀃者曰素者質也白也質則實而不華白者純而不雜既實且純道之體具矣則素其軒孰若素其行素其行又孰若素其心哉上人於是而􅆀力焉則可以盡名軒之義矣余以上人好􅀙儒先君子逰故以是告之且并以􅀁感者書之尚無以余言為其徒病也夫歸養堂記稽岳王常宗父文行髙峻甞以布衣召修元史議論制作􅁛執茟之任焉書成上進同舘之士咸得賜金幣遣還有欲薦入禁林者常宗辭曰吾非不欲仕也顧毋老不樂去其鄕旁又無他子侍餋吾可留此而使吾母乆西望乎吾亟歸爾乃歸得苐一區於祈川之郭有花竹池沼之勝中一堂寛閒靚宻燠􅈵具宜常宗則奉太夫人以居旦輙􅃣帶率婦子升視􅄿巳取聖賢之書詠歌於其側家雖貧而安焉毋詔子唯怡愉如也嘗名其堂曰歸養使來属余記之有疑者曰異哉常宗之名斯堂乎吾間為養而出仕者矣未聞舎仕而歸養者也及親之康強當奮取髙爵他日奉身而還駟車洋洋光耀閭里奉牲酒上堂以為娯則􅀁謂養者豈若今而巳常宗何遽歸哉余曰不然也古之為養而仕者以抱關於其鄉不必去其親也不舎仕而養者以受命有方王事之靡盬也且官守之責未及菽水之奉猶具豈䡖逺其親㢤故雖莫不欲登踐華顯以為親之榮然亦莫不憂曠􅇅定省以貽親之思也若夫身貴䏻退而及養者事之不可必者也親老而當衰者心之􅀁宜懼者也於宜懼之年而去以待不可必之養是得為智者乎由是觀之則常宗之歸養亦無􅀁不可矣然則堂何以名曰志其樂也盖養雖常宗之志歸則朝廷之賜蒙上賜而為親驩樂孰甚焉名堂以示不忘忠孝之義在矣而子何疑乎言已常宗又以書來􅇂記遂論次復命焉旦夕東逰登堂拜太夫人於賔友之末尚當賦之以為夀也春水軒記余寓野之居有軒焉其左右皆名田今年春􅁋雨淹月江水夜溢潦被于田漭若巨陂余嘗開軒而望之見其微風吹瀾瀰漫一白蒲菰之􅀁以榮魚鴨之􅀁飛泳􅄅然有江湖之想焉意頗樂之乃題其扁曰春水間延客飲其中客顧而歎曰嘻子宅此㡬年矣甞見有是水乎湯湯之流則昔秩秩之畦翛翛之菰則昔芃芃之麥也今吾農方運機本以引深抱積薪以塞决子固目之矣然彼皆驚而馳子獨恬而嬉彼皆戚而􅃅子獨喜而哦何子之情遠人哉夫田不登則􅀊飢􅀊飢則民窮民窮則里弗靖里弗靖子􅀎專有是樂乎今奈何以目之適而忽身之厲哉余瞿然曰有是乎客退欲撤其扁既而思曰是􅁕為吾規矣且使凡欲樂於已忘人之憂者入吾軒者皆有以覧而自警焉豈不可㦲遂書客之言于壁以為記白田耕舎記白田在呉淞之濵距郭三十餘里呉淞由具區之水東流而為川去海不逺潮汐之􅀁通焉其旁名田數十萬頃悉頼以灌惟白田最下常為水􅀁冐􅀊不得藝人囙以是名之父老患焉相率築堤以防其外畚土以培其中爲勤累年而免於水今乃遂成􅃾沃與他田比耕者資其􅀁出咸自􅆀殷􅁕焉丁至恭氏居田之左嘗闢一室前臨平疇後列嘉􅀣日課僮奴以耕休則􅅯息於其中囙名曰白田耕舎余居江上與其室甚迩至恭囙造余固請爲之記焉余惟至恭欲知耕之說則􅀅求老農而學焉又奚俟於余㢤吾知􅀁以記之矣盖嘗觀乎是田始爲蒲葦之陂今則禾􅁰之􅀁生焉始爲鳬鴈魚鼈之􅀁逰集今則耕者之来雜出於其上焉豈地有變哉人力􅆀然也嗟夫人之於田䏻積用其力雖汚澤可使爲羙壤至於其身而不思􅀁以變之豈愛身不若於田乎故凡人欲之汨於其心者䏻由禮以防之充善以培之使禮義之根常發則愚者可爲智不肖者可爲賢矣至恭好學而修固當有務於此豈徒服力􅅵畒爲野人之事而巳耶朝往于田夕歸于斯室取聖賢之書而讀之求􅀁以自治之道至於有成則其􅀁􅀗不止於有秋矣尚毋曰無佃甫田維莠驕驕也書鳬藻集後予在京師嘗得髙先生季迪所著詩曰缶鳴集姑蘇雜詠者讀之愛其清淳典雅得詩人之旨趣意其文當稱是旣而奉命出按吳中暇日因過巡撫亞卿周公寓所又得先生之文曰鳬藻集觀之反復再四見其能闡造化之祕發義理之微窮人事之變引物連喻導􅏡規諷貫穿經史百氏之言一本諸至理而氣以昌之可以明人事吉凶禍福之幾監古今成敗得失之迹視彼絺繪藻􅅣不明乎至道無􅀜乎世教者烏在其爲文哉爰命鋟梓欲其與詩而並傳也若夫先生之出處志節名位履㦄之詳則有隴西志光李公與今亞卿周公爲之紀述矣兹不復贅正統九年六月旣望監察御史錢塘鄭顒書
