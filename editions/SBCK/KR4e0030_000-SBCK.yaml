front:
  text: 髙太史傳髙啓字季迪吳郡人生元丙子少警頴力學遂工於詩上窺建安下逮開元大曆以後則藐之天資秀敏故其發越特超詣擬􅇹謝則似之法李杜則似之庖丁觧牛􅈕綮迎刄千彚萬􅁼規摸同一􅁤山龍華􅆉如其貴也象犀珠玉如其富也秋月氷壷如其清也夏􅁎王嬙如其麗也田文趙勝如其豪也鳴鶴翔雲如其逸也仍和陶韋大羮元酒之味不閑二宋粟布之征所謂前齒古人於曠代後􅃣来學於當時者矣東呉騒雅士悉推之無慊爲文尚氣多辯難攻擊之體讀之亹亹忘倦大抵以先聲掩其兼美張士誠有浙右時羣彦多􅀙仕者啓獨挈家依外舅周仲達居呉淞江上歌詠終日以自適焉陪臣饒介之丁仲容軰以詩自豪及見啓為歎服啓尤好權畧論事聳人聽故與饒如授左契之交者若王􅃔􅀭基杜寅張憲張羽周砥王行宋克徐賁之徒胥不覊贍才爽邁有文談辯華給􅍀然以為天下無人一時武勇多下之眀興以某臣薦偕謝徽䓁聞於朝與修元史授翰林國史編修官復命教授諸王乆之推任喉舌之司待以不次與徽䓁懇辭乞歸田里制可仍賜金以還復居江上遨逰青丘甫里之墟始􅃅槎軒又􅃅青丘子銳志亦不少衰矣居㡬何忽􅀙故時一二俠入逰于郛適江夏魏觀為郡老而好士延見王􅃔輩啓嘗㑹于亰尤禮遇之不得巳亦厠為客復強辭之歸故里殊悒悒不樂遂蹇連以沒年甫三十九嗟乎使啓少延則駸駸入曹劉李杜之壇奚止此㢤其詩類藁蔵於家未即顯􅀄富啇陳寶生欲為夀諸梓啓不許乃止凡傳録而誦之者無不歆羡必不泯焉余與啓同里知其人為詳故特為傳庶貽不朽云洪武乙卯二月隴西李志光書髙太史鳬藻集序文以理為主而氣以發之理明矣而氣􅂉不充則意雖精辭雖達而萎薾不振之病有所不免蘇文㝎公曰文者氣之所形文不可以學而能氣可以養而至善􅀚文者􅀚其氣之所養何如耳唐虞三代之文尚矣自秦而下文莫盛扵漢唐宋漢之賈董班馬劉􅀭唐之李杜韓栁宋之歐蘇曽王之數公者各以文章名家其初豈必追􅅣絺繪學為如是之言乎其所以寛􅌋宏博汪洋放肆而不可掩者則其浩然之氣所養可知也我太祖髙皇帝龍飛之初鍳近世華靡之􅁦制誥典冊之文一尚淳朴當時在兩制居史舘者皆極天下之選而髙先生季迪其一人也先生名啓姑蘇人自少警敏力學弱􅃣即以詩文鳴扵郷郡張士誠據有淛右屢以禮招之不就避地居吴淞江上以詩文自娱樂洪武初以廷臣薦與􅁱元史授翰林􅀦史院編脩官復命教授諸王乆之拜户部侍郎以年吵不敢驟膺重任辭歸故郷益肆力扵詩文居數載不幸以故人得罪沒于亰師年甫三十九其詩有􅇲鳴集有婁江吟藁有姑蘇􅇎詠皆已久傳于世四方之人莫不知其詩名而獨未見其文也予来姑蘇訪求扵先生之内姪周立得其手抄先生之文曰鳬藻集凡五卷因取而讀之愛其意精而深辭達而暢有温純典則之風而不流扵踈略有謹嚴峻潔之度而不渉扵險僻詼洽而非綴緝明白而非淺近不粉􅎖而華彩自呈不追􅅣而光輝自著盖由其理明氣昌不求其工而自無不工也讀之不忍􅇚手自是其集㽞予􅀁者十有餘載今年春􅁥察御史錢唐鄭公士昻過予公舘中論及先生之詩而亦以未見其文爲慊予因出是編相示鄭公讀之既卷而歎曰古人論文章謂一代不􅁆人一人不數篇先生没巳七十年是􅁆篇者幸而尚存豈易得㢤是不可以無傳乃属司訓張素略加校正命長洲縣丞邵盺以公錢刻置郡學且徵予為之序嗟乎方張士誠據淛右時士大夫之欲苟且貴富者莫不􅀙仕以就陪臣之列先生獨脱然去之而以詩文自娱樂此其浩然之氣所養為何如㦲􅀚扵是集􅀙可知矣序而傳之使世之讀是集者非惟知先生扵詩文有兼至之長抑使知浩然之氣在天地間不以貴賤夀夭而有􅀁增損也正統九年六月望日正議大夫資治尹工部左侍郎雙崖周忱序
