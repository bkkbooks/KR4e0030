body:
  text: 髙太史扣舷集附後學周立編集念奴嬌自述筞勲萬里咲書生骨相有誰曽許壮志平生還自負羞比紛紛児女酒發雄談劍増竒氣詩吐驚人語風雲無便未容黄鵠軽舉何事匹馬塵埃東西南北十載猶羈旅只恐陳登容易咲負却故園雞􅁰笛裏関山樽前日月回首空凝佇吾今未老不湏清淚如雨踈簾淡月秋柳殘結恨結是弱舞􅀄闌困眠纔歇緑少黄多錯認早春時莭西風也送誰􅄐别㫁長條似人攀折謾思曽見燕􅁁分翠馬頭吹雪君莫問陏宫漠􅇅総寒􅃄細雨曉風殘月不帶流鶯却帶㫁蝉悲􅍋老來膓緒應愁絶江南横管吹切莫欺憔悴明年依舊萬隂成列石州慢春思落了􅉝夷風雨頓催庭院瀟洒春來長恁樂章􅂴按酒籌慵把辭鶯謝燕十年夣㫁青樓情随柳絮猶縈惹難覔舊知音把琴心重冩妖冶憶曽携手􅋐草䦨􅁁買花􅄕下看鹿盧低轉秋千髙打如今何䖏捴有團扇􅁿衫與誰更走章䑓馬回首暮山青又􅄐愁來也眉撫夫差女瓊姬墓悵紅蘭採罷白苧歌殘䰟㫁舊宫路長夜泉䑓冷􅄪誰把雲屏月帳遮護鈿車不度正舘娃荆􅁄多露想還有舊日吹簫侶共來往􅃄霧城郭江山如故自􅀦亡家破今㡬朝暮水􅁁花下黄昏後誰逢環珮微歩恨多莫訴任玉􅁫雙燕埋土待相約呉娃寒食到此澆墓水龍吟晝紅竹淇園丹鳳飛來幾時留得叅差冀簫聲吹㫁彩雲忽堕碧雲猶膈想是湘靈淚彈多䖏血痕都積看蕭踈瘦影隔簾欲動􅀿似落花狼籍莫道清髙也俗􅄪相逢子猷還惜此君未老􅀊寒猶有少年顔色誰把珊瑚和􅃄換去琅玕千尺細看來不是天工却是􅃚春風筆天仙子懷舊憶共當年逰冶伴愛􅃪秦娥青玉案􅃈窓春暁酒􅀄醒鶯也喚人也喚不問誰家花惜看舊事那知回首換畫舫空閒楊柳岸相思日暮隔梁園山一半水一半望眼别腸齊欲㫁一剪梅閒居竹門茅屋槿籬笆道似田家又似山家敞披鶴袖岸烏紗看過黄花待看梅花晚時飲酒早時茶風也由他雨也由他􅀙來不㑹治生涯誰與些些天與些些玉漏遲夕陽無限好凭䦨却怨昏鴉㱕早一片寒􅃄鎻㝎㡬家䑓沼料想青山咲我自亂後逰􅍡不到憔悴了􅀅軍故柳王孫芳草􅄫寞椘舞呉謌歎轉眼前歡水空雲杳試問天涯故人近來應老只為微知世故比别箇倍添煩惱須信道人生􅁛心時少多麗弔七姫倩嫦娥呼天試問如何向人間生成尤物䓁閒又把消磨揉群花亂飄塵土毀聮璧碎擲􅃄波謾􅀃無雙傾城曾數八人少箇六人多一般様細腰梟裊髙髻峩峩奈干戈筵上艶曲忽翻做帳中歌忍教受項纒素帛渾忘記臂結紅羅翠􅀍都閒玉鈿盡落䰟逰􅀿去馬嵬坡誰􅀎發香裀觧看怕肉尚温和堪腸㫁空樓月落廢院春過謁金門渡江風怗怗江與暮天相接欲􅋐白鷗飛得捷兩童揺兩楫試觧祫羅香摺秋似緑荷先怯收拾詩愁都在篋比山多㡬疊倦㝷芳曉雞喚回好夣呼起間愁何䖏咿喔呌得霜飛早似戍樓梅角征鐸車前都巳動朝衣燈下應􅀄着最怱怱念帳中驚聽送郎行却問何事不􅀎緘口催得人間許多􅄐索我厭功名怕候曉關開鑰但戀五更衾枕煖不知千里程途惡且髙眠任窓月被他啼落太常引丁校理邀觀妓失期不赴幾時相約畫樓中同賞小枝紅尊酒太匆匆剛少个風流醉翁歌聲巳逺夣魂􅀄㫁無分見春風不見尚愁濃若見後愁添萬重賀新郎喜徐卿逺訪人事浮雲變為如何忽然而别偶然而見今古這些􅄐合夢多少酒愁詩怨君共我任隨蓬轉當見望窮天際眼却今宵看熟燈前面談咲䖏兩忘倦淮鄕椘澤知逰徧問江南歸時誰有故家庭院拂了征衫舊塵土􅄪整賞笻吟卷随䖏裏山留水戀作个東坡來往友筭平生富貴非吾􅂅舉此酒祝長健昭君怨催梅試問南枝何故未􅈕􅀅春全露意欲吐些香且啇量雖是花中最早更放早開尤好火急報花知要題詩沁園春寄内兄周思誼憶昔􅀄逢意氣相期一何壮㢤擬獻三千牘呌開漢關躡一雙蹻走上燕䑓我勸君酬君歌我舞天地踈狂兩秀才驚回首謾十年風月四海塵埃摩挲舊劍生苔歎同掩衡門盡草萊視黄金百鎰巳随手去素􅁝幾縷欲上頭來莫厭栖栖但存耿耿淂失區區何􅁕哀心惟􅂅長對尊中酒滿􅀣上花開木蘭花慢過城東廢苐正春來夣好春忽去怎留􅀅早月墜筝樓塵生㦸户草滿毬塲羙人盡爲黄壌恨温柔難把作家鄕桃李一番狼籍燕鶯幾許凄􅈵虚言地乆天長回首巳斜陽􅄸只爲當年多些歡樂少个思量不見門前繁馬有栖鴉獨占垂楊試問朝來過客誰人􅈕爲悲傷清平樂夜坐新詩吟罷兀坐寒窓下􅄫寞家中如客舎風􅀨江南今夜侍児勸我湥杯好懷恰待舒開叵奈燈前過鴈一聲又送秋來憶秦娥感歎㓛名驟時人咲我真迂繆真迂繆不􅀎進取㡬年落後一􅂣翻䨱難收救布衣惟我還如舊還如舊思量前事是天成就酹江月遣愁問愁何似似掃除不㫁無根狂絮􅀿是覊懐難着盡􅄆入江雲江􅀣夜􅀨心頭秋風􅁂脚総是相㝷䖏重門雖掩㡬曽障得他住難學盧女情腸江淹􅁃信空賦凄􅈵句偏要相欺間裹客端的此情難恕見月還悲逢花也惱對酒方無慮他來休怕但教䏻遣他去沁園春鴈水落時來花發時歸一年又年記南樓望信夕陽簾外西窓驚夣夜雨燈前冩月書斜戰霜陣整横破瀟湘萬里天風吹㫁見兩三低去侣落筝絃相呼共宿寒􅃄想只在蘆花淺水􅁁恨嗚嗚戍角忽催飛起悠悠漁火長照愁眠隴塞間関江湖冷落莫戀遺粮猶在田須髙舉教弋人空慕雲海茫然行郷子芙蓉如此紅粧不見春光向菊前蓮後􅂊芳鴈來時莭寒沁羅裳正一畨風一畨雨一畨霜蘭舟不採寂寞横塘強相依暮柳成行湘江路逺呉􅁐池荒恨月濛濛人杳杳水茫茫滿江紅客舘對雪古硯生氷衾潑水酒醒寒切窓竹裏似風非􅀨蕭颼騒屑欹枕夜聽􅀌舘靜開門曉看千山㓗問人間何䖏是乾坤無分别茅店外青旗折畫閣上朱簾掲憶少年䜹狂偏在探梅時莭深帳酒巵歌宛轉小爐茶椀詩清絶歎如今􅀊晚客天涯人􅄐别如夣令寒夜􅈍火紅銷金鼎鴉􅀣不驚風靜多事月明來照出小窓孤影宵永宵永䥫做梅花愁冷酹江月送金吾石􅀅軍赴鄧州守虎頭猿臂問立㓛何䖏風塵􅁁障身帶寳刀㱕宿衞人識金吾名􅀅鐃吹聲中旌旗影裏愼識翠輿行仗周廬直罷建章㡬度雞唱君㤙特念勲勞鳳衘新誥忽堕丹霄上官在臥龍人􅀮䖏看繞郡白雲青嶂莫射雙鵰好乗五馬試問野人無恙梅花江路送行何用惆悵􅁲筭子亰師早起窓燈漸漸昏樓皷頻打不是寒宵不肯明想是鄰雞啞氷生半井泉霜􅄆千家瓦強起披衣逐早朝門外聞珂馬􅁲筭子有懷帶得片情來留下多愁去不繁羅裙帶上詩知向誰家住􅄐程渺渺山别意重重􅀣湏信江東日暮雲自古相思䖏江神子江上偶見夫容裙􅙳最宜秋柳􅁁頭自撑舟一道眼波斜共晚波流驀地逢人回首咲不識恨却知羞夕陽猶在水西樓慢㱕休欲相留教喝彎彎月子照湖州不怕鴛鴦驚起了怕江上有人愁天仙子秋夜客中炙了青燈􅀄掩帳四壁蛩鳴催旅況瀟瀟索索雨児來梧葉上栁葉上兩䖏秋聲愁一様此夜江雲迷疊嶂好夣欲㱕難􅀝仗巳􅈵未冷惱人天眠一餉坐一餉白􅄠明朝應㡬丈清平樂春晚看花過了剰得春多少新緑滿園庭院悄鳥啄櫻桃紅小夢随蝴蝶東家􅁴來空掩琵琶不見侍兒纎手自籠紗㡌煎茶摸魚兒自適近年稍諳時事傍人休咲頭縮賭棊㡬局輸嬴注正似世情翻覆思􅄸熟向前去不如退後無羞辱三般撿束莫恃微才莫誇髙論莫趂閒追遂雖都道富貴人之􅀁欲天曽付㡬多福倘來入手還須做底用看人眉目聊自􅁕見放着有田可種有書堪讀村醪且漉這後段行蔵􅀙天發付何須問􅀛卜水調歌頭謝恵酒晝夣驚起雞呌􅋐喈喈是誰扣我門户道是􅎘生來今日江頭風雨生怕詩人岑寂特地到寒齋一見即傾倒咲口為頻開洗愁空催句就挽春回不憂蓆㡌衝冷便欲去㝷梅􅁍咲盧仝何苦偶得酪奴相過也擬上蓬萊此味正不淺看我玉山頽鷓鴣天秋懐鼓動江城一鴈秋夕陽山色滿長洲十年舊事都成夣半篋新詩総是愁書咄咄歎休休文君咲典鷫鸘裘不如俠少渾無賴醉殺東家燕子樓髙太史扣舷集終
