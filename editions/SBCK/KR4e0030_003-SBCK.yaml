front:
  text: 髙太史鳬藻集卷之三
  hash: sha256:81e2acc3d28f2e370a7958dc21ea59011902c28bdb7f51855eb788ee864c7902
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0030_SBCK_003-1a}
body:
  text: 後學周立編輯序十八篇師子林十二詠序師子林呉城東蘭若也其規制特小而􅃅為幽勝清池流其前崇丘峙其後恠石􅒞崒而羅立羙竹隂森而交翳閒軒凈室可息可㳺至者皆棲遅忘㱕如在巖谷不知去塵境之宻邇也好事者取其勝槩十二賦詩咏之名人韻士属有􅁇作住山囙公裒而為卷􅃣以睢陽朱澤民舊􅀁繪圖而請余叙焉夫呉之佛廬最盛樷林招提據城郭之要坊占山水之靈壤者數十百區靈䑓傑閣薨棟相摩而鐘梵之音相聞也其宏壮嚴麗豈師子林可儗哉然兵燹之餘皆委廢於榛蕪扄閉於風雨過者為之躊躇而悽愴而師子林泉益清竹益茂屋宇益完人之来逰而紀咏者益衆夫豈偶然哉盖創以天如則公􅂅力之深􅁇以卓峯立公承守之謹迨今囙公以髙昌宦族棄膏粱而就空􅄫又䏻保持而脩舉之故􅀴變而不墜也由是觀之則凡天下之事雖廢興有時亦豈不繫於人哉余乆為世驅身心攫攘莫知􅀁以自釋閑訪囙公於林下周覧丘麓復以十二詠者諷之􅁴脫然有得如病暍人入清􅈵之境頓失􅀁苦乃知清泉白石悉觧談禪細語麄言皆堪悟入囙公􅀁以葺理之勤而集録之俻者盖為是也不然則飾耳目之觀賞詞華之羙皆虗幻事豈學道者􅀁取哉是則來逰而有得者固不得而不詠囙公亦不得而不編既編則余又不得而不序也贈錢文則序韓文公詩有曰我生之􅀄月宿南斗蘇文忠公謂公身坐磨碣宫也而已命亦居是宫故平生毀譽頗相似焉夫磨碣即星紀之次而斗宿􅀁􅄤也星家者說身命舎是者多以文顯以二公觀之其信然乎余後生晚學景仰二公於數百載之上盖無䏻爲役而命亦舎磨碣又與文忠皆生丙子是􅄑而偶與之同也二公之名雖重當世而遭逢排擯謗毀㡬不自容仕雖嘗顯於朝而貶陽山謫潮州竄逐於羅浮儋耳之間踰嶺渡海冐氛霧而伍蠻蜃其窮亦甚矣顧余庸庸雖不䏻􅃱盛譽亦不爲排謗者􅀁及況遭逢聖明忝軄禁署蒙㤙賜還無投荒之憂是􅄑而不與之同也然二公之文章徳業赤然照暎千古而余早罹艱虞中事奔赱學不加脩文無可采􅀅泯焉為衆人之歸是不􅄑而不􅀎與之同也噫命之􅀁舎既同則宜無不同而何相去若是之遼哉盖窮達得䘮由乎命智愚賢否存乎人存乎人者可為由乎命者不可必世之人常以不可必者責於命而不以可為者責諸巳􅀁以多自恕而倖得也若二公者其道同其文學同故毀譽窮達有不必其同而自同則余之不􅀎與之同者盖有在也而豈命之罪哉山陽錢文則􅀎推星以言人之禍福無不竒中士大夫多􅁛道之􅀅逰湖海徴余言為贈囙書􅀁以自警者貽之且使遇夫自恕而倖得者告焉文則讀書好脩善鼓琴斯術其餘事云送示上人序報㤙教寺在呉之北郭距吾舎為近其中有脩竹古􅝸廣堂䆳閣可以覧觀眺望却煩囂而挹虗爽其主席若無言宣白雲聚又皆賢而與余善故與諸文友􅀭孟載張來儀王止仲徐㓜文􅒰數往逰焉每登西麓聚落葉籍坐探韻賦詩抵日入鳥歸乃去寺僧好事者亦往往挈茗抱琴來徔之有示上人者居衆中年雖少而警慧好學余固期其為良緇流也後余徙家于郊及徔仕南亰不復至者數年既歸今年春始一過焉而無言白雲皆巳化去舊僧多􅄆亡竹􅀣舎宇頗蕪廢弗理計當時同逰者惟止仲在郡餘㦯出㦯䖏亦各之四方俯仰躊躇爲之衋然以悲而示上人聞余來迎勞甚驩語昔逰之樂意􅀂􅂅復徔余周旋者叩其學則巳􅀎究宗要且攻爲詩章方爲今住山囙公􅀁知延爲寺之苐一座余知其果可爲良緇流也則復爲之逌然以喜焉未㡬上人往住呉江之寳􅁴寺士大夫多賦詩送之其徒與余善者宗源爲來請序其首囙書疇昔之事與知上人之素者貽焉夫上人往矣然吾聞寳􅁴在呉淞笠澤之間江雲湖波沙禽浦􅀣朝夕變化之状不可摹繪固東南之勝區􅀁謂可以覧觀而眺望者又當逺過報㤙則余不可以不逰也欲逰安得復與向之諸文友者同㢤贈醫師何子才序余嘗與脩元史考其故實見士之行義於鄕􅀎濟人之急者皆具録焉㦯謂死䘮疾病之相救助固鄕黨朋友之事非甚難􅀎者夫何􅁕書余則以為自世教衰人於父子昆弟之㤙猶㦯薄焉其視他人之危􅀎援手投􅁕以拯之者於世果多得乎不多則君子宜與之不可使遂泯也乃采其尤卓卓者為著于篇自退伏鄕里聞有斯人之風者猶復為興慕焉一日趙子禎氏謁余城南言曰近㒒自淮南携累而東歸也奔赱水陸之艱觸冐霜露之慘既抵家而俱疾焉盖老稚數口無免者呻吟咿嚶僵臥滿室湯粥之奉不時恤問之友不至相視盻然為溝壑矣醫師何子才日來視之療治周勤藥褁成績㒒有慚心而子才無倦色既彌月而皆起焉今以衰暮之年與老父㓜孫復得相依以保其生者皆子才之賜也顧無以報􅂅恵一言識區區之感焉余以子禎家素貧固非常有徳於子才而子才亦非有兾於子禎者乃活其闔門於瀕死豈非以濟人之急為心而世􅀁不多得者乎若是固不可使無聞也然余文思荒落不􅀎張子才之賢姑序以復於子禎氏子才􅀎存此心而不息義聲積著則固有當代之執茟者書矣婁江吟藁序天下無事時士有豪邁竒崛之才而無􅀁用往往放於山林草澤之間與田夫野老沉酣歌呼以自快其意莫有聞於世也逮天下有事則相與奮臂而起勇者騁其力智者效其謀辯者行其說莫不有以濟事業而成㓛名盖非向之田夫野老􅀁􅀎羈留而狎玩者亦各囙其時焉爾今天下崩􅄐征伐四出可謂有事之時也其决䇿於惟幄之中􅀭武於軍旅之間奉命於疆場之外者皆上之􅀁需而有待乎智勇􅀎辯之士也使山林草澤㦯有其人孰不􅂅出於其間以應上之􅀁需而用已之􅀁䏻有􅈕槁項老死於布􅄄藜藿者㢤子生是時實無其才雖欲自􅁬譬如人無堅車良馬而欲適千里之塗不亦難矣故􅀼伏於婁江之濵以自安其陋時登髙丘望江水之東馳百里而注之海波濤之􅀁洶欻􅃄雲之􅀁杳靄與夫草木之盛衰魚鳥之翔泳凡可以感心而動目者一發於詩盖所以遣憂憤於两忘置得䘮於一咲者􅀄不計其工不工也積而成帙囙名曰婁江吟藁若夫衡門茅屋之下酒熟豕􅏂􅀙田夫野老相飮而醉拊缶而歌之亦􅁕以適其適矣囙叙其篇端以見余之自放於江湖者為無􅀁􅀎非有􅀎而不用也送虗白上人序余始不欲與佛者逰嘗讀東坡􅀁作勤上人詩序見其􅁛勤之賢曰使勤得列于士大夫之間必不負歐陽公予於是悲士大夫之風壊已乆而喜佛者之有可與逰者去年春予客居城西讀書之暇囙往雲岩諸峰間有􅀁謂可與逰者而得虗白上人焉虚白形癯而神清居衆中不妄言咲余始識於劍池之上固心巳賢之矣入其室無一物􅁦簀折鐺塵埃蕭然寒不暖衣一衲飢不飽粥一孟而逍逕徜徉若有餘樂者間出􅀁為詩則又紆徐怡愉無急迫窮苦之態正與其人􅀋方春二三月時雲岩之逰者盛鉅官要人車馬相属主者撞鐘集衆送迎唯謹虗白方閉戸􅄫坐如不聞及余至則曳敗􅂂起􅀙􅃌幽􅋚勝於長林絶壁之下日入而後己余益賢虗白爲之太息而有感焉近世之士大夫趋於途者駢然議於廬者驩然莫不惡約而􅂅盈迭誇而交詆使虚白襲􅃣帶以齒其列有肯爲之者平㦯以虗白佛者也佛之道貴靜而無􅀻其䏻是亦宜耳余曰今之佛者無呶呶焉肆荒唐之言者乎無逐逐焉􅀙造請之役者乎無髙屋廣厦以居羙衣豐食以飬者乎然則虚白之賢不唯過吾徒又􅀎過其徒矣余是以樂與之㳺而不知厭也今年秋虚白􅀅東逰來請一言以爲贈余以虗白非有求於世者豈欲余張之哉故書􅀁感者如此一以風乎人一以省於已使無㦯有愧於虚白者而已送劉侠序至正二十三年秋太尉承制以市舶提舉呉陵劉君同知松江府事􅀅行其同列走書來徴文以道其羙余於劉君辱交最􅌋今之去雖無請者猶不敢黙然而已況勤諸君之請邪然劉君之碩材㓗操隆聲雅望其自撫戎政司啇稅􅀁以威輯乎悍卒恵被乎逺人者既已充聽者之耳而􅄶談者之口矣余何加乎若夫推太尉以用君之意以慶其民􅄑者則亦無幾焉昔呉之冨擅南服其属邑旁郡亦􅃅蕃庶自窺西疆相望殘燬而松江於東一柝之警不起民恬物熈獨保完實斯其民亦􅄑矣然數年間軍旅之需殷而賦歛之役亟彼創殘疲羸者既不可以重困則凡有􅀁征捨兹土奚適㢤故芻粟者往焉布縷者往焉朝馳一傳需某物暮降一符造某噐輸者属於途􅇂者雜於戶地雖未受兵而民已病矣於是怨咨之聲流刻􅁦之形見梘他邑之民雖葺破墾廢而泰然田廬中無發召之勞無課責之苦反若有不及者吁其􅄑乃􅀁謂不􅄑歟今太尉知其然慨然思得良吏以撫循之而劉君􅀗在選焉夫同知與太守相可否於黄堂之上者其爲任不􅁿而重也劉君亦知其􅀁以致此乎余聞太尉之􅀅授君以是軄也􅃌其名語僚佐曰此人􅀎愛民夫愛民先王􅀁以治天下也而況一郡乎哉太尉􅀎以是取人可謂知􅀁本矣且劉君往矣必􅀎益發之於政則松江之民不其又􅄑歟雖然古之人聞凡一言之善則􅀭之而不敢􅀮況聞之於上者乎余之區區􅀁以樂道斯語非惟有以張劉君也亦􅀅使凡吏於時者知在上之意而􅀅順之則民之爲􅄑廣矣庶乎結厚澤於悠深復盛治於熈洽也他日考之豈不有􅀁自哉贈醫士徐仲芳序昔柳子傳宋清言清居善藥有就清求藥者雖不持錢皆與之積劵如山度不􅀎報輙焚劵余固疑清之未善也苟不責報尚何以劵為哉又言清取利逺故大而卒以富是知清猶未免於利耳吳醫徐仲芳世攻治小児至仲芳而益精人之請於門者相属也仲芳視其為士大夫及窮乏者輙先焉雖烈風赤日乗一驢兀兀黄埃中周臨其廬無敢後其視疾必謹與劑必良嬰稚之賴以不殤者盖衆矣有奉物􅍗仲芳謝者卒却去㦯問之則曰士大夫吾􅀁敬窮乏吾􅀁憫義皆不可􅂑吾非爲詭也彼資雄而仕達者固又何辭故人皆徳仲芳雖後有復請仲芳赴之益先人至有愧心而仲芳無倦色嗚呼若是可不謂賢乎世嘗言今之人不及於古逺矣觀清之焚劵而仲芳并劵有不取清猶以利而仲芳以義是則仲芳之賢不止於及清而巳也余友戴伯庸氏一日來告曰㒒有弱息嘗苦多疾􅀗仲芳而愈數欲報仲芳而仲芳不吾受也度終不可以虚其徳􅂅求子之文以贈之余謂仲芳之賢既可書且余以嘗徳仲芳者戴不余請余可已乎哉雖然宋清以柳子之文而傳今仲芳之賢雖過於清而余文不􅁕以及柳子顧􅀎使之傳邪然戴之欲之也姑為書其㮣以俟如柳子者徴焉送徐以文序余少喜交㳺以方侍養不得逺去以求友於四方故獨與鄕里之君子㳺若徐君以文其人也後不􅄑失怙恃而天下有變􅀁在多梗又不得遠去以償其志然十餘年間四方之士來吳者則亦未嘗不得見焉其豪健俊偉魁閎辯博飲酒談咲以意氣相得者固不為少至於講義理之微詠性情之正薫然和粹然温優柔浸漬相入以善而不自知者則未有及以文者焉乃知未行四方耳苟行四方􅀂以文者亦豈易多得哉余用是益親以文而以文亦不余厭也盖自少及茲之壮其間春華之晨秋月之夕空山流水之濵崇䑓古榭之上以文未嘗不往而余未嘗不􅀙二人者樂其相得之深􅀙容周旋忘其為䘮亂之時羈窮之日也盖以文不汲汲求世知居衆中退然若無􅀁䏻者故人皆失以文而余獨得之豈非􅄑也㢤今年夏以文􅀅讀書呉興蜀山中來以别告余謂乆合而有睽􅄐人事之必然者也豈􅁕為甚戚也但以文今􅅸去紛囂得益厲舊學以求其道顧余乃浮沉閭里間卒荒落而無􅀁成是則不􅀎無介然於懐耳雖然以文固不可留余則豈不􅀎去是哉待秋風之興當扁舟而南㝷書聲於雲溪􅃄􅀣間以文尚肯以􅀁得告我哉代送饒參政還省序太尉鎮呉之七年政化内洽仁聲旁流不煩一兵強逺自格天人咸和􅀊用屢登厥徳懋矣然猶不自满而圖治彌厲嘗懼聽覧之尚闕而思僚佐之相裨也廼承制以淮南參政臨川饒公領咨議參軍事公辭以非材即躬臨其家諭之至意公感激遂起視事鳴呼盛哉此豈偶然也耶盖天􅀅興人之國則必賚以聡明竒特之士與之左提右挈以就大事故其相合之深相信之䔍􅄀契黙諭有莫知其􅀁以然者今公之起也人之見者歎於途聞者頌於室莫不謂公直氣讜言夙有以結太尉之知故􅀎當簡注之深􅀗登庸之光然不知天之相之者有不如是之偶然也且甞論之人才之不􅀎相通也故明於鉅者㦯有昧於微得乎此者㦯有遺乎彼其得而兼焉者寡矣今太尉奠此南服端拱廟堂舉境内之事而属之叅軍凡内外大小無不關白其爲任亦豈易言㢤盖􅆀治理則求其學術之醇論攻守則資其計畫之良對賔客則藉其辭令之善用人物則取其鍳識之精而況文牒之􅀁交馳簿籍之􅀁樷委苟一事之不通一才之不具則亦末􅁕􅁛之矣今公䏻􅀙容其間泛􅀿曲當使臨至重而不驚䖏至煩而不擾故雖以某之陋􅀗與公共事而亦得以寡過矣且接尊爼之餘談樂圖書之清暇翺翔大府以極一時之盛則公之才豈獨上頼之哉某亦賴之矣今年秋公得觧􅀁領軄還署省事􅀼以嘗有恊恭之好於其去䏻無言乎故論次其說以爲序送江浙省􅁺某序近代之取人者有二焉曰儒與吏而巳夫吏固儒之一事非可以並􅁛也盖詩書禮樂􅀁以明道律令章程􅀁以􅀙政不明乎道則無以知出治之本不􅀙乎政則無以周輔治之用古者君子之學􅀁以通而後成也二道既分儒忽吏為末而謂之不􅁕為吏訾儒為迂而謂之不􅁕用各視時之􅀁尚以相盛衰其為􅁦也乆矣國家自失承平挍政庶務寔繁在上者欲其嚴辦以供一切之需也故任吏尤専重而儒有弗及者矣嗚呼豈非其惑歟盖聞孫卿氏之言曰相髙下視墝􅏂序五種君子不如農人相羙惡辯貴賤君子不如賈人設規矩陳繩墨便噐用君子不如工人不恤是非然不然之情以相薦㧞以相耻怍君子不如恵施鄧析然則治文書奉期㑹摘獄訟之微較賦稅之悉儒固㦯不如吏矣至於屏邪慝之風行仁義之說使上尊而下親内脩而外服非儒其孰􅀎之乎故善為􅀦者未嘗以此而易彼也今厭其髙而樂其卑􅂢其大而收其小何㦲亦􅀼求其故矣盖謂今之儒末及於古不􅁕以􅁛上之􅀁使也夫儒不􅀎盡為古之儒然吏亦豈􅀎盡為古之吏㦲是但知垂紳獵纓空言而不切於事者之非儒而不知磨鉛削牘拘法而不通夫義者之非吏也其可乎余故嘗感嘆而思之以凡在上者亦過矣茍有於此焉不以儒為不􅁕用而特任之則知夫出治之本而其政豈不成乎既有思之則非在上之過也亦儒之過焉耳苟有於此焉不以吏為不􅁕為而兼通之則周夫輔治之用而其道豈不行乎若其人者世固有之而余未得見之也今年冬某人以江浙省臣之辟為􅁺余聞其讀書與律學頗事古豈非􅀁謂其人歟􅀅行也其友有来裒士大夫􅀁贈若干篇而属余序者迺欣然告之曰夫􅁺雖吏也然佐外􅈗相治藩府凡方面之事雖不得行亦可得而言也且省臣䏻取子於人人之中是知其賢矣知其賢於言有不聽乎子今􅀎以􅀁學施於時顯有成效使皆知儒之非迂則上之􅀁尚有不改絃而易轍者乎儒之振不振吾於子行􅁲之矣夫欲援吏而歸於儒者是吾􅀁望於子也若云叛儒而入於吏者豈吾􅀁望於子哉送蔡叅軍序國朝置􅂙軍爲三公之属舊制也然平時三公無親軄而參軍多􅀻人故視之者若不甚重今太尉清河公仗專征之􅃏雄鎮南藩以戡亂為已任舉封内之事而属之􅂙軍故其軄宻要華顯遂非他官􅀁䏻及矣然居是者非忠􅁕以受􅀉智􅁕以造謀而畧􅁕以濟務者弗􅁛也太尉公嘗曰與我共成大㓛者其惟良參軍乎故未嘗􅁿以授人而人得之者則莫不謂之榮焉江浙行樞宻院􅀴􅊗蔡侯乆在幙府茂著厥績􅀁謂忠智與畧實俻于已􅀄參軍之貟有闕也太尉方求其人而談者巳􅀻擬曰宜為是者其蔡侯乎未㡬命下果侯也於乎此豈偶然而巳哉盖侯之賢夙有以當太尉簡注之深而致國人期望之重故上下之意匪謀而一譬諸大寳横道人無智愚皆知趋而取之􅀄不待於相告也不然則何以􅀎􅄀契合之神如是哉於是在上者授任之不差在下者清議之不泯并侯之􅀎􅁛是軄而必與太尉共成大㓛者皆可見也抑何盛哉余時􅀼伏田里有欲獻於侯而未暇也適侯之故僚吏有來徴文頌侯者廼坐而歎作而言曰夫士君子之道成於身而出用於世也豈不欲流大名施厚澤乎然嘗患不得乎其位位得矣而又患不逢平時二者之棠偶則終於挾大技而莫呈抱竒貨而弗售此古人􅀁以多感憤悲傷而自嘆於不遇也然則逢時而得位者非古今之􅀁難而為士君子之至􅄑歟今侯之為參軍也凡征伐之宻侯得聞之黜􅕾之重侯得與之兵民御撫之方規賔客􅀿對之辭令侯皆得兼謀而並任之則侯之位亦得矣海内雖未康靖而太尉方興桓文之業内脩外攘以荅天子之寵命則侯之時亦逢矣侯於是時􅀎思古今之􅀁難得者已實得之而大攄宿學以為其軄之􅀁當為則東南之人有不誦侯之名而􅀍侯之澤者乎盖區區􅀁以􅂅望於侯者亦太尉任侯之意也侯其懋乎哉侯其懋乎哉送黄省􅁺之錢塘序錢塘為東南之㑹自五季之亂海内創殘而錢氏父子􅀎保其􅀦又􅀎知㱕於宋不煩征誅故獨􅄑富全迨我朝􅀦師南駕既受宋降市不易肆列聖相承重熈累洽􅆂飬安息以至于今計其民之不識兵禍巳四五百年矣故城邑人物之繁園池䑓榭之麗皆􅁕以侈於㳺觀而誇於談咏舟車管絃日至於西湖之上者不間風雨又有名花珎果水陸之味雜出於四時而非特居者之樂九仕於是者亦莫不酣嬉而忘去也可謂盛哉至正改元云云越三月而圍觧内則困於疫饑外則蕩於燔掠向之􅀁可觀者鞠為荒􅃄宿莽遺􅁅㫁甓盖四五百年之跡銷㓕毀壊欲求見其彷彿而無在者矣況連􅀊流民未還行旅罕至則非特居者之戚凡仕於是者亦莫不彷徨而厭留也可勝嘆哉今年秋江浙行省左丞潘公由呉興徙鎮茲土聞荆南黄君仲博之材辟以為􅁺􅀅行其友有来乞言贈之者乃為之言曰夫地之廢興盛衰雖有其時然豈不係於人哉苟有其志者躬葺理之勤需培積之乆有不􅀎變凋􅁦為完庶者乎今錢塘雖繁華委謝而江山之形勝猶在也仲愽始至之暇􅀎為我一周覧乎升于髙見陵谷之可憑則思設俻禦之規行于野視廬井之可復則思興墾闢之利歸言于公而行之使㓂不􅀎復來民不致乆困方面之事其孰有大於此乎仲􅀶固有志者必􅀎如余言他日抱皷不聞民得安遂其生桑麻雞犬隂交而聲應皆忘其為䘮亂之餘而漸復承平之舊余􅀅幅巾棃杖南逰湖山之間樂觀盛事然後賦詩以頌公之㓛有成而并爲仲博賀也豈不偉哉豈不偉哉贈王醫師序君子必慎疾慎疾必先於擇醫甚矣擇醫之難也其論證之是非投餌之當否非通其術者莫察也士之通其術者甚寡茍不察焉而求驗於巳試之後待其危而黜之晚矣豈慎疾之道哉世故無以知其良則徔衆之􅀁稱者而趋焉曰其傳㡬世矣其活㡬人矣良醫也相率非其藥不食子不迎以視其親曰不孝弟不迎以視其兄曰不悌凡長者不迎以視其卑㓜曰不慈而病者不自迎以視已曰不智雖失療以死不悔嗚呼衆之􅀁􅁛者其果良否乎呉之醫最多舉城而籍之不啻千百而得名者數人其術未必皆良而良者反扼其下不得出甚可歎也今年春友人徐君㓜文云云徳之來徴言以贈余謂復􅀄誠良醫矣然人未有盛􅁛之者惜余言之不􅁕重於世不􅀎張之然觀有羙譽而無實用而不得大聞於時者天下之事多矣不特醫也復􅀄何尤焉贈醫師龔惟徳序廣陵周克恭氏以事來呉介友人謁余言曰京口有龔先生惟徳者治俞扁之術其視疾審若鑑之照物其投劑當若矢之中的其施恵均博若輪之行地不以髙下而易軌也故言良毉師者必歸惟徳焉吾家􅀲渚距京口隔大江児嘗遘危疾惟徳來視之駕扁舟越風濤略無􅀁避既療之輙愈顧余年巳非壮後梘承先世之重者眇焉在是児也不􅄑而有疾有疾而􅄑惟徳起之則其所以恵我者不惟是児乃延吾後於無窮而免余於不孝也其徳宜何如報哉然奉之以金弗受也􅀅之以幣弗領也吾可終無以報者乎盖思可以章吾心而侈其徳於當世者莫如君子之言焉余來是邦聞先生以文名敢請余辭未遑他日又來言曰惟徳非特於吾爲然也凡於士之貧與流播覉寓者皆然也今其一門三世下孝而上慈家道雍豫而夀樂且康者豈非由是􅃱哉􅂅先生為之言余乃嘆曰夫施徳於人而不責報者非世􅀁謂難􅀎者歟然急利者之􅀁難而有道者之􅀁易也盖人雖不䏻報而天必報之矣故責於人者不得於天得於天者不責於人責於人有得有不得責於天則無􅀁不得也且天之報人雖􅀂茫昧然不可以朝夕以需苟行之不怠以俟之則其􅀁得較之於人者不啻乎多矣今惟徳其􅀎責於天者乎其䏻行之而不怠者乎其庶㡬􅀁謂有道者乎是皆余􅀁喜聞而樂言者也況克恭之請之勤哉雖欲辭固不得辭也遂書緑水園雜詠序呉城西南陬有曰朱家園者父老言宋朱勔故墅也廬山陳惟寅氏得之更名曰緑水以園中有池且用杜子羙詩語也其林沼亭軒亦各有扁焉近雖破廢然寛間幽勝猶可以釣㳺而嘯歌惟寅以余往來其中最熟求徧詠之噫當勔以倖貴時窮尚豪侈園中之珎木異石崇䑓嶢榭固當百倍於此文人詞客為之􅁛羙而誇詠者亦多矣今皆跡滅響沉無復可覩惟寅雖窮居􅀮約而䏻以詩書世其業䔍於孝友其清徳雅操固可以蔑視勔矣則余爲之執茟亦可以無愧焉囙不復辭且庶㡬㦯傳使父老知園之更名緑水者自惟寅始也詩凡十六篇缶鳴集序古人之於詩不專意而為之也國風之作發於性情之不䏻巳豈以爲務㢤後世始有名家者一事於此而不他疲殫心神蒐刮物象以求工於言語之間有􅀁得意則歌吟蹈舞舉世之可樂者不􅁕以易之深􅄝䔍好雖以之取過身罹困逐而不忍廢謂之惑非歟余不􅄑而少有是好含毫伸牘吟聲咿咿不􅅸于口吻㦯視以廢事而䘮志然獨念才踈力薄既進不䏻有為於當時退不䏻服勤於􅅵畒與其􅄝世之末利汲汲者爭騖於形􅀔之途顧獨事此豈不亦少愈哉遂為之不置且時雖多事而以無用得安於閒故日與幽人􅇣士唱和於山顛水厓以遂其􅀁好雖其工末敢與昔之名家者比然自得之樂雖善辯者未􅀎知其有異否也故累􅀊以來􅀁著頗多近客東江之渚囙間始出而彚次之自戊戍至丁未得七百三十二篇題之曰缶鳴集自此而後著者則别為之集焉蔵之巾笥時出而自讀之凡􅀊月之更遷山川之歴􅍱親友睽合之期時事變故之蹟十載之間可喜可悲者皆在而可考固不忍棄而弗録也􅀂其取義之㦯乖造辭之未善則有待於大方之教焉姑蘇雜詠序呉為古名都其山水人物之勝見於劉白皮陸諸公之􅀁賦者衆矣余為郡人暇日蒐竒訪異於荒墟䆳谷之中雖行躅殆徧而紀詠之作則多􅀁􅊴焉及㱕自亰師屏居松江之渚書籍􅄆落賔客不至閉門黙坐之餘無以自遣偶得郡志閱之觀其􅀁載山川䑓榭園池祠墓之䖏余向嘗得於􅃄雲草莽之間為之躊躇而瞻眺者皆厯􅍓在目囙其地想其人求其盛衰廢興之故不䏻無感焉遂采其著者各賦詩詠之辭語蕪陋不􅁕傳於此􅀖然而登髙望逺之情懐賢吊古之意與夫撫事覧物之作喜慕哀悼俯仰千載有㦯􅁕以存􅂆戒而考得失猶愈於飽食終日而無用心者也況􅄑得為聖朝退吏居江湖之上時取一篇與漁父鼔枻長歌以樂上賜之深豈不快㦲囙不忍棄去萃次成帙名姑蘇雜詠合古今諸軆凡一百二十三篇云洪武四年十二月日前史官髙啓序
