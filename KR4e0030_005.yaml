body:
  text: 後學周立編輯雜著十五篇封建親王賀東宫箋監國撫軍久繫兆民之望建邦作輔大頒同姓之封隆典式修輿情均慶恭惟皇太子殿下地居震長道合乾剛孝奉兩宫每問安於曉寢友懷諸弟共講學於春坊既膺主鬯之崇復舉分茅之盛本支茂衍宗社奠安某等忝預台司敢伸賀悃河如帶山如礪永存萬世之傳日重光月重輪敬上千秋之祝擬唐平蜀露布神策行營莭度使東川莭度副使臣崇文等臣聞天無二日臨四海為一家地有九州分萬邦為五服故用建侯藩之重俾扶王室之尊車服出於堯庭篚筐歸於禹貢柔逺䏻邇舞干羽開未格之心取亂侮亡鳴鼓鐘討不恭之罪蓋以法隂慘陽舒之道成文綏武㝎之㓛於是臣職惟修君威罔替上稽象緯固昭弧矢之名下制國經可廢甲兵之役伏惟皇帝陛下神凝至道氣禀英姿紹十二世之洪基啓億萬年之昌運憫生民之未乂惻然如傷念祖業之惟艱凛乎若墜却逺方之獻不嘉有瑞罷别庫之藏以示無私象郡鰐溪流八人而奸邪並黜麟臺鳳閣命二相而賢俊相升屢降璽書體乾行而布澤大搜戎輅應月蝕以修刑冀垣跋扈之臣解甲方歸河隴慿陵之虜納琛㑹至而劉闢者性惟狂戇泣在凡卑實為掌賦之鎖材豈是總戎之偉器頃因西川莭度使韋臯卒擅留府不受徴書當陛下光臨率土之𥘉大賚多方之始恐生震擾姑務包容授之以北闕之旌旄委之以西門之管鑰可謂滌瑕蕩垢荷寵蒙榮不思感悔以酬恩反肆驕淫而速禍此軍未輯他鎮仍求神奪其聰礪刃拒賔僚之諫天盈其惡奮戈驅將士之行始西蜀自縱其鴟張後東川竟遭其獸噬謂偏隅可據謂重險難踰負固偷生欲效李流之逆望風走死不知譙縱之窮陛下乃用旁詢將興薄伐築室匪衆言之惑負扆唯獨斷之明大衆啓行常朂之以用命小臣受事敢效之以忘身率五營虎衛之師㑹數道鷹楊之將駢脅者盡操闟㦸蓬頭者皆垂縵胡霧合雲屯目蔽旌旗之影波翻瓦振耳聾鉦鼓之音六月臣與兵馬使季元奕山南莭度使嚴礪等進至鹿頭關東此關旁夾髙山真成臣障厄三軍而莫進詎下井陘立一夫以可當應同劍閣臣等猿攀魚貫耻鑿道以潛行鳥突蛇蟠徑焚廬而直進因地形而制陳以方以圓察敵勢而設竒㦯前㦯後闢不束身以􅈬鑕更舉臂以當轅臣乃仗鉞誓詞援桴率衆一麾而鬪心已厲再鼓而鋭氣不衰樓煩發射鵰之弓洞胸貫髀佽飛擊斬蛟之劍蹀血橫尸疾呼作動地之聲大戰奪漫天之險􅊇不干順知賊旅之方崩弱豈當強喜我軍之纍捷欲藉長驅之勢遂收淨掃之功九月河東牙將阿跌光顔將兵來㑹其部曲皆羌胡猛士并晉健兒跖勁弩而力透重犀𬒳長鎧而走追奔馬欲贖後期之罪請當前拒之鋒纍出傍抄獨行深入遮賊轉輸之路斬賊飛赱之關於是綿江之諸郡皆降成都之孤城益急臣乃乘其巳困大合嚴圍鼓角𥘉鳴守埤者心皆不固梯衝未設攀堞者身巳先登九却九攻墨子之機安在八陳八克吳公之績乃存其劉闢鹿窮不暇於擇林鼠竄尚思於求穴始將出遁漏踈網之髙張終𬒳追擒就長繩之急縛端門受獻即當檻送於宸亰大社行刑不使逃誅於絶域臣巳撫平屬境入駐通衢除叛賊將刑此外其染汙者本是良民迫脅者無非叛黨悉加慰撫並用赦原莫不瞻聖日以歌謡𬒳王風而鼓抃修武侯之政巳罷卒以營農復文翁之規更興儒而舉士大地灑清塵之兩溥降深恩洪𬈑息鼓浪之風頓消赫怒此蓋神謀睿算天贊竒功使海內知惡臣之易亡識尊威之難抗臣等幸陪是役獲覩斯休不任慶快之至謹奉露布以聞其軍資器械别簿録上擬劉封答孟達書封白子度足下書教㒒自二開陳利害甚悉且讀且思竊有未諭蓋聞利害者賊義之端也人惟諭利而不諭義故有君臣父子之相叛君臣父子之相叛臣者所不忍言而足下之書何以至㒒側邪便焚書止使以告絶於足下然恐足下不知主上所以待僕之意而僕所以報主上之心并書中有可復者故勉述蕳牘足下其聽之昔竇嬰與灌夫懷交友之私實同田蚡之禍韓信於髙祖感推食之意卒拒蒯徹之說此前史之美談而足下所共聞也今㒒於主上體同血胤名附宗籍至親􅌋恩固非交友之私也出則捴戎入則居守尊位重祿固非惟食之意也足下視主上所以待僕者如此則㒒所以報主上者其可異於二子乎且父與君有其一皆當致死㒒一身而二責萃焉其致死也亦無疑矣而足下乃以啇種白起孝己伯竒為㒒之戒是何言之過也夫為人臣者患忠之不至不思君之不知為人子者患孝之不純而不患親之不察使不幸而為啇種白起孝已伯竒則亦將瞑目長逝而無愧矣復何求哉若所謂申生重耳之說又不然晉獻公無道故有是事今主上聖明內無嬖幸之人外無讒慝之士嫡庶有别慈愛不移何可妄相引諭以為誑惑之道邪未後責僕以三事是益見足下之不思矣僕請有辭焉夫古人有以義為父子者何謂非禮知守莭而不變何謂非智見僣僞而不從何謂非義㒒之自處亦云得矣若從足下之計而求以為禮為智為義是猶惡寒而去裘畏熱而附火不愈甚矣今太子巳正位東宫㒒當長守藩國為王室屏翰若以不肖不得順於君父則將素服詣闕藉藁待罪安能棄親事讎竄身異國生為棄人死為繆鬼足下所謂大丈夫恐不如是也況剖符之封㒒所自有乃欲使之舍安而就危去順而從􅊇㒒非病狂何利而為此古人之行一不義而得天下者亦有所不為況尺寸之土哉㒒此心皎然天地神明實共臨鍳足下安䏻侈之若以㒒為愚㦯可以言誘曷異以告趍走之人曰而叛而君語孩提之童曰而背而親莫不唾而去之矣僕雖至愚然於君臣父子之義亦嘗聞之矣何至不如趍走之人孩提之童哉於戲𥘉漢之陵夷也董卓首亂二袁效尤海內無所底定主上奮起欲與曹操戮力匡濟以救元元而操亦懷圖中路搆隙故主上一破之於烏林再走之於南鄭而天方佑奸得死袵席今其子丕不思蓋前人之愆乃敢隂造符命自製禪文遷易重鼎盜攘神器有志之士咸耻立於其朝僕嘗獲從足下周旋行間竊觀足下亦有志者故將共圖於中原報竒遇於吾主而天奪足下之魄使自棄於忠義之林北面僞庭為天下笑既不知愧乃復為人作衛律耶今主上憫宗社之顛覆復恐七廟之祀墮萬姓失戴故資荆益之饒據岷峨之險正尊號以繼大統方將出關隴㝎三輔仗義而東以收復故物足下若䏻慕隋㑹之明陋李陵之暗使不逺而復則富貴寵榮當保如昔倘以斯言未信終忘首丘之念恐鄴下不守以白衣從輿櫬之後得無悔乎此誠知變禍為福之日幸審度之無忽匡山樵歌引南康宋倬天章向寓吳與余同客臨川公之門朝夕遇焉詩酒唱酬意甚樂也君後南遊錢塘余亦屏居江渚睽隔者纍年一日扁舟而來訪余寂寞之濵既相與道舊且出其近所著詩曰匡山樵歌者示余曰匡山吾鄉也先人之丘隴在焉阻兵不歸者久矣今道路幸通顧吾材不遇於世當還桑􅎚之間葺故廬而居之時出吾詩從山農野老負薪而行歌則吾之志而名藁之意也子其為我序之余讀其詩見其詞語精錬音調諧暢有唐人之風蓋君近嘗渡浙江上㑹稽厯大末金華諸山入閩關至海由四明而㱕探攪瑰怪有得於江山之助故其詩視舊為益工而余閉門窮愁才思荒落自顧有不及矣且惟昔之詩人多躁薄無檢雖其辭章之華君子固無取焉君令剛介自將不苟進取懷首丘之仁抱遁世之志行固足尚矣况其詩之美哉然吾聞五老之陽雲松蒼然太白之髙風在焉君㱕而吟其間益求其工他日筐笥所藏光氣上燭余恐君終不得隱矣審逰贈陸彥達獵志獸漁志魚學志於道理之同然也故獵者必之山林漁者必之江湖而學者必遊於賢人君子之域蓋山林江湖者魚獸之所在也賢人君子之域者道之所在也舍是則無獲矣婁江陸氏彥逹有志於道者也而僻居田里無相與薰炙以成其道是猶欲獵而之丘叢欲漁而之溝瀆必無獲有獲亦小耳惡淂所謂麋鹿熊豹鱣鮪魴鯉者哉余是以嘉其志而惜其不審於遊也今通都大藩不逺而甚近賢人君子不乏而常多真山林之奧江湖之區也以彥達之才器孰非碩交苟䏻挾禮義之弓操詩書之罟而一往遊焉吾將賀彥達之有大獲而歸矣作審遊一首以貽之勸農文春雨布澤東作伊始太守躬駕于郊以敦本厚俗之道勸爾民之職也然不欲廣引舊談姑以今日之事直相告語爾民其敬聽之夫上立法以衛民民出力以供上古今常理也皇上剪除暴亂開建太平使爾民得脫鋒鏑操耒耜以安畎畒之中又念稼穡之艱每歲親耕籍田復召父老廷對宣諭唯恐爾民荒逸惰遊以陷於罪德甚􅌋也近者兼并之家不䏻體上此意㦯肆侵剝使尓民有委棄其業者情雖可矜然輕去田里以乏父毋之飬闕公上之賦其責亦何所歸哉故碩尓民相告於鄉令去者歸居者安修尓隄防浚尓溝洫力不足則相周器不偹則相假各勸播植以待有秋毋坐失其時貽後悔也更䏻母作姦母逐末毋好飲博毋事鬪訟毋弗順於父兄母㦯干於鄉里家給人足禮作義修以無愧於泰伯過化之邦豈不美歟太守雖老按堵觀俗以行賞黜尓民宜相與勉焉彀喻自先王之教廢文武異途學者多不習弓矢之事皇上志復古治乃今年五月詔有司取士兼試以射及親祀方丘又戒百執事旅射于齊宫余當預耦進之未先期與二三同列私肄於成均之西圃既設的授弓其強者彎然引滿一發過之指的而詫曰是不足至也其弱者力擴而不盈發則去的逺甚投弓而歎曰吾不䏻至彼也余最後加矢鉤弦盡吾力而挽之僅及半笴發則去的亦及半而墜心甚愧焉然不遂已乃日強引之覺所引漸多所進漸益發則去的亦漸近焉因竊有感曰夫百步之的所以莭逺近之中凡射者之所求至也而過者忽之不及者沮焉強弱雖殊其不至則一也茍抑其過而勉其所不及焉有不至者哉是可以喻夫學矣聖人學者之的詩書禮樂學者之弓矢也由詩書禮樂以求至乎聖人猶操弓矢以求至乎的也其騖髙而失中過而忽之者也自畫而日退不及而沮焉者也不忽不沮循循然以求之欲不至於聖人不䏻矣況聖人之道在身非有百步之逺欲求之即至非有力挽之難也可不勉哉翰林應奉㑹稽唐君處敬嘗以彀名其子之淳進修之室蓋取孟軻氏所謂學者必志於彀之義來請余說因以所感於射者告焉處敬曰是足以合孟氏而厲之淳矣請書以貽之夫秋之為奕不專則不成慶之取鐻不靜則不得彼皆小技猶有近夫道焉況射君子之善藝乎孟氏可謂善喻處敬可謂善取以教其子之淳䏻勉焉以求至則可謂善學者矣作彀喻志夢余與同郡謝玄懿俱在內府教胄子今年正月十一日之夜啓夢與玄懿晨候午門若將趍朝者有揖余二人言曰二君當遷且顧國子祭酒梁公曰諸生盡以屬公余愕曰得無有逺調乎曰不然煩傅開平王爾既窹明日以告玄懿私相與識之越三日既望故事當率諸生入覲方叙立右順門內梁公傳旨下曰勑諸生出受業太學二君俟後命言既引諸生去啓亦隨出明旦將朝中使急召啓二人曰有旨命開平王二子侍學東宫俾爾授之經宜趍入玄懿顧余笑共歎其夢之神也二月二十日之夜玄懿夢與啓同𬒳召至上所上授以一紙若告身者玄懿受而忘拜竊視其文有翰林院三字焉繼授啓啓拜受之明日以告啓亦私相與識之越六日上御奉天門宰執並侍小黃門名啓等升上顧中書右丞汪公曰諸儒在學久且皆有文行而令以布衣逰吾門可乎汝亟以翰林之職處之因趣謝時玄懿以事出獨不得拜焉明日遂各授職有差而啓與玄懿皆得編修官云於是益共歎其夢之神也七月十五日之夜玄懿母夫人林氏夢中使舁二橱授兩家發各有白金在焉其家捧視則化為炭間以告吾婦余與玄懿聞之竊怪其說稍隱不若向二夢之著又不知玄懿所得獨化為炭何也然亦私相與識之至二十八日暮出院還舍有挫馬馳召余二人上御闕樓俟焉既見奬諭良久面拜啓户部侍郎玄懿吏部郎中啓以年少未習理財且不敢驟膺重任辭去玄懿亦辭上即俞允各賜內帑白金命左丞相宣國公給牒放還於鄉既出都門與玄懿家共舟而東其二弟為余言纍重多負賜金己盡費況歸無舊葉相共歎咨尤其兄之早辭余因話茲夢以解之乃始悟橱為除炭為歎愈共歎其夢之神也夫自周官六夢之職廢學者莫䏻通其說前史所載夢之符於事者甚衆余嘗疑其誣焉今是三夢者不由因思而生得於恍愡啽囈之間而可徴灼灼如此知未至若既往無少忒焉其事之偶然者歟將人之禍福將至有司之者㦯預以相告歟抑精神靈爽有所感通而特兆於是歟何其神也是知凡得喪之數固皆㝎於冥冥而無能逃焉者矣夫以吾二人一官之遷一命之授與區區之進退猶然而況其大者乎然則士之生也雖當自盡其所宜為外者一委命順於數而無所容心焉可也而世之惑者猶將役其智力騖馳於軋敓排狼之場欣戚膠擾至死而不之察豈非昧哉余欲書此以覺之懼有誚夫誕也乃私識之且貽玄懿聊相與自警焉今年洪武庚戍也書瞿孝子行録後余嘗預修元史見民之以孝義聞於朝者頗衆其能冬月得瓜以奉親者則若王薦刲股肉以療父病者則若孔全施財以周鄉里之乏者則若賈進皆得具著于篇瞿孝子之行蓋兼三子而有之而當時有司不以聞史無所考據又主者不與故不得書以與薦等並傳雖然孝子今年八十餘幸際聖明之時既得謝君之所表章則當世執茟之士豈無為之采録收附於國史者哉其傳固在是矣余與孝子之子莊友嘗獲拜之氣貌藹然孝義人也且聞長者言其行甚熟與謝君所録無異詞故識以信其說庶他曰書者㦯有所徵焉書博雞者事博雞者袁人素無賴不事産業日抱雞呼少年博市中任氣好鬪諸為里俠者皆下之元至正間袁有守多惠政民甚愛之部使者臧新貴將按郡至袁守自負年德易之聞其至笑曰臧氏之子也㦯以告臧臧怒欲中守法㑹袁有豪民嘗受守杖知使者意嗛守即誣守納已賕使者遂逮守脅服奪其官袁人大憤然未有以報也一日博雞者遨于市衆知有為因讓之曰若素名勇徒能藉貧孱者耳彼豪民恃其資誣去賢使君袁人失父母若誠丈夫不能為使君一奮臂耶博雞者曰諾即入閭左呼子弟素健者得數十人遮豪民於道豪民方華衣乘馬從群奴而馳博雞者直前捽下提毆之奴驚各亡去乃裭豪民衣自衣復自策其馬麾衆擁豪民馬前反接徇諸市使自呼曰為民誣太守者視此一步一呼不呼則杖其背盡創豪民子聞難鳩宗族僮奴百許人欲要篡以歸博雞者􅊇謂曰若欲死而父即前鬪否則闔門善俟吾行市畢即㱕若父無恙也豪民子懼遂杖殺其父不敢動稍斂衆以去袁人相聚從觀歡動一城郡録事駭之馳白府府佐快其所為隂縱之不問日暮至豪民第門捽使跪數之曰若為民不自謹冒使君杖汝法也敢用是為怨望又投間衊汚使君使罷汝罪宜死今姑貸汝後不善自改且復妄言我當焚汝廬戕汝家矣豪民氣盡以額叩地謝不敢乃釋之博雞者因告衆曰是足以報使君未耶衆曰若所為誠快然使君冤未白猶無益也博雞者曰然即連楮為巨愊廣二丈大書一屈字以兩竿夾揭之走訴行御史臺臺臣弗為理乃與其徒曰張屈字逰金陵市中臺臣慙追受其牒為復守官而黜臧使者方是時博雞者以義聞東南髙子曰余在史館聞翰林天台陶先生言博雞者之事觀袁守雖得民然自喜輕上其禍非外至也臧使者枉用三尺以讎一言之憾固賊盩之士哉苐為上者不能察使匹夫攘𬒮群起以伸其憤識者固知元政紊弛而變興自下之漸矣楊孟汲字說梁溪楊氏子名長孺因從余逰請有以字之余曰西漢之士字長孺者二人焉韓大夫安國汲內史黯也昔司馬長卿慕藺相如之為人故自名相如今子以是名其為慕安國耶慕黯耶雖然二人者皆名臣吾將言其行事之得失而子擇之可乎史傳安國之事說梁孝王與諌馬邑之計亦可謂賢矣然以行金而得為大司農論魏其武安之事而無所别白吾於是有慊哉若黯之忠直好諌責武帝不䏻效唐虞罵張湯不可為公卿使天子憚而禮之淮南王謀􅊇數年畏黯一人而不敢發有古社稷臣之風子欲取於二人則舍黯其可哉且子之􅒏直而行潔學黯為近易宜字曰孟汲則皆知子之為慕黯而非慕安國者矣夫今之人好美名自侈吾嘗病之子欲以古人為師若碩學而不可及者庶乎得命名之義矣苟於黯如射者之於的行者之於家不至不巳則可謂善學古人者矣嗚呼子誠善學雖聖賢不難至而況於黯乎澄江懶漁說暨陽之江有隱君子嘗漁其上朝不緡夕不罛泛景逐波漫漫以嬉人見其不事其業因名曰懶漁衆漁每得魚而返集于浦淑之間炊鮮漉清飲唱為樂視彼獨枵然則相與笑之且讓之曰夫農不勤則飢啇不勤則匱百工不勤則無以成其器今我皆自力爾獨于逸我皆率常爾獨用荒不勞爾躬不朂爾志則何以􅌋爾利乎懶漁曰吾終日漁而子以為未嘗漁惑哉詩書吾漁之具也群聖人之學吾漁之地也義理之潜道德之腴吾漁之所得也吾漁視子亦大矣何名為懶乎衆漁慚而退髙子聞之曰此善漁也世之習常務得而不知大人之事者其衆漁之徒哉修忠佑祠疏磅礴扶輿靈氣特鍾於章貢昭明烜赫神蹤實肇於嬴秦號雖著於江東祀巳傳於吳下纍朝褒顯每加典冊之崇萬姓祈占必協蓍龜之應自兵戎之充斥致祠宇之摧傾思將斫木而庀工須假揮金而相役美哉輪美哉奐事固待於人為俾爾熾俾爾昌福必膺於神貺勝緣可集盛事毋墮城南草堂疏心逺道人何彥文年老未有居室將築草堂練圻城南求好事者捐已金以相其役疏曰郗參軍能為安道買山史嘗見美王録事不資少陵築堂詩巳遭嗔非逢有力之人曷濟無家之客何彥文者伎通聲律名著江湖蚤嘗為落魄之遊晚未淂棲遲之所漂流屢徙歎一枝夜月之烏跧伏深藏愧三窟秋風之兔今必用縛茅作屋奈未能指石為金欲令此老之婆娑須籍諸君之慷慨略加舉手便可容身心逺地自偏巳疑成茲小隱曲髙和總寡尚當為爾長歌幸得安居敢忘廣庇薦亡將齊榜人鬼之常猶一晝而一夜聖凡之隔乃九天而九泉故大道開起幽拔滯之門使群迷得出妄歸真之路發金籙瓊書之祕降羽憧玉莭之光欲薦爾忠魂必資吾法力虎頭有相雖稱介胄之雄馬革無蹤未返衣冠之葬恐墮重隂之苦趣故推太上之慈恩照以破暗之燈濟以度迷之筏使爾聞妙音而頓解慿浩氣以髙升雨濕天隂不復煩冤於曠野雲舒霞卷佇看極樂於崇霄永離黑海之波即往朱陵之府墓志八篇元故婺州路蘭溪州判官致仕胡君墓志銘君諱松字松岩姓胡氏常之晉陵人宋樞密副使贈太師秦國公諡文恭九世孫也曽祖諱柔國子司業祖諱聰直顯謨閣淮南莭度計議官考諱應炎直祕閣常州莭度判官君生甫期元兵渡江墮常祕閣君死之兵且屠城祖母陳夫人先襁君出避吳中以免既長㱕鄉里以推擇為吏􅍓宜興崑山常熟三州在常熟時民有為富人曹氏飬子者嘗𬒳譴潜㱕其父因匿之得腐死人溝中佯哭曰吾兒也即詣曹曰爾何殺吾兒賄謝弗厭訟于州君從州判官往視尸計未當壞而壞知非是即置弗檢而以不見尸報録囚使者下車詰君稽違狀君曰吾寧稽不敢枉也移讞旁邑曹不任椘掠遂誣脉君等亦以見尸不檢受劾獄具曹之族咸冤之重購偵獲飬于始白泰㝎主崩文宗自金陵入繼位殺故相回回倒刺沙命平章曹立巡東南紏其黨授上方劍得專誅按行至常熟君從長史􅊇諸境民有告回回百餘人匿海渚殺猪㑹飲謀為亂平章亟遣卒捕之君當承行輒請曰是詐也願毋煩兵平章怒曰吏何用知之君曰回回不食猪今言殺猪詐可知也不聽果往無獲一舶賈胡數人訊之蓋訟者嘗與互市負其資不能償欲投間陷之也遂抵訟者罪君之明察類此升平江路吏庚午歲吳中大飢官作飦食餓者命君與他吏一人董之君收濟甚周且以私錢及餅餌囊負馬後施于塗旦淅米入釜他吏伺君間輒私接其半俄畫見殍鬼群捽之遂死君則無恙繼遷集慶當護上供物至京禮部尚書隆安魯公見君謂曰名家裔乃久從吏役邪欲與一二朝士知君者共薦留之不果㑹公拜江浙行省參知政事遂與俱南以省銓為寧國路涯縣典史時有制蒙古色目毆漢人南人者不得復西域流户數百人因恃以為暴所過掠財畜辱婦女民束手不敢拒相驚若寇至及涇邑僚悉引避民愈恐君語衆曰吾在若無憂也即出勞之於郊誘閉佛寺中呼其酋諭曰制言不得復毆者民爾今我天子吏也所行者法若善去勿妄犯吾民當率酒米相餉否則知有法爾酋愕遂戢其衆亟去無一人敢譁君親送出疆以㱕民羅拜馬首曰微公縣幾殘矣轉衢之龍遊縣婺之録事司二典史皆有聲纍資勑授將仕佐郎信州路提控按牘兼照磨承發架閣請老不赴遂以從仕郎婺州路蘭溪州判官致其仕君子黼仕杭因留就飬以至正十七年十月卒年八十四元配陳氏繼配陳氏並先君殁贈宜人二子長即黼浙江鄉貢進士汀州路儒學教授次黻以平盜㓛授福州路羅源縣南灣寨巡檢君性孝友少喪母哀毀叔父嘗欲奪其田盡卑無靳色後叔父廢業君資奉之甚至邦閭稱焉為吏絶賕請守正不阿明習法律而論决多傅以經義所至長官皆敬憚之君之殁以兵阻不克歸􅌾權厝吳山萬松嶺後十五年國朝平四方道通黼始以某月某日遷祔晋陵先塋之次乃來乞銘實洪武四年也惟胡氏自太師以儒貴為宋名臣其後子孫登侍徔方伯焜耀史冊者以十數可謂盛矣至君懷抱利器宜光大其先業而困􅓹下僚卒老以死非命也夫然君不以位卑自屈能盡心所職使表著如此足以昭示永久是不可以無銘銘曰君仕弗昌君材則良繄君名之長陳夫人許氏墓志銘夫人世為金陵溧陽人姓許氏諱清密歸為同邑陳君諱德輝之妻陳君以醫名為元御診太醫年三十五卒于燕夫人迎其喪還􅌾邑之舉福鄉大石山之原即自勤苦持家以育幼孤視娣姒之女與己女均皆躬為􅌨沐及教以女事不懈鄉里稱賢焉子世能吏吳奉夫人來居年七十五以疾卒實元至正十七年也遭時多故未克歸􅌾國朝洪武六年世能方主邳州睢寧簿始謁告啓其殯于吳以是年三月某日合􅌾於御醫君之墓有女三人㳤安適李某㳤寧適趙某㳤貞適李某皆溧陽士族男一人主簿也銘曰猗夫人著㳤德中婺矛牙居動守則子成名維教力卒有年􅌾始克從良人合兆域期永貽志斯刻陳希文墓志銘吳有良醫師曰陳希文其治業甚精其起疾甚衆其中心甚樂易其待物甚恕而恭其事親甚孝其撫宗姓寡弱甚有恩其為人如此故其卒鄉里耄稚莫不歎悼焉其葬也齊人髙啓為之序而系以銘陳氏先為溧陽人君祖諱桂發元授平江路官醫提領仕巳吳人利其醫不欲使去遂留家焉考諱德華君諱世成號清逺處士希文字也年六十七以洪武六年十二月丙辰卒以是月􅉝酉葬吳縣太平鄉梅灣之原配宗氏子男三人長祖義先卒次祖善次統女三人長適郎潛次適顧遵禮次幼孫男四人蒙豫觀泰銘曰以醫惠物澤巳久用善禔躬德彌􅌋年幾七十非不夀有子世業紹厥後㱕全斯丘尚奚咎葛仲正墓志銘葛君諱正蒙字仲正為人􅌋重有長者風其先自汴徙吳世以醫鳴至君而令聞益著每旦迎療者填户外至不能容屨君肩輿㦄視惟謹不問能報否率與善藥其子姪甥壻與弟子從君為醫者人輒曰是葛君所傳也爭致之年七十二以洪武六年十二月癸亥卒曾祖諱從豫祖諱暘辰皆弗仕考諱應澤元授平江路官醫提領室周氏子男二人曰復曰泰女二人適郁潛金權孫男二人旭繼明年正月己已復奉君柩􅌾於長洲縣武丘鄉洞涇之原請銘于齊人髙啓銘曰彼阜斯崇􅑆乎其中有君葛翁壽樂以終維拯疾之㓛後人尚豐明故髙均彰墓志銘吳郡髙均彰以洪武五年八月丁亥卒以九月丙午卜吳縣大平鄉梅灣村之原以葬其從弟前史官啓既哭之復為銘納壙中君諱彰蕳率寡嗜於聲利得喪不戚戚計慮日從昆弟親友酣飲以為娛性復好直人有過輒面攻之衆知其無他腸弗怨也年五十有九祖諱鑑考諱震皆有潛德配姚氏無子一女寧適郡人陳彥夫以君之賢生雖不能致豐榮然亦未嘗有一毫困辱不可謂不幸也銘曰雖寡求故不憂卒全而歸在斯丘嗚呼吾兄又何尤故韓仲逵墓志銘君蘇州吳縣人姓韓氏諱敏道仲逵字也生元世嘗得推擇為吏􅍓常之無錫蘇之吳江二州提控案牘性寬厚不挾計數時吏相習為文深君議曹事獨平恕有長者風家無􅌋藏客至輒擊牲命酤以相歡視罄匱弗計晚得足疾有以酒為夀者亦杖而從之談噱酣暢不少衰其樂易蓋如此年六十而卒實國朝洪武五年二月某日也祖諱某考諱某皆不仕配陳氏先十四年卒繼配連氏一子焯為西安都指揮使司經􅍓七女長而嫁者五人餘幼孫男侗君卒之六月經㦄始聞訃歸十是年九月某日􅌾君於某鄉某地之原乃來乞銘余向為史屬時經㦄方在宥府慔數相遇焉蓋知其才器能大韓宗者豈非君為吏之善天之報施不於其躬而將於其子耶銘曰文不刻深吏之賢胡仕弗崇夀靡延厥報在嗣天岡愆將俾昌熾耀尓先我庸作銘慰九泉魏夫人宋氏墓志銘蘇州守江夏魏公以其先太夫人行述授勃海髙啓曰吾妣棄吾二十有二年矣遭時多故權厝先塋之左今始得地於吾里黃岡湖東某山之原將以某年某月某日而葬子為我志而銘之公昔掌國史啓嘗為其屬今又居公之野辱以先銘是屬不敢當然亦不敢辭也按夫人姓宋氏武昌蒲圻人宋彈壓官諱時慜之孫女諱某號俊齊之女同邑隱君子碧崖魏先生諱雲瑞之妻也夫人生而頴異七歲能誦曲禮內則曹大家女訓十歲共女事無闕既長歸先生先生故名家世儒履行髙潔夫人相之稱賢配焉居母姑之喪皆過哀疏食終三年待內外親族無異意先生嘗逰齊安遇疾卒於邸有子三人法孫已孫虎孫𥘉聞計將遣法孫迎喪㦯曰江多蛟龍性惡尸以柩渡虞有變宜焚骨歸也夫人哭喻法孫曰是將陷吾母子於大戾也爾忍而父為灰燼乎亟往母有憚而父善人神必相之矣迄渡風浪帖然喪既還㦯又曰柩入家弗利夫人曰此固吾夫宅也舍之使何適哉苟有弗利當萃未亡人之身未亡人得從夫于地下足矣即惟正堂奉安旦夕哭臨逮􅌾毀瘁幾不能為生嘗謂諸子曰不幸門户凋落汝父汝伯相繼殁若曹尚誰賴哉宜力學善自立大汝家以慰老人之望毋從里中兒嬉也子皆承教惟謹先生庶毋羅氏性素嚴號難事夫人始終奉承有順無忤疾則侍粥藥殁則營喪葬皆必誠焉巳孫既娶久未有胤夫人曰吾老矣獨不得一抱孫也禱于先夢𬗋衣人種栗舍垣下告曰此萌也為他日興植汝門之本覺旦語己孫曰汝有子祥也既而果生男夫人喜曰神不我誣遂以栗名嘗得昡疾既間曰吾度不能久處丗間矣命舁柩堂下沐之曰吾藏身此中無隙則佳耳又命新婦取衣衾當斂者縣之椸餘悉𣪚諸親愛除夕家人進椒酒夫人起居尚無恙元旦坐堂上親戚為夀畢曰我明日逝矣為我謝某謝某翌日沐浴更衣坐呼己孫等謂曰吾年七十六夀亦足矣死自吾順汝曹勿號慟亂我聽使我得好去也語巳遂殂實元至正十年正月二十日也法孫早世虎孫仕元為嶽州路儒學正平江州楊柳灣茶司提領亦先卒己孫今名觀即公也仕國朝㦄太常卿翰林學士國子祭酒至今官嗚呼夫人貞孝慈睦其賢卓著如此固非凡婦人所及至於聽言之惑臨終不亂則又士君子識義理者㦯有所未能而夫人能之豈非難哉雖生不及見子之貴以享其榮飬然死而子能以儒學際聖朝爵三品當得褒贈之命象首錦櫜以光賁於窀穸又䏻追述懿行以圖不朽則夫人何憾焉銘曰維君子嬪貞以禔身能教其孤為今名臣卒既有年始㱕斯阡時虞未遑豈曰緩焉乃刻銘章載揚幽光永固以安夫人之藏丁志恭墓志銘洪武六年四月余聞志恭得暴疾臥江上扁舟往視之志恭握余手欷歔不自勝仰曰先生自天而下耶明日疾革余撫謂之曰子嘗求贈詩吾未暇為今如有不可諱當為悼詩葬且當為銘志恭已昏不知人復張目舉手作謝且别狀時其母及家人親舊環床立見之莫不掩面泣下又明日乃卒余既賦五言一章哭之將葬其兄志剛來以請銘余曰吾忍銘志恭耶然言不可食也乃序而銘之志恭吳人諱儼姓丁氏風度清美學書有楷法嘗遊吳越汴洛之都名卿碩士咸賞愛之年雖少不喜聲利芬華事歸處郊墅以賦詩彈琴自娛與人交悃款有情義而於余尤相親敬者也年三十一以是月六日卒以十二月六日葬吳縣太平鄉梅灣之原其先世為吳人曽祖諱震祖諱有慶皆弗耀考諱讓主河南永寧簿妻袁氏男二人原顯八歲原亨志恭殁五月而生嗚呼余觀志恭平居競慎不敢妄有所為惟恐禍之及已所以自愛其生何如也然竟以疾夭使世之肆者得共非笑謂徒謹無益也不知志恭之死者命也不幸也命故無悔不幸故君子哀之夫人之死䏻無所悔而又有君子哀之則亦庶矣乎是不可以無銘銘曰孌彼婦兮與兒矧昆賢兮母之慈子忍舍兮去兹又返顧我兮友私駟方鶩兮倐止斯非夫天兮孰使之哀哉奈何兮慰以銘詩哀辭一篇王仲廉哀辭仲廉少習春秋經欲舉進士負其氣不肯􅈬尺度將棄去北逰燕趙之間㑹兵變且嬰疾遂家居治田業不復言仕事有所感則發為歌詩辭抗音激讀者知其有志非甘遂泯泯者性蕳曠無矯飾與人交不易為踈密余居鄉里𥘉識之不甚覺其賢後出接時輩見中險外夷朝合夕叛者不可勝數而仲廉泊然十載如一日然後深嘆其賢知世之不多有也至正二十六年六月三日仲廉舊疾作卒於家夀止三十五余𥘉聞其病革馳視之尚有微息就榻托呼不復應乃絶余既哭而退為計於嘗所來往者相與賻祭如禮其所親有謂余者曰仲廉於昆弟最少而孝毋恃以為安嘗曰是兒在吾後事無憂者不意其先亡也又曰仲廉有兒幼方易簀傅毋招侍側顧麾使去若不忍見者余聞之復為之出涕夫士有􅓹而不耀又招篤廢之疾罹夭札之禍親老而不能終其養子生而不能待其長此古今之凶極甚可哀者而吾仲亷丁之豈非命哉然獨念仲亷無子時則以為憂既有子而喜喜未幾而身殁咸謂禍福倚伏不可知天初皆無意人之所值適然耳余則以為不然仲亷後顧孑立者久嘗自分其􅏷絶矣然忽有是兒豈天哀其將亡而遺之嗣所謂善人之報恆不於其躬而於其後耶余嘗見其眉目秀發非凡兒長必有成者而謂茫茫然者果無意乎仲廉之鄉里行事太原王君行已為識於墓乃復為之辭以寓吾哀其辭曰嗟嗟仲亷慎其儀兮早翔藝林辨峩巍子誓將遐觀抉奧竒兮洪河洶前喪楫維兮乃盤舊邱以自怡子匪時逸收弗賈知子羣騖以爭途嶮巇兮子獨正軌坦而馳兮胡淑且嘉不受禔子窮病短折具任之兮母哀噭噭老莫子支衆涕助流若綆縻兮單嬰在哺詎識悲兮禠其文褓被素縗兮芳華未敖忽稿萎兮修翰未騫竟離披兮志長運窮天實為子我失友生將尤誰子方覯倐背歡戚移子冥漠無垠逝難追子埋蒿萎塵岡之垂兮己乎已乎歸何期兮
