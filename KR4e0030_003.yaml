  text: 髙太史鳬藻集卷之三
  hash: sha256:81e2acc3d28f2e370a7958dc21ea59011902c28bdb7f51855eb788ee864c7902
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0030_SBCK_003-1a}
body:
  text: 後學周立編輯序十八篇師子林十二詠序師子林吳城東蘭若也其規制特小而號為幽勝清池流其前崇丘峙其後怪石崷崒而羅立美竹隂森而交翳間軒淨室可息可遊至者皆棲遲忘歸如在巖谷不知去塵境之密邇也好事者取其勝槩十二賦詩咏之名人韻士屬有繼作住山因公裒而為卷冠以睢陽朱澤民舊所繪圖而請余敘焉夫吳之佛廬最盛叢林招提據城郭之要坊占山水之靈壤者數十百區靈臺傑閣薨棟相摩而鐘梵之音相聞也其宏壯嚴麗豈師子林可擬哉然兵燹之餘皆委廢於榛蕪扄閉於風雨過者為之躊躇而悽愴而師子林泉益清竹益茂屋宇益完人之來逰而紀咏者益衆夫豈偶然哉蓋創以天如則公碩力之深繼以卓峯立公承守之謹逮今因公以髙昌宦族棄膏粱而就空寂又能保持而修舉之故經變而不墜也由是觀之則凡天下之事雖廢興有時亦豈不繫於人哉余久為世驅身心攫攘莫知所以自釋間訪因公於林下周覽丘麓復以十二詠者諷之覺脫然有得如病暍人入清涼之境頓失所苦乃知清泉白石悉解談禪細語粗言皆堪悟入因公所以葺理之勤而集録之備者蓋為是也不然則飾耳目之觀賞詞華之美皆虗幻事豈學道者所取哉是則來逰而有得者固不得而不詠因公亦不得而不編既編則余又不得而不序也贈錢文則序韓文公詩有曰我生之𥘉月宿南斗蘇文忠公謂公身坐磨碣宫也而已命亦居是宫故平生毀譽頗相似焉夫磨碣即星紀之次而斗宿所躔也星家者説身命舍是者多以文顯以二公觀之其信然乎余後生晚學景仰二公於數百載之上蓋無能為役而命亦舍磨碣又與文忠皆生丙子是幸而偶與之同也二公之名雖重當世而遭逢排擯謗毀幾不自容仕雖嘗顯於朝而貶陽山謫潮州竄逐於羅浮儋耳之間踰嶺渡海冒氛霧而伍蠻蜃其窮亦甚矣顧余庸庸雖不能致盛譽亦不為排謗者所及況遭逢聖明忝職禁署蒙恩賜還無投荒之憂是幸而不與之同也然二公之文章德業赤然照映千古而余早罹艱虞中事奔赱學不加修文無可采將泯焉為衆人之歸是不幸而不能與之同也噫命之所舍既同則宜無不同而何相去若是之遼哉蓋窮達得喪由乎命智愚賢否存乎人存乎人者可為由乎命者不可必世之人常以不可必者責於命而不以可為者責諸巳所以多自恕而幸得也若二公者其道同其文學同故毀譽窮達有不必其同而自同則余之不能與之同者蓋有在也而豈命之罪哉山陽錢文則能推星以言人之禍福無不竒中士大夫多稱道之將逰湖海徴余言為贈因書所以自警者貽之且使遇夫自恕而幸得者告焉文則讀書好修善鼓琴斯術其餘事云送示上人序報恩教寺在吳之北郭距吾舍為近其中有修竹古􅝸廣堂邃閣可以覽觀眺望却煩囂而挹虗爽其主席若無言宣白雲聚又皆賢而與余善故與諸文友揚孟載張來儀王止仲徐幼文􅒰數往逰焉每登西麓聚落葉籍坐探韻賦詩抵日入鳥歸乃去寺僧好事者亦往往挈茗抱琴來徔之有示上人者居衆中年雖少而警慧好學余固期其為良緇流也後余徙家于郊及徔仕南亰不復至者數年既歸今年春始一過焉而無言白雲皆巳化去舊僧多𣪚亡竹樹舍宇頗蕪廢弗理計當時同逰者惟止仲在郡餘或出或處亦各之四方俯仰躊躇為之衋然以悲而示上人聞余來迎勞甚歡語昔逰之樂意若碩復徔余周旋者叩其學則巳能究宗要且攻為詩章方為今住山因公所知延為寺之苐一座余知其果可為良緇流也則復為之逌然以喜焉未幾上人往住吳江之寶覺寺士大夫多賦詩送之其徒與余善者宗源為來請序其首因書疇昔之事與知上人之素者貽焉夫上人往矣然吾聞寶覺在吳淞笠澤之間江雲湖波沙禽浦樹朝夕變化之狀不可摹繪固東南之勝區所謂可以覽觀而眺望者又當逺過報恩則余不可以不逰也欲逰安得復與向之諸文友者同哉贈醫師何子才序余嘗與修元史考其故實見士之行義於鄉能濟人之急者皆具録焉或謂死喪疾病之相救助固鄉黨朋友之事非甚難能者夫何足書余則以為自世教衰人於父子昆弟之恩猶或薄焉其視他人之危能援手投足以拯之者於世果多得乎不多則君子宜與之不可使遂泯也乃采其尤卓卓者為著于篇自退伏鄉里聞有斯人之風者猶復為興慕焉一日趙子禎氏謁余城南言曰近㒒自淮南携纍而東歸也奔赱水陸之艱觸冒霜露之慘既抵家而俱疾焉蓋老稚數口無免者呻吟咿嚶僵臥滿室湯粥之奉不時恤問之友不至相視盻然為溝壑矣醫師何子才日來視之療治周勤藥褁成績㒒有慚心而子才無倦色既彌月而皆起焉今以衰暮之年與老父幼孫復得相依以保其生者皆子才之賜也顧無以報碩惠一言識區區之感焉余以子禎家素貧固非常有德於子才而子才亦非有兾於子禎者乃活其闔門於瀕死豈非以濟人之急為心而世所不多得者乎若是固不可使無聞也然余文思荒落不能張子才之賢姑序以復於子禎氏子才能存此心而不息義聲積著則固有當代之執茟者書矣婁江吟藁序天下無事時士有豪邁竒崛之才而無所用往往放於山林草澤之間與田夫野老沉酣歌呼以自快其意莫有聞於世也逮天下有事則相與奮臂而起勇者騁其力智者效其謀辨者行其説莫不有以濟事業而成㓛名蓋非向之田夫野老所能羈留而狎玩者亦各因其時焉爾今天下崩離征伐四出可謂有事之時也其決䇿於惟幄之中揚武於軍旅之間奉命於疆場之外者皆上之所需而有待乎智勇能辨之士也使山林草澤或有其人孰不碩出於其間以應上之所需而用已之所能有肯稿項老死於布褐藜藿者哉子生是時實無其才雖欲自奮譬如人無堅車良馬而欲適千里之塗不亦難矣故竊伏於婁江之濵以自安其陋時登髙丘望江水之東馳百里而注之海波濤之所洶欻煙雲之所杳靄與夫草木之盛衰魚鳥之翔泳凡可以感心而動目者一發於詩蓋所以遣憂憤於兩忘置得喪於一笑者𥘉不計其工不工也積而成帙因名曰婁江吟藁若夫衡門茅屋之下酒熟豕肥從田夫野老相飮而醉拊缶而歌之亦足以適其適矣因敘其篇端以見余之自放於江湖者為無所能非有能而不用也送虗白上人序余始不欲與佛者逰嘗讀東坡所作勤上人詩序見其稱勤之賢曰使勤得列于士大夫之間必不負歐陽公豫於是悲士大夫之風壞已久而喜佛者之有可與逰者去年春豫客居城西讀書之暇因往雲岩諸峰間有所謂可與逰者而得虗白上人焉虛白形癯而神清居衆中不妄言笑余始識於劍池之上固心巳賢之矣入其室無一物弊簀折鐺塵埃蕭然寒不暖衣一衲飢不飽粥一孟而逍徑徜徉若有餘樂者間出所為詩則又紆徐怡愈無急迫窮苦之態正與其人類方春二三月時雲岩之逰者盛巨官要人車馬相屬主者撞鐘集衆送迎唯謹虗白方閉戶寂坐如不聞及余至則曳敗履起從指幽導勝於長林絶壁之下日入而後己余益賢虗白為之太息而有感焉近世之士大夫趨於途者駢然議於廬者歡然莫不惡約而碩盈迭誇而交詆使虛白襲冠帶以齒其列有肯為之者平或以虗白佛者也佛之道貴靜而無私其能是亦宜耳余曰今之佛者無呶呶焉肆荒唐之言者乎無逐逐焉從造請之役者乎無髙屋廣厦以居美衣豐食以飬者乎然則虛白之賢不唯過吾徒又能過其徒矣余是以樂與之遊而不知厭也今年秋虛白將東逰來請一言以為贈余以虗白非有求於世者豈欲余張之哉故書所感者如此一以風乎人一以省於已使無或有愧於虛白者而已送劉俠序至正二十三年秋太尉承制以市舶提舉吳陵劉君同知松江府事將行其同列走書來徴文以道其美余於劉君辱交最􅌋今之去雖無請者猶不敢默然而已況勤諸君之請邪然劉君之碩材潔操隆聲雅望其自撫戎政司啇稅所以威輯乎悍卒惠被乎逺人者既已充聽者之耳而𥚹談者之口矣余何加乎若夫推太尉以用君之意以慶其民幸者則亦無幾焉昔吳之冨擅南服其屬邑旁郡亦號蕃庶自窺西疆相望殘燬而松江於東一柝之警不起民恬物熙獨保完實斯其民亦幸矣然數年間軍旅之需殷而賦斂之役亟彼創殘疲羸者既不可以重困則凡有所征捨兹土奚適哉故芻粟者往焉布縷者往焉朝馳一傳需某物暮降一符造某器輸者屬於途督者雜於戶地雖未受兵而民已病矣於是怨咨之聲流刻弊之形見梘他邑之民雖葺破墾廢而泰然田廬中無發召之勞無課責之苦反若有不及者吁其幸乃所謂不幸歟今太尉知其然慨然思得良吏以撫循之而劉君獲在選焉夫同知與太守相可否於黃堂之上者其為任不輕而重也劉君亦知其所以致此乎余聞太尉之將授君以是職也指其名語僚佐曰此人能愛民夫愛民先王所以治天下也而況一郡乎哉太尉能以是取人可謂知所本矣且劉君往矣必能益發之於政則松江之民不其又幸歟雖然古之人聞凡一言之善則揚之而不敢隱況聞之於上者乎余之區區所以樂道斯語非惟有以張劉君也亦將使凡吏於時者知在上之意而將順之則民之為幸廣矣庶乎結厚澤於悠深復盛治於熙洽也他日考之豈不有所自哉贈醫士徐仲芳序昔柳子傳宋清言清居善藥有就清求藥者雖不持錢皆與之積劵如山度不能報輒焚劵余固疑清之未善也苟不責報尚何以劵為哉又言清取利逺故大而卒以富是知清猶未免於利耳吳醫徐仲芳世攻治小兒至仲芳而益精人之請於門者相屬也仲芳視其為士大夫及窮乏者輒先焉雖烈風赤日乘一驢兀兀黃埃中周臨其廬無敢後其視疾必謹與劑必良嬰稚之賴以不殤者蓋衆矣有奉物詣仲芳謝者卒却去或問之則曰士大夫吾所敬窮乏吾所憫義皆不可取吾非為詭也彼資雄而仕達者固又何辭故人皆德仲芳雖後有復請仲芳赴之益先人至有愧心而仲芳無倦色嗚呼若是可不謂賢乎世嘗言今之人不及於古逺矣觀清之焚劵而仲芳并劵有不取清猶以利而仲芳以義是則仲芳之賢不止於及清而巳也余友戴伯庸氏一日來告曰㒒有弱息嘗苦多疾獲仲芳而愈數欲報仲芳而仲芳不吾受也度終不可以虛其德碩求子之文以贈之余謂仲芳之賢既可書且余以嘗德仲芳者戴不余請余可已乎哉雖然宋清以柳子之文而傳今仲芳之賢雖過於清而余文不足以及柳子顧能使之傳邪然戴之欲之也姑為書其概以俟如柳子者徴焉送徐以文序余少喜交遊以方侍養不得逺去以求友於四方故獨與鄉里之君子遊若徐君以文其人也後不幸失怙恃而天下有變所在多梗又不得遠去以償其志然十餘年間四方之士來吳者則亦未嘗不得見焉其豪健俊偉魁閎辨博飲酒談笑以意氣相得者固不為少至於講義理之微詠性情之正薰然和粹然溫優柔浸漬相入以善而不自知者則未有及以文者焉乃知未行四方耳苟行四方若以文者亦豈易多得哉余用是益親以文而以文亦不余厭也蓋自少及茲之壯其間春華之晨秋月之夕空山流水之濵崇臺古榭之上以文未嘗不往而余未嘗不從二人者樂其相得之深從容周旋忘其為喪亂之時羈窮之日也蓋以文不汲汲求世知居衆中退然若無所能者故人皆失以文而余獨得之豈非幸也哉今年夏以文將讀書吳興蜀山中來以别告余謂久合而有睽離人事之必然者也豈足為甚戚也但以文今絶去紛囂得益厲舊學以求其道顧余乃浮沉閭里間卒荒落而無所成是則不能無介然於懷耳雖然以文固不可留余則豈不能去是哉待秋風之興當扁舟而南尋書聲於雲溪煙樹間以文尚肯以所得告我哉代送饒參政還省序太尉鎮吳之七年政化內洽仁聲旁流不煩一兵強逺自格天人咸和歲用屢登厥德懋矣然猶不自滿而圖治彌厲嘗懼聽覽之尚闕而思僚佐之相裨也乃承制以淮南參政臨川饒公領咨議參軍事公辭以非材即躬臨其家諭之至意公感激遂起視事鳴呼盛哉此豈偶然也耶蓋天將興人之國則必賚以聰明竒特之士與之左提右挈以就大事故其相合之深相信之篤冥契默諭有莫知其所以然者今公之起也人之見者歎於途聞者頌於室莫不謂公直氣讜言夙有以結太尉之知故能當簡注之深獲登庸之光然不知天之相之者有不如是之偶然也且嘗論之人才之不能相通也故明於巨者或有昧於微得乎此者或有遺乎彼其得而兼焉者寡矣今太尉奠此南服端拱廟堂舉境內之事而屬之參軍凡內外大小無不關白其為任亦豈易言哉蓋致治理則求其學術之醇論攻守則資其計畫之良對賔客則藉其辭令之善用人物則取其鑒識之精而況文牒之所交馳簿籍之所叢委苟一事之不通一才之不具則亦末足稱之矣今公能從容其間泛應曲當使臨至重而不驚處至煩而不擾故雖以某之陋獲與公共事而亦得以寡過矣且接尊爼之餘談樂圖書之清暇翺翔大府以極一時之盛則公之才豈獨上賴之哉某亦賴之矣今年秋公得解所領職還署省事竊以嘗有協恭之好於其去能無言乎故論次其説以為序送江浙省掾某序近代之取人者有二焉曰儒與吏而巳夫吏固儒之一事非可以並稱也蓋詩書禮樂所以明道律令章程所以從政不明乎道則無以知出治之本不從乎政則無以周輔治之用古者君子之學所以通而後成也二道既分儒忽吏為末而謂之不足為吏訾儒為迂而謂之不足用各視時之所尚以相盛衰其為弊也久矣國家自失承平挍政庶務實繁在上者欲其嚴辦以供一切之需也故任吏尤専重而儒有弗及者矣嗚呼豈非其惑歟蓋聞孫卿氏之言曰相髙下視墝肥序五種君子不如農人相美惡辨貴賤君子不如賈人設規矩陳繩墨便器用君子不如工人不恤是非然不然之情以相薦拔以相耻怍君子不如惠施鄧析然則治文書奉期會摘獄訟之微較賦稅之悉儒固或不如吏矣至於屏邪慝之風行仁義之説使上尊而下親內修而外服非儒其孰能之乎故善為國者未嘗以此而易彼也今厭其髙而樂其卑捐其大而收其小何哉亦竊求其故矣蓋謂今之儒末及於古不足以稱上之所使也夫儒不能盡為古之儒然吏亦豈能盡為古之吏哉是但知垂紳獵纓空言而不切於事者之非儒而不知磨鉛削牘拘法而不通夫義者之非吏也其可乎余故嘗感嘆而思之以凡在上者亦過矣茍有於此焉不以儒為不足用而特任之則知夫出治之本而其政豈不成乎既有思之則非在上之過也亦儒之過焉耳苟有於此焉不以吏為不足為而兼通之則周夫輔治之用而其道豈不行乎若其人者世固有之而余未得見之也今年冬某人以江浙省臣之辟為掾余聞其讀書與律學頗事古豈非所謂其人歟將行也其友有來裒士大夫所贈若干篇而屬余序者乃欣然告之曰夫掾雖吏也然佐外宰相治藩府凡方面之事雖不得行亦可得而言也且省臣能取子於人人之中是知其賢矣知其賢於言有不聽乎子今能以所學施於時顯有成效使皆知儒之非迂則上之所尚有不改絃而易轍者乎儒之振不振吾於子行卜之矣夫欲援吏而歸於儒者是吾所望於子也若云叛儒而入於吏者豈吾所望於子哉送蔡參軍序國朝置參軍為三公之屬舊制也然平時三公無親職而參軍多私人故視之者若不甚重今太尉清河公仗專征之鉞雄鎮南藩以戡亂為已任舉封內之事而屬之參軍故其職密要華顯遂非他官所能及矣然居是者非忠足以受寄智足以造謀而略足以濟務者弗稱也太尉公嘗曰與我共成大㓛者其惟良參軍乎故未嘗輕以授人而人得之者則莫不謂之榮焉江浙行樞密院經歷蔡侯久在幕府茂著厥績所謂忠智與略實備于已𥘉參軍之貟有闕也太尉方求其人而談者巳私擬曰宜為是者其蔡侯乎未幾命下果侯也於乎此豈偶然而巳哉蓋侯之賢夙有以當太尉簡注之深而致國人期望之重故上下之意匪謀而一譬諸大寶橫道人無智愚皆知趨而取之𥘉不待於相告也不然則何以能冥契合之神如是哉於是在上者授任之不差在下者清議之不泯并侯之能稱是職而必與太尉共成大㓛者皆可見也抑何盛哉余時竊伏田里有欲獻於侯而未暇也適侯之故僚吏有來徴文頌侯者乃坐而歎作而言曰夫士君子之道成於身而出用於世也豈不欲流大名施厚澤乎然嘗患不得乎其位位得矣而又患不逢平時二者之棠偶則終於挾大技而莫呈抱竒貨而弗售此古人所以多感憤悲傷而自嘆於不遇也然則逢時而得位者非古今之所難而為士君子之至幸歟今侯之為參軍也凡征伐之密侯得聞之黜􅕾之重侯得與之兵民御撫之方規賔客應對之辭令侯皆得兼謀而並任之則侯之位亦得矣海內雖未康靖而太尉方興桓文之業內修外攘以答天子之寵命則侯之時亦逢矣侯於是時能思古今之所難得者已實得之而大攄宿學以為其職之所當為則東南之人有不誦侯之名而𬒳侯之澤者乎蓋區區所以碩望於侯者亦太尉任侯之意也侯其懋乎哉侯其懋乎哉送黃省掾之錢塘序錢塘為東南之會自五季之亂海內創殘而錢氏父子能保其國又能知歸於宋不煩征誅故獨幸富全逮我朝國師南駕既受宋降市不易肆列聖相承重熙纍洽涵飬安息以至于今計其民之不識兵禍巳四五百年矣故城邑人物之繁園池臺榭之麗皆足以侈於遊觀而誇於談咏舟車管絃日至於西湖之上者不間風雨又有名花珍果水陸之味雜出於四時而非特居者之樂九仕於是者亦莫不酣嬉而忘去也可謂盛哉至正改元云云越三月而圍解內則困於疫飢外則蕩於燔掠向之所可觀者鞠為荒煙宿莽遺灰斷甓蓋四五百年之迹銷滅毀壞欲求見其倣佛而無在者矣況連歲流民未還行旅罕至則非特居者之戚凡仕於是者亦莫不倣徨而厭留也可勝嘆哉今年秋江浙行省左丞潘公由吳興徙鎮茲土聞荆南黃君仲博之材辟以為掾將行其友有來乞言贈之者乃為之言曰夫地之廢興盛衰雖有其時然豈不係於人哉苟有其志者躬葺理之勤需培積之久有不能變凋弊為完庶者乎今錢塘雖繁華委謝而江山之形勝猶在也仲博始至之暇能為我一周覽乎升于髙見陵谷之可憑則思設備禦之規行于野視廬井之可復則思興墾闢之利歸言于公而行之使寇不能復來民不致久困方面之事其孰有大於此乎仲博固有志者必能如余言他日抱鼓不聞民得安遂其生桑麻雞犬隂交而聲應皆忘其為喪亂之餘而漸復承平之舊余將幅巾梨杖南逰湖山之間樂觀盛事然後賦詩以頌公之㓛有成而并為仲博賀也豈不偉哉豈不偉哉贈王醫師序君子必慎疾慎疾必先於擇醫甚矣擇醫之難也其論證之是非投餌之當否非通其術者莫察也士之通其術者甚寡茍不察焉而求驗於巳試之後待其危而黜之晚矣豈慎疾之道哉世故無以知其良則徔衆之所稱者而趨焉曰其傳幾世矣其活幾人矣良醫也相率非其藥不食子不迎以視其親曰不孝弟不迎以視其兄曰不悌凡長者不迎以視其卑幼曰不慈而病者不自迎以視已曰不智雖失療以死不悔嗚呼衆之所稱者其果良否乎吳之醫最多舉城而籍之不啻千百而得名者數人其術未必皆良而良者反扼其下不得出甚可歎也今年春友人徐君幼文云云德之來徴言以贈余謂復𥘉誠良醫矣然人未有盛稱之者惜余言之不足重於世不能張之然觀有美譽而無實用而不得大聞於時者天下之事多矣不特醫也復𥘉何尤焉贈醫師龔惟德序廣陵周克恭氏以事來吳介友人謁余言曰京口有龔先生惟德者治俞扁之術其視疾審若鑑之照物其投劑當若矢之中的其施惠均博若輪之行地不以髙下而易軌也故言良醫師者必歸惟德焉吾家瓜渚距京口隔大江兒嘗遘危疾惟德來視之駕扁舟越風濤略無所避既療之輒愈顧余年巳非壯後梘承先世之重者眇焉在是兒也不幸而有疾有疾而幸惟德起之則其所以惠我者不惟是兒乃延吾後於無窮而免余於不孝也其德宜何如報哉然奉之以金弗受也將之以幣弗領也吾可終無以報者乎蓋思可以章吾心而侈其德於當世者莫如君子之言焉余來是邦聞先生以文名敢請余辭未遑他日又來言曰惟德非特於吾為然也凡於士之貧與流播羇寓者皆然也今其一門三世下孝而上慈家道雍豫而夀樂且康者豈非由是致哉碩先生為之言余乃嘆曰夫施德於人而不責報者非世所謂難能者歟然急利者之所難而有道者之所易也蓋人雖不能報而天必報之矣故責於人者不得於天得於天者不責於人責於人有得有不得責於天則無所不得也且天之報人雖若茫昧然不可以朝夕以需苟行之不怠以俟之則其所得較之於人者不啻乎多矣今惟德其能責於天者乎其能行之而不怠者乎其庶幾所謂有道者乎是皆余所喜聞而樂言者也況克恭之請之勤哉雖欲辭固不得辭也遂書緑水園雜詠序吳城西南陬有曰朱家園者父老言宋朱勔故墅也廬山陳惟寅氏得之更名曰緑水以園中有池且用杜子美詩語也其林沼亭軒亦各有扁焉近雖破廢然寬間幽勝猶可以釣遊而嘯歌惟寅以余往來其中最熟求遍詠之噫當勔以幸貴時窮尚豪侈園中之珍木異石崇臺嶢榭固當百倍於此文人詞客為之稱美而誇詠者亦多矣今皆迹滅響沉無復可覩惟寅雖窮居隱約而能以詩書世其業篤於孝友其清德雅操固可以蔑視勔矣則余為之執茟亦可以無愧焉因不復辭且庶幾或傳使父老知園之更名緑水者自惟寅始也詩凡十六篇缶鳴集序古人之於詩不專意而為之也國風之作發於性情之不能巳豈以為務哉後世始有名家者一事於此而不他疲殫心神搜刮物象以求工於言語之間有所得意則歌吟蹈舞舉世之可樂者不足以易之深嗜篤好雖以之取過身罹困逐而不忍廢謂之惑非歟余不幸而少有是好含毫伸牘吟聲咿咿不絶于口吻或視以廢事而喪志然獨念才踈力薄既進不能有為於當時退不能服勤於畎畒與其嗜世之末利汲汲者爭騖於形勢之途顧獨事此豈不亦少愈哉遂為之不置且時雖多事而以無用得安於間故日與幽人逸士唱和於山顛水崖以遂其所好雖其工末敢與昔之名家者比然自得之樂雖善辨者未能知其有異否也故纍歲以來所著頗多近客東江之渚因間始出而彚次之自戊戍至丁未得七百三十二篇題之曰缶鳴集自此而後著者則别為之集焉藏之巾笥時出而自讀之凡歲月之更遷山川之歷􅍱親友睽合之期時事變故之迹十載之間可喜可悲者皆在而可考固不忍棄而弗録也若其取義之或乖造辭之未善則有待於大方之教焉姑蘇雜詠序吳為古名都其山水人物之勝見於劉白皮陸諸公之所賦者衆矣余為郡人暇日搜竒訪異於荒墟邃谷之中雖行躅殆遍而紀詠之作則多所闕焉及歸自亰師屏居松江之渚書籍𣪚落賔客不至閉門默坐之餘無以自遣偶得郡志閲之觀其所載山川臺榭園池祠墓之處余向嘗得於煙雲草莽之間為之躊躇而瞻眺者皆厯􅍓在目因其地想其人求其盛衰廢興之故不能無感焉遂采其著者各賦詩詠之辭語蕪陋不足傳於此邦然而登髙望逺之情懷賢吊古之意與夫撫事覽物之作喜慕哀悼俯仰千載有或足以存勸戒而考得失猶愈於飽食終日而無用心者也況幸得為聖朝退吏居江湖之上時取一篇與漁父鼓枻長歌以樂上賜之深豈不快哉因不忍棄去萃次成帙名姑蘇雜詠合古今諸體凡一百二十三篇云洪武四年十二月日前史官髙啓序
