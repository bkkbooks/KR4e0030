front:
  text: 髙太史鳬藻集卷之二
  hash: sha256:23d866719fec25559195241d0f004e37615298f84c39c9d47ff8cf6fa5135d25
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0030_SBCK_002-1a}
body:
  text: 後學周立編輯序史要類鈔序余嘗讀史病其煩而難記𣪚而難觀也因仍通鑑之舊采掇而分次之所以舉要以省其煩立類以合其散使之粲然可考而無難也捴為二卷名之曰史要類鈔嗚呼世教衰而博學審問之㓛廢學者日趨於苟蕳而不自止故經有莭文史有略本百家諸氏之書皆有纂集以為一切速成之計遂使義理之微不備事變之實不詳無以淹會貫通明其同異而辨其得失矣此蓋為學之弊至是而極矣余為是編豈所謂耻過而作非哉亦余之不得已也夫三代而下作者日滋其於言雖有淺深大小之不同然其間皆莫非至理之所在也苟欲窮之則茫洋浩汗非殫歲月疲精思有不能究其萬一亦可謂難矣而況余以魯鈍之資處喪亂之世奔走之役勞其形憂患之事拂其性而欲從事於此豈不又難矣哉然嘗懼其荒落而卒於無聞也故區區於聖賢之書猶不敢廢間因讀史而作是編以自便覽閲雖未免苟蕳之失然其興壞理亂有切於當世者亦具在是則庶乎可免為無聞之人矣故曰亦豫之不得已也天若欲成其志使得有飦粥之飬以自返於大山長谷之中一肆其力於所未知則亦將無事於是編也元史曆志序夫明時治曆自黃帝堯舜與三代之聖王莫不重之其文備見於傳記矣雖去古既逺其法不詳然原其要不過隨時考驗以合於天而已漢劉歆作三繞曆始立積年月日法以為推步之凖後世因之􅍓唐而宋其更元改法者凡數十家豈故相為乖異哉蓋天有不齊之運而曆為一㝎之法所以久而不能不差既差則不可不改也元𥘉承用金大明曆庚辰歲太宗西征五月望月蝕不效二月五月朔徴月見於西南中書令耶律椘材以大明曆後天乃損莭氣之分減周天之杪去交終之率治月轉之餘課兩曜之後先調五行之出沒以正大明曆之失且以中元庚午歲國兵南伐而天下略㝎推上元庚午歲天正十一月壬戌翔子正冬至日月合璧五星聯珠同會虛宿六度以應太祖受命之符又以西域中原地理殊遠創為里差以增損之雖東西萬里不復差忒遂題其名曰西征庚午元曆表上之然不果頒用至元四年西域札馬魯丁撰進萬年曆世祖稍頒行之十三年平宋遂詔前中書左丞許衡太子贊善王恂都水少監郭守敬改治新曆衡等以為金雖改曆止以宋紀元曆微加增益實未嘗測驗於天乃與南北日官陳鼎臣鄧元麟毛用翼劉巨淵王素丘鉉髙敬等參考纍代曆法復測候日月星辰消息運行之景參别同異酌取中數以為曆本十七年冬至曆成詔賜名曰授時曆十八年頒行天下二十年詔太子諭德李謙為曆議發明新曆順天求合之微考證前代人為附會之失誠可為之永久自古及今其椎驗之精蓋未有於此者也今衡恂守敬等所撰曆經及謙曆議故存皆可考據是用具著于篇惟萬年曆不復傳而庚午元曆雖未嘗頒用其為書猶在因附著于後使來者有考焉作曆志元史列女傳序古者女子之居室也必有傅姆師保為陳詩書圖史以訓之凡左右佩服之儀內外授受之别與所以事父毋舅姑之道蓋無所不備也而又有天子之后妃諸侯之夫人躬行於上以率化之則其居安而有淑順之稱臨變而有貞特之操者夫豈偶然哉後世此道既廢女生而處閨闥之中溺情愛之私耳不聆針史之言目不覩防範之具由是動踰禮則而往往自放於邪僻矣苟於是時而有能以懿莭自著者焉非其生質之美則亦豈易致哉史氏之書所以必録而弗敢略也元人受命百有餘年女婦之能以行聞於朝者有矣然其繁殆不能盡書今采其尤卓異者具載于篇其間有不忍夫死感慨自殺以從之者雖或失於過中然較於苟生受辱與更適而不知愧者有間矣故特著之以示勸厲之義云送唐處敬序余世居吳之北郭同里之士有文行而相交善者曰王君止仲一人而已十餘年來徐君幼文自毗陵髙君士敏自河南唐君處敬自會稽余君唐卿自永嘉張君來儀自潯陽各以故來居吳而卜苐適皆與余鄰於是北郭之文物遂盛矣余以無事朝夕諸君間或辨理詰義以資其學或𢋫歌酬詩以通其志或鼓琴瑟以宣堙滯之懷或陳几筵以合宴樂之好雖遭喪亂之方殷處隱約之既久而優遊怡愈莫不自有所得也竊嘗以為一郡一邑有抱材藝之士而出於凡民者皆其地之秀也若諸君其諸州之秀欺以諸州之秀萃於一鄉吾里何幸哉且人之求友者或命駕褁糧逰於四方而未必可得今余不出閭閈而獲友之多如是則非吾里之幸而余之幸也然自前年士敏往雲間去年幼文往吳興今年處敬又將往嘉禾而仕焉衆客觴别於余舍酒半余戚然曰諸君之居吾里誠幸矣今去者過半而留者猶未可羈也然則誰終與處此乎客有起者曰子母戚子單居寡侶時不知有諸君之合也及用聚群逰時又豈知有諸君之離哉合而離離而合其理無常則他日之復合於此者固未可知也言既客又有起者曰君子所貴乎同者道也所喜乎合者志也古有尚友於千載神交於千里者以有所合而同爾豈必生同時居同里連棟宇之密而接杖屨之勤乎諸君能不以逺而忘其好不以踈而易其志不以窮達而渝其久要之心則雖限胡與越而亦不異於北郭之近矣衆客皆喜既醉而别余善其言遂録為送處敬序送倪雅序余少未嘗事齪齪負氣好辨必欲屈座人一日遇倪君於客館其年又少而氣則過余與之論兵家書窮晝漏余不能屈也故余且異君而君亦不鄙余遂相與㝎交焉自是每見必挾史以評人物成敗之是非按圖以考山川形勢之險易或命酒對酌歌呼淋漓意氣慨然自謂㓛名可致不難也中罹變虞余旅食江上别君者纍年屏伏摧沮曩時之意盡矣及歸而訪君城南則亦載筆㒒㒒新辟為宥府掾曹署間問之則曰親老矣方急於祿飬餘非吾事也間出其從征時所為渡長江踰長淮登龜山過盱眙夀春諸詩讀之皆悲壯沉􅓹感風物於一時懷英雄於千古者然後知君雖折而氣不衰其過余者固在也今年春􅊾調松江幕旦過辭且求所謂贈言者余聞良材之木不􅈬刻斫則無以為美觀逸足之駒不服調御則無以能致逺瓌瑋魁閎之士不遭困約卑屈則無以益智慮而成志業使吾二人者當時以邁往之氣未試之學驟進而用之則今寧不有悔乎故凡不達於少者非不幸也雖然君今出而與有民焉苟盡心於為政則此而上猶階而升堂也功名果何難致哉若余日習荒陋不能自白于世聞海隅多棄地可耕以卒歲則碩受一㕓焉送錢塘施輝修太廟樂器序至正二十三年四方粗平大藩逺夷悉效職貢天子以惟列聖降枯用克康濟斯難將有事於大室以告成㓛以答靈貺而樂器故弊懼無以格神召和乃命春官某馳傳江南爰求善工以修製之於是錢塘施輝以斫琴應詔昔我世皇受命既㝎海宇肇造一代之樂時輝之祖實以是藝進得官而歸今輝能世其業際中興之運復得用於宗廟之間是可嘉矣雖作樂之意所謂崇德象烈者非其所喻然制作中程者發響應律備搏拊之用合詠歌之聲使雲車風馬洋洋而來下者亦豈可少哉故其行也士大夫咸餞以詩而俾啓為之序啓竊有所感焉蓋聞諸董子曰琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也是天下之政猶琴瑟爾今國家承大亂之後紀綱縱弛凡百年所行之法其久而弊若此器者亦多矣苟得大工以修舉之則其感和順之氣格頑蠢之心也何難焉書曰工執藝事以諌輝能以此一言乎送二賈君序至正已亥歲余閲江浙行省貢士目有名祥麟名祥鳳者其氏俱賈其籍俱杭之海寧詢之蓋兄弟也余謂浙之為省列郡纍十支邑纍百抱藝而就試者纍千也然限以名數能進于列者無幾焉求二人同出於一郡者寡矣況一邑乎求二人同出于一邑者又寡矣況一家乎賈氏二子一舉而畢登是列豈不足稱哉今人家有草木花實駢生而並秀者猶傳以為瑞二子非賈氏之瑞乎時頗心羡之而未識其人也明年行宰相以亰師道梗不能使試於禮部遂以便宜授校官於是祥麟為長洲縣學教諭祥鳳為學道書院山長皆來於吳因得與之友焉問學以相資道義以相勉不自知其好之深遊之久也乙巳春二君始得代告歸求所謂贈言者余觀二君之名而有感焉夫麒麟鳳凰天下之瑞物也出必當國家之治不治而出非瑞矣二君今歸海隅益習舊業不急於其出則所謂翔浮雲之表遊大野之外也他日應時而來和其聲耀其文則又為一國之瑞不特瑞一家矣𥘉尊君命名之意其亦出諸此乎二君歸謁試以諗之送吕山人入道序嘗讀五代史見縉紳之士能嫉世逺去不汚其亂者曰鄭遨張薦明二人而已而其隱也皆托迹山林為老氏之徒余始怪之以為君子知不可仕則韜晦以飬其志可矣何必變衣冠之制棄詩書之業長往而不返哉豈非干戈之際武夫得志章甫縫掖之流不為時之所喜抑恐為人之所迫不如是不足以自絶歟求其志未嘗不深悲也且當是時中國之主屢易士以苟得幸免為心而無愧耻之莭風俗蓋大壞矣而猶有二子者焉今天下雖亂未至於極斯人者何獨少哉蓋有之而余未得以見也若吕山人其庶乎二子之所為者乎山人少欲舉進士遭時兵興遂避地梁溪汾湖之間閉門教授服弊茹糲以勤苦自厲絶不干於人久之猶以為未也乃著黃冠謝遣弟子將東逰海濵求大山長谷而居之噫山人之志亦可悲也夫昔歐陽公傳遨薦明之事歎世亂文字殘缺賢人之迹湮而不聞故所得者甚寡有悲傷不滿之意余懼山人之名亦遂泯也故為文以送之他日史臣欲訪遺事於草萊之間庶區區之言或有足徴焉山人名敏字志學毗陵人贈何醫師序友人余君唐卿將以使事往海虞抵余言别且有請曰吾友王仲元氏有痔形下體甚苦越醫何朝宗益熾以藥使盡其毒而起衆始駭而卒服焉仲元德之欲吾文以報適有區區之役不克為之執茟碩子惠一言焉余未識仲元雖唐卿之友猶余友而余文豈唐卿之文哉然朝宗與余逰余亦嘗德之者其又何辭夫治絲之棼者必斷之治水之濫者必決之治疾之法亦猶是矣方疾之深伏而固結也喣焉而恐傷之撫焉而恐撓之譬如狎猛獸而飬暴兵將不勝其患矣故必攻之以撥其根潰之而泄其藝庶可以收全㓛而無遺悔也然其安也或出於至危非醫之自信者不敢試於人人之信於醫者不能使之試自信而人信之世之相遇良難也今仲元之智足以信其醫朝宗之能足以自信冝其所以收全㓛而無遺悔也嗟夫天下之事有之矣憚小害而不為顧大患而不恤逡巡歲年而莫知其所終豈非自信而人信之者其相遇為尤難歟唐卿既行使吏持卷來徴書余既為論次遂并以所感者寓焉荊南唱和集後序荆南唱和詩若干首句吳周履道毗陵馬元素所共著也二君嘗客陽羡荆溪之南故以名編庚子春余始識履道於吳門相與論詩甚契因以一帙示余曰此野人之詞也恐世之嗜者少故未敢出子今為我評之豫讀之愛其清粹雅淡有古作者之意因乞而藏于家自是履道與余遊未嘗不道荆南之樂且曰恨子不識元素後余卜館雲岩之西岡履道每乘扁舟訪余至則留連纍日余與之緣崖遡澗搜覽無厭一日雨霽鳥鳴春木蔭壑余􅌽履道坐磐石命諸生行觴鼓琴酒酣履道起歌其詩數章既而歎曰自吾别元素去荆南謂山林燕咏之樂不可復得矣今乃與吾子相羊於此豈偶然哉又曰吾衰矣恐無以稱列于後苟得片辭之傳使吾名因而自見亦可以少無憾矣余當時甚怪其言之悲也越二年履道客會稽竟卒于兵余亦遭亂奔赱不遑啓處今年冬棲寓江滸間理篋中家乘盡失獨荆南集在焉因拊而歎曰此詩不亡天欲成吾履道之志乎其有傳必矣然履道學古人之道而區區欲以是名豈其志狹哉亦足以觀時之否矣尚念履道雖不幸於事無所試然讀其詩者見其居窮谷而無怨尤之辭處亂世而有貞厲之志則可併其所藴者而得之不特詩也履道於地下其真可以無憾矣乎是編之首履道元素與遂昌鄭先生皆巳有序余復為其後序以識履道平昔之語聞元素猶隱銅官它日待是而請交焉相與尋履道舊遊之迹於山荒水寂之濵豈不為一慨手送顧倅序東南之郡惟會稽錢塘為佳士之仕於外者咸樂居之以其風氣清美有山川臺榭之勝魚稻茶筍之饒人吏恬柔桀猾之蠹稀賔客材俊逰賞之會盛足以慰其勤勞宣其煩滯也而錢塘又為前代之遺都民習侈巧􅒡屋繁麗歌管之聲不絶於西湖之上故仕者尤樂居焉雖近殘於兵而其所餘猶非他郡之可及也丙牛秋淮南顧君攝尹吳陵還調是府判官賀者咸謂吳陵廢邑錢塘名都攝尹長吏判官二職去廢邑而得名都則釋愁歎之殷罷長吏而君二職則解責守之重顧君之樂當又過於凡仕者矣余則以為不然𥘉君之歸自吳陵示余詩若干篇無悼已羈淹之辭有哀民憔悴之意藹然豈弟君子也夫其往能忘其憂而思民之憂則于今肯專其樂而不同民之樂乎凡欲同於民有不獲則憂憂則樂復不得而全矣雖然君子之仕有所勉樂不樂非足計也君之行凡與逰者咸賦詩四韻以餞而余為之序送孫先生序濮陽公始鎮暨陽其客丹陽孫先生實為郡師暨陽當兵後學久廢先生至則顧其爼豆壞缺絃歌不興歎曰是非吾責邪乃言於公曰夫禮義者民之軌國之衛也民不知禮則無以格其非不知義則不能死其上然禮義之教出於學今學廢民其不知教乎公撫是土而用不教之民緩急其誰與守此公大然之先生乃葺齋祭之廬修講肄之室以與諸生升降乎其中孜孜汲汲日以聖賢之言鐫切之未幾咸知鄉方莫或自惰來遊來歌充滿廡下公視事之間亦輒從先生遊先生為言修齊治平之道興壞理亂之端與夫政事之是非生民之利病公往往恱而聽之去年冬公易鎮中吳先主適以秩滿告公遂要先生俱東暨陽之大夫土久服先生之訓念其去而無述也乃使來乞文焉啓惟學校之廢尚矣豈俗之難化哉吏少學而師不善教故也當承平時相習為文具莫有能致其意者及喪亂荐興老生碩儒竄伏草莽抱經而不講先王之教幾㮩矣間有欲振之者則圜視而笑其迂曰民且死奚暇事此哉時皆以為良然今暨陽屢殘于兵井邑荒落其民飢困偃踣宜若不可以進於學矣然先生一唱之而興絃誦於呻吟之餘行楫讓於鬪爭之際而無難者是知人無不可教之時而天理民彛之存於其心者未嘗一日泯也啓以先生之善教可書又足以釋時之惑也乃不辭而序之焉野潛藁序余客江上得晉陵徐君友焉嘗出其詩曰野潛藁者屬余序之余以君詩之工覽者宜自得之不待余贅也若其名藁之意則請推言焉夫魚于淵獸潛于藪常也士而潛於野豈常也哉蓋潛非君子之所欲也不得巳焉爾當時泰則行其道以膏澤於人民端冕委佩立於廟朝之上光寵烜赤為衆之所具仰而潛云乎哉時否故全其道以自樂耦耒耜之夫謝干旄之使匿耀伏迹於畎畒之間唯恐世之知已也而顯云乎哉故君子之潛於野者時也非常也且雷鳴於夏收於冬亦時也方隂氣凝沍百蟄未啓而雷發焉則妖矣天地閉塞綱紀淪斁而士出焉則謂之何哉傳曰君子在野書曰野無遺賢是時不同而君子之有潛顯也然時可潛矣而欲求乎顯則將枉道以徇物時可顯矣而欲事夫潛則將潔身而亂倫故君子不必於潛亦不必於顯惟其時而巳爾凡知潛顯之時者可以語夫道不然難乎其免矣當張氏擅命東南士之摳裳而趨濯冠而見者相屬也君獨屏居田間不應其辟可謂知潛之時矣及張氏既敗向之冒進者誅夷竄斥顛踣道路君乃偃然于廬不失其舊茲非賢歟然今亂極將治君懷負所學可終潛于野哉聞君素善易於隨時潛顯之義必自有以審之矣贈胡生序延陵胡氏自文恭公為宋嘉祐名臣其後子孫登進士苐致兩制方伯者以十數故世為大族文恭之十世孫元威嘗領鄉薦為校官若承旨濟南張公祭酒隆安魯公皆以器許之未得試其材遭時孔艱家喪於兵轉徙旅食於湖海者十有餘年去年冬余客吳淞之滸君適避地於此遂相與㝎交併識其子景彥余時違羣逺寓荒江岑寂之濵得君父子甚慰時往造其室見其環堵蕭然而父子講易終日超然自得無戚窮慕達之意余深賢之夫世之故家舊族為子若孫者平居率負以自髙及罹變故困踣戎馬之間不能固厲卒隳志易業以辱其先者多矣若君父子豈不可嘉也哉今年三月景彥將客邑人蔣氏家來乞言為別余謂景彥年壯而學富志強而行恭況熟聞父師之訓固無往而不可尚何待於余言哉然吾聞出之大者望必深望之深者責必重景彥能不以出之大者自喜而獨以責之重者自懼則其進如川之方至吾未能量其所止也文恭之澤未絶中衰而復昌者安知非景彥乎送徐先生歸嚴陵序嚴陵徐先生大年嘗被召至亰師與修元史書成上進詔擇纂修之士官之先生以老乞還甚力會春宫議修五禮為一代之典乃復奏留之未幾其書又成先生固申前請大臣知其志不欲強煩以事乃命有司具禮傳送以歸其鄉都之大夫士相與祖餞幕府門外有言者曰先生之學宜備顧問先生之文宜掌綸綍先生之經術操履宜在成均為學者師今皆不可得顧令以布衣老於家歸雖先生之志然豈不為司人物之柄者惜哉余進而解之曰皇上始踐大寶首下詔徴賢又責郡國以歲計貢士欲與共圖治平甚盛舉也故待賈山澤者群然簉庭如水赴海而隱者之廬殆空矣朝廷待以庶秩猶梓人用材巨細畢取豈獨於先生有遺哉蓋先王之為政莫先於順人情亦莫先於厚民俗力有所不任者不迫之使必為義有所可許者必與之使有遂所以人之出處皆得而廉耻之風作矣今先生以齒髮非壯厭載馳之勞戀考槃之樂抗辭引挹上之人不違其請者蓋將縱之山林使其鳥飛魚泳於至化之中以明吾天子之仁又將以風厲海內使皆崇退讓而息躁竸也順人情而厚民俗實在於是故寧失一士之用而不惜以其所得者大也不然先生豈苟去之徒而大臣豈棄材之士哉況先生之歸也必能著書立言以淑諸人詠歌賦詩以揚聖澤則又非潔身獨往而無所輔者也尚何疑哉吾又聞漢祖中興嚴光不屈後世莫不髙之今先生之鄉即光之鄉也嘗遊其耕釣之處山髙水長想瞻遺風必有邈契乎千載之上者矣今之歸其無負於夙昔之志哉若余遭逢明時不能禆益萬一懷恩茍祿而不去於先生蓋有愧焉矣於是言者是之請書貽先生以識别送樊參議赴江西參政序洪武三年四月制以大都督府參議琅琊樊公為江西行省參知政事僉都督事濮陽吳公遣其掾來致言曰國家始㝎江右置大都督府以捴軍政樊公時以材選首署府僚自照磨歷都事經歷以至今職處幕府者蓋十五年矣上意屢欲大用以方有事征討而公間於戎務藉其贊佐之力故遲之以俟成㓛蓋公於廷臣之中職甚劇任甚久而受知亦甚深也當王師拓中原下南服平幽朔取關隴戎車四駕之秋凡邉書之所奏論廟謨之所指授與兵資戰具之供儲尺籍計簿之鈎校期會嚴迫而案牘繁滋公度緩急之宜審利害之勢參畫處裁無繆愆違滯之弊使戎臣藩將去闕門數千里之外而徴書不稽奏請無壅以得遂其攻取之計者蓋於公頗有賴焉今年上以武㓛告成羽􅊾既蕳乃始輟宥密之居付屏翰之寄蓋將息其勩勞優以崇顯恩至渥也吾嘗二掌樞管實與公共事每念其勤而德其助於其别也固不能無情焉子其為文以泄吾私啓作而歎曰唐虞官人以三考為黜陟漢之用士以久任而責其成苟有治績則降詔以褒之增秩以勸之不輕改授也故人得盡力於其職練識情偽衆既信附而吏亦不敢欺焉若甫拜而遽遷朝此而夕彼雖有過人之才坐席猶不暇暖況能攄其藴乎今樊公四遷其官更十五年不出宥府其能自效卓卓如此者誠由聖天子知人善任之所致也何其盛哉啓叨掌國史名臣之行事職得采輯而紀録之於茲文也固不敢辭然又聞豫章之區襟帶江湖今之大藩也皇上方將載韜干戈與斯民休息於無窮公能靖撫一方使耄安稚嬉以復覩熙洽之治他日雍雍來朝寵賚有加鴻聲偉績足以焜耀不朽者啓尚當執茟而嗣書焉獨菴集序詩之要有曰格曰意曰趣而巳格以辨其體意以達其情趣以臻其妙也體不辨則入於邪陋而師古之義乖情不達則墮於浮虛而感人之實淺妙不臻則流於凡近而超俗之風微三者既得而後典雅沖淡豪俊穠縟幽婉竒險之辭變化不一隨所宜而賦焉如萬物之生洪纎各具乎天四序之行榮慘各適其職又能聲不違莭言必止義如是而詩之道備矣夫自漢魏晉唐而降杜甫氏之外諸作者各以所長名家而不能相兼也學者譽此詆彼各師所嗜譬猶行者埋輪一鄉而欲觀九州之大必無至矣蓋嘗論之淵明之善曠而不可以頌朝廷之光長吉之工竒而不足以詠丘園之致皆未得為全也故必兼師衆長隨事摹擬待其時至心融渾然自成始可以名大方而免夫偏執之弊矣余少喜攻詩患於多門莫知所入久而竊有見於是焉將力學以求至然猶未敢自信其説之不繆也欲求徴於識者而未暇焉同里衍斯道上人别纍年矣一日自錢塘至京師訪余鍾山之寓舍出其詩所謂獨菴集者示余其詞或閎放馳騁以發其才或優柔曲折以泄其志險易並陳濃淡迭顯蓋能兼采衆家不事拘狹觀其意亦將期於自成而為一大方者也間與之論説各相晤賞余為之拭目加異夫上人之所造如是其嘗冥契默會而自得乎抑參逰四方有得於識者之所講乎何其説之與余同也吾今可以少恃而自信矣因甚愛其詩每退直還舍輒臥讀之不厭未幾上人告旋乞為序其帙首辭而不獲乃識以區區之識而反之然昔人有以禪喻詩其要又在於悟圓轉透徹不􅍱有無言説所不能宣意匠所不可搆上人學佛者也必有以知此矣毋遄其歸尚留與共講焉送丁至恭河南省親序去年秋余解官歸江上故舊凋散爾徒殆空唯同里丁儼至恭日抱琴與余逰余愛其清雅和易且能相慰於寂寞之濵故數與燕咏嘯歌甚相樂也今年春一日至恭過余言曰家君主河南之永寧薄年老逺仕儼侍左右顧毋在又不可離輒歲一往覲去歲既往今茲將復行先生能無一言之贈乎余觀吾鄉之人俗不好逰多安於田里視去家數舍則有難色今吳距洛幾三千里必􅍱江遡淮入頴逾汴而後至況兵革之餘灌莽蕭條狐兔之迹交於塗行者非有名役必以利驅不爾不往也今至恭治裝裏糧不憚逺邁昨有二者之徇也特以㝎省久缺欲一候望顔色以釋思慕之懷可謂知所重輕矣余豈得以失相從之私而有所介然哉然獨有所感焉夫殊鄉遠别忽父子相見上堂起居之餘舉觴奉歡此人子之深碩而天下之至樂也然其得與不得則有幸不幸焉蓋自海內分崩所在梗阻子之思其親而不得見陟岵而歌望雲而歎者有不可勝數今皇上削平四方車書既同雖遐邦異壤往來若東西州然故至恭之思其親欲見即往無有關閡者實遭逢升平之時也然則人子之深碩而天下之樂者在當時人有所不能得而至恭今得之豈非由上德惠之所及哉幸逢斯時而蒙上德惠之及則為臣子者可不思所勉乎於其行遂論次為序既贈至恭且為永寧君夀云洪武四年二月日序髙太史鳬藻集卷之二
