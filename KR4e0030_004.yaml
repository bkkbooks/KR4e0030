front:
  text: 髙太史鳬藻集卷之四
  hash: sha256:247d64d5a4051090eff64f8210b3949b53918f0156798c687acc82688d7ce331
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0030_SBCK_004-1a}
body:
  text: 後學周立編輯傳五篇南宫生傳南宫生呉人偉軀幹愽渉書傳少任俠喜擊劒走馬尤善彈指飛鳥下之家素厚蔵生用周飬賔客及與少年飲博遨戯盡䘮其貲逮壮見天下亂思自樹功業乃謝酒徒去學兵得風后握竒陳法将北赱中原從豪傑計事㑹道梗周流無所合遂泝大江逰金陵入金華㑹稽諸山蒐覧瓌恠渡浙江汎具區而歸家居以氣莭聞衣冠慕之爭往迎候門止車日數十兩生亦善交無貴賤皆傾身與相接有二軍将恃武横甚數毆辱士類號虎冠其一嘗召生飲㦯曰彼酗不可近也生咲曰使酒人惡䏻勇吾将柔之矣即命駕往坐上座爲語古賢将事其人竦聽居樽下拜起爲壽至罷㑹無失儀其一甞遇生客次顧生不下已目慴生而起他日見生獨騎出從健児帶刀筞馬踵生後若将肆暴者生故緩轡當中道進不少避知生非懦儒遂引去不敢突冐訶避明旦介客詣生謝請結驩生䏻以氣服人類如此性抗直多辯好箴切友過有忤己則面數之無留怨與人論議蘄必勝然援事析理衆終莫䏻折時藩府數用師生私䇿其雋蹶多中有言生於府欲致生幕下不䏻得将中生法生以智免家雖以貧然喜事故在㦯饋酒肉立召客與飲㗖相樂四方㳺士至呉者生察其賢必與周旋款曲延譽上下所知有䘮疾不䏻􅌾療者以告生輙令削牘䟽所乏為請諸公間營具之終飲其徳不言故人皆多生謂似婁君卿原臣先而賢過之乆之稍厭事闔門寡将迎闢一室庋歷代法書周彛漢硯唐雷氏琴日逰其間以自娯素工草隷逼鍾王患求者衆遂自閟希復執茟歆慕靜退時賦詩見志怡然䖏約若将終身生姓宋名克家南宫里故自號云賛曰生之行凡三變每變而益善尚俠末矣欲奮於兵固壮然非士所先晚廼刮磨豪習隱然自将履蔵器之莭非有徳䏻之乎與夫不自知返違遠道徳者異矣杏林叟傳杏林叟姓董匿其名隱居暨陽山中不知其所自出㦯云呉神醫奉之後也甞遇異人授鍼術砭刺按摩攣舒欝通求療者皆舁至徒返欲以貲報輙謝曰吾衣食幸自給無庸是也苐令人植杏一樹舎旁曰吾聊繼吾祖志耳乆而成林鄕人不知其名目以杏林叟號焉嘗曵杖林下逍遥而歌曰杏之華其下我家杏之實其羙我食吾寜舎是兮而從人于役㦯聞之曰隱者也前楫而問曰今天下病矣子猶事醫邪盍以大鍼起大疾乎叟啞然曰我野人也惡知天下之事哉試以醫言之夫人之玩毒而忘戒嗜甘而憎苦衆口是惑而忽醫之言者在法皆不療若毉昧其難冒受厚直潰潰汩汩日視其殆而不知止者則又病者之罪人也吾誠愧焉子何欲以是浼我哉遂隱終其身賛曰雉不隱其文故麗于羅豹不蔵其斑故䧟于穽古之君子遭時否塞欲求免乎世者往往變匿其名以自雜於賤技之間若陳留老父漢隂丈人之流姓名且不得而知身丁得致邪所謂身名俱隱者上也身隱而名著者下矣杏林叟識䏻察時藝䏻濟物寜没其名以全道謂之上隱非邪胡應炎傳胡應炎字焕卿常之晉陵人宋樞宻副使宿八世孫也父聦淮南莭度計議官咸淳中應炎登進士苐授溧水尉未赴元丞相伯顔南伐師次常境知府王洙遁朝廷以姚誾知府事復命将軍王安莭都綂劉師勇将兵雜守之誾䓁至常見應炎喜曰君吾劇孟也得君敵不足破矣署莭度判官應炎歸告聦及兄應發弟應登曰吾家世受國㤙今戎馬在郊王室将危是吾立㓛之秋也父老兄弟當奉以出避吾身許國不得復徇家矣聡應發並曰吾與汝雖父子兄弟然於國則皆臣也圖報之義彼此同之豈可臨難而獨免乎乃命應登侍母及䕶妻子出城嘱曰善避以存吾宗不幸城亡吾必死之今與汝訣矣既應誾命即選民之壮勇者三千人自将乗城為誾畫曰吾州京師北門不可失守然城􅋻塹狹兵皆市人非素所撫循者而北兵鋭且衆乗勝逺來其鋒不可當恐末易與戰也宜樹木柵傳城益調粟繕械為守計誾然之𥘉洙遁時其客王虎臣盗郡印自稱知府詣伯顔軍門獻之伯顔不知其詐命還守常而遣兵與俱及城誾䓁巳先至不得入反以民叛告伯顔怒命元帥唆都率步騎二十餘萬圍之應炎與安莭師勇分門出戰各累大捷殺其将校甚衆功上進直秘閣圍且乆元兵多傷弊唆都請益師伯顔遂以西域諸部兵來㑹攻圍益急餉援俱絶唆都以柵堅不可㧞剽近野得婦人刳乳煎膏沃其上發大矢射之火熾栅焚又運機石擊樓堞盡毀食盡唆都偵知之遣使呼應炎語諭使出降應炎罵之且截𥿄縷置盂中若湯餅状者以筯引示之曰吾食甚足若欲得城需金山長也金山長盖諺語謂無其期唆都聞之曰䏻破城者金山長老也世呼寺主僧爲長老故云即趣召金山僧至軍問以攻城之筞僧不知爲計周行視城曰是城龜形也東南其首西北其尾攻尾則首愈縮其法當攻首從之城遂䧟師勇遁誾安莭死之應炎率民兵巷戰至孔子廟前衆潰猶手刃數人力屈遂就擒唆都譲之曰若即嘗多殺吾将校者邪應炎曰吾欲殺汝何将校也恨力不及耳唆都怒腰斬之時年二十七兵入屠城聦應發皆𬒳殺民匿溝中免者數人余爲児童時常聞父老言元兵取常時事甚悉及壮觀史多所未載豈蒐采有失而致然歟柳著作者有所諱避而弗録歟㦯其事多繆悠𥘉皆無有特好事者爲之說歟是皆不可知也毎竊恨焉近遇胡黼江上間爲余言其祖應炎死莭始末與余昔所聞無異斯固足徴矣夫以虎臣之奸唆都之慘與僧者妄言而幸中其事雖微猶不可使泯況應炎之忠烈毅然如是邪囙掇其語作胡應炎傳以𥙷史氏之闕云墨翁傳墨翁者呉槐市里中人也甞㳺荆椘間遇人授古造墨法囙曰吾鬻此足以資讀書奚汲汲四方乎乃㱕署門曰造古法墨躬操杵臼雖龜手黧面而形貌竒古服危冠大襦人望見咸異之時磨墨瀋數斗醉為人作徑尺字殊偉所製墨有㝎直酬弗當輙弗予故他肆之屨恒滿而其門落然客有誚之曰子之墨雖工如弗售何翁曰嘻吾之墨聚材孔良用力甚勤以其成之難故不欲售之易也今之逐利者茍作以眩俗卑賈以餌衆視之雖如玄圭試之則若土炭吾竊耻焉使吾欲售而效彼之為則是以古墨號於外而以今墨售於内所謂衒璞而市䑕腊其可乎吾既不䏻為此則無恠其即彼之多也且吾墨雖不售然視篋中則􅉳然者固在何遽戚戚為乎乃謝客閉户而歌曰守吾玄以終年視彼沽者泚然客聞之曰隱者也吾儕誦聖人之言以學古為則不䏻以實徳弸其中徒飾外以從俗徼譽者豈不愧是翁哉歎息而去齊人髙啔聞其言以足自警也遂書以為傳翁姓沈名繼孫然世罕知之唯呼為墨翁云梅莭婦傳莭婦姓梅氏平江人適廣平路総管致仕浦侯子至正十六年春淮兵南下守臣弗夙戒城遂沒婦天懼其齒之壮足以集禍也廼携婦匿旁小民家民􅊇知其有所挾心利之隂出召外兵兵入夫逸去婦為兵所得兵見其色将汚之婦曰若欲者貨耳我悉以與若若其舎我不然我有死耳終不䏻為失身人也囙探懐出其金兵持婦少懈遂乗間脱赴渠水中水淺不得死兵遂至水次以刃擬婦曰亟出否則死是水矣婦不為動兵遂舎去後至者婦面水上知其生復欲鈎出之婦力挽不肯升兵怒以戈撠其腋死焉三日夫得其尸殯于舎後廢圃中盖余與浦鄰也嗚呼婦之死莭猶臣子之死忠孝分也曷足異哉然君子之聞一事則亟書而累稱之若不得巳焉者豈非以教化不興風俗既壞人知而死者少而不死者多歟今作梅莭婦傳亦余之不得巳也悲夫賛八篇愛敬堂圖賛爾容愉愉爾儀肅肅以事以承弗離弗瀆相彼室堂在是繪圖尓有親飬繄我獨無東坡小像賛㦯置諸鑾坡玉堂㦯放之朱厓黄岡衆皆謂先生之憾余則謂先生之常先生盖進不淫退不傷凌厲萬古麾斥八荒而大肆其文章者也丹厓小像賛誦其文偉然其夫睹其貌眇焉乎儒跡晦名彰身臞道腴不翕翕以合不汲汲而趍知之者固以爲介不知者則以爲迂吁義鸛賛并序呉報㤙寺浮屠之顛有鸛二巢焉以逰以宿出返必俱一日其雄罣脛輪索中奮翼自擲空懸弗脱雌下首大鳴若籲于人衆怜之莫䏻升遂宛轉而絶雌依其傍弗去群烏欲磔之輙引喙怒逐不使近逮毛骨盡化廼巳余居直寺東甞見其彷徨飛旋形貌慘悴風雨之夕哀唳噭噭若號慕然余念夫世固有伉儷相悅者矣一旦失所天衰未改而已他適塗膏自媒唯恐非艾晨咷夕噱曽無含忸世甞以禽喻惡人寜不辱是􅔏哉廼賛曰嗟爾鸛乎維鳥之特猗雄死自守禦烏之賊猗獨棲于標夜失其匹猗哀嘶返顧不啄而食猗厥質始化豈貞之魄猗匪魯黄鵠孰配爾徳猗樹屋傭賛東都之末士大夫以危言激昂同志嫉惡攻之不勝卒搆用黨之禍然相率蹈死而不悔有不得入者則耻焉當是時申屠子龍㓕跡芒碭之間囙樹為屋自同傭人豈故與衆異趣㢤誠以大木捋顛非一繩可維故獨保其身不欲與俱靡爾可不謂明哲之士哉余嘗慕其人而不得見焉呉有隱君子字仲權者自言子龍後也元季之亂不肯仕入林屋山以樹屋傭自號余得與之㳺焉夫慕其人而不得見雖見其郷之草木猶将愛之而況其子孫乎況其徳之肖者乎乃為樹屋傭賛曰我思漢士曰維申屠遭世横潰道從而汙衆履虎尾身國同危捧土塞河區區可悲瞻彼陵阿䕃息有樹匪厭華榱弗若此固群雉在羅一鴻獨飛遐踪千齡躡焉者希有士樂潜厥徳惟似曷克似之繄若孫子陳仲昭小像賛清眸秀髯夷襟雅致早從挾筞之㳺晚佐鳴琴之治雖居簿書兩考之縻每愛泉石一丘之閟此固非漂瀬之逸人乃睢寜之隱吏也媯蜼子賛稽岳王君常宗剛正好古學甞𬒳召脩元史書成欲官之君辭㱕飬親閉門著書以媯蜼子自號好事者甞繪其像渤海髙啓為作賛曰古服古貌古學古辭際時復古其道可施暫起從徴亟歸就飬進退從容髙風孰尚烏目山樵賛繆貞字仲素虞仲之邦言㳺之里山長水深生此徳士其外雖􅋯中含道腴誦詩讀書終焉在娱箴一篇寅齋箴為禮部崔尚書作六馬既奔朽索是縻人心之危曰惟過之其危伊何難存易失操之在寅罔敢怠逸先哲有言斯禮之輿坦坦聖途由焉而趍立朝䖏室祗慎勿替如見大賔如對上帝凡百君子學用是成矧爾秩宗交于神明儼乎若思惕然若疚惟公履之永以無咎銘八篇瞻松亭銘范文正公書院有公手植二松在焉十世孫孟奎作亭其傍名曰瞻松以識追慕之意徴啓為之銘鬱彼二松魏公所植閱歲之多于堂之側維昔魏公天寔挺生好是正直為邦之楨其莭桓桓如松斯固䜛夫詆攻不改其度出入勤勞既懋乃㓛本鉅支繁庇于無窮凡知慕公百世之士躬承其遺矧爾孫子霜淒露濡油然其思孰謂公逺式瞻在茲爾瞻伊何朝夕左右視公之榮知徳之厚匪徒瞻之維以象之從公之休庶㡬永而靜學齋銘體具動靜寔惟二儀夫靜真一又動之基交軌盪摩風鼓雷應萬生芸芸而此自㝎凡人之心本寂而虗紛紜攫攘為欲所驅載馳載奔蚩蚩者子内䘮外勞莫知所止君子山立其閒其安不誘於聽不眩於觀如鑑漠然有來必酢豈彼幻徒冥黙無作木靜則夀水静則清所以為學匪靜曷成子居是名矢則先正我維銘之請直以敬端石雙硯銘靈淵閟寶世莫窺二羙孰得天所貽鏗鳴金聲縝玉姿同德齊光敢雄雌歲月研磨不磷緇神物貴合當勿離進齋銘國子助教髙君仲輝之先君子甞以進名其齋聞人碩士為言其義悉矣仲輝間復請余銘余以宗人之義不敢辭為之銘曰務前其途車必覆嗜升諸公身乃辱惟徳之躋是則㳤詩書餱粮禮為轂聖域髙逺匪可蹴由卑自邇蹈古躅跬步不巳至荒服如木在山泉出谷勿畫以退茍自足先君之志子尚朂我為銘詩敢告瀆碧泉銘并序湘多名山岳麓其最勝者靈岩仙洞往往有紺泉出焉色多紺緑邑人陳君少入山為黄冠氏甞從其師玄靜真人逰泉上囙叩以道旨真人曰我惡知道哉汝其問諸泉焉君囙留泉旁不去乆之若有所契乃以碧泉自號識所得也青丘子聞而異之曰夫道無不在也草木瓦礫皆有道而況泉乎真人亦善教哉顧陳君之所得世未㦯知也嘗試臆其旨為之銘以寄君使刻諸泉上告求道者之校焉然余非知道者幷諗於泉為何如銘曰泉之渟淵淵維道之原泉之流瀰瀰維道之施我㳺詠兮泉側我之樂兮與泉晝夜而不息存心齋銘金陵汪氏有蔵脩之室口存心介余友馬君来徴銘余嘉其得為學之要為之銘曰身一室意四維與物逰罔有時如驚狙孰可縻䘮厥宰吁其危慎乃操勿妄思天君寜恒在茲靜得齋銘婁東沈仲益氏以靜得名其蔵脩之室取程夫子詩語也渤海髙啔為作銘曰虚哉靈府其軆本靜外觸未形山止水㝎誘物而動熾情乃生喜怒愛惡與哀懼并紛紜攫攘厥宰斯䘮如驚駟奔孰制其放維彼君子䏻操使存飬其真靜為動之根周流汎觀忘己與物萬生芸芸莫不自得詠歸于雩嗟逝在川去聖雖逺微言尚傳沈君齋居従事於此碩言誰師子程伯子茟銘用欲圓軆欲劲書而執之在心正賦二篇鶴瓢賦寜真舘李髙士遇青城黄老師遺一瓢其形肖鶴刳為飲噐名曰鶴瓢甞出以飲啓囙為之賦月華子夜宿玄舘夣逰太微見一古士其状實希長頸宻齒不臞而肥苦葉𬒳體服非羽衣翩然來前自稱庖氏少生魏園長入呉市慕髙躅於烟霞離舊根於泥滓雲翼未成海路空指不食窮年濩落而巳握手終歡願託於子覺而占之既喜且驚當得異物莫測其名匪胎以化乃實而成不觧飛騫厯善鳴未足御仙客之舉但可挹聖人之清者歟案未歛䇿户響剥啄起逢老翁曵杖矍鑠逺有携而見遺乃質刳而形鶴月華子掀髯而咲曰爾青田之族赤壁之侣竟混草木而零落耶疇昔之夜吾與爾有約矣於是掃苔軒啓松閣分半壁以留棲命一壼以對酌不扄怨夜之籠不貯迴春之藥誓将共浮況於滄𬈑同上下於寥廓青丘生過之出以爲樂生誚之曰夫道貴無累始䏻有淂此盖許由棄之以全名衛公好之而䘮國吾謂子遺身而超世尚何留意而玩物月華子耳若不聞引滿欲醺拊之而歌曰昻藏兮支離爾生兮何竒行則佩兮飲則持與翺翔兮千嵗期唯㳺無何兮餘非吾之所知聞早蛩賦至正丙午五月十三日夜坐中庭聞蟋蟀之聲感而有賦龍集丙午仲月維夏祝融當衡蓐收伏駕長炎氛之興晝欣湛露之流夜於是蓮塘涵清梧舘閟靜纎絺方御輕箑未屏息號蟬之繁喧罷棲鵲之暗警何隂蛩之忽鳴窹余寐而獨省稍入户而侵幃纔縁堦而傍并若暑徂而律變簟色凄兮欲冷迅颷發兮騷騷斜漢迴兮耿耿方其㦯咽如啼㦯激如嘯喓喓孤吟嘖嘖相弔䕃淺莎之蒙籠翳深樷之窈窕巳厭聞而愈逼乍欲㝷而莫照含清啇之至音非假噐而為妙促素機之惰工亂朱瑟之哀調未連響於絡緯蹔依明於熠燿若廼靜院閒宫荒園廢驛草長幽扉苔滋壊壁候月光而未旦聽雨聲而乍夕乆棄長婺矛牙之婦逺寓窮居之客莫不對境興愁攬衣動戚謬感年之将逝誤驚寒之已積影􅈬燭而誰依泪横襟而自滴不待風凋漢苑之柳霜隕湘皐之蘭苟斯聲之接耳即掩抑而摧殘余何為而亦起荅悲韻而長嘆聞七月而在野實詩人之所志今胡早而不然豈天時之㦯異乗火令之中衰應金氣而先至推象類而占之若有兆夫兵沴然物生兮何常庸詎測夫玄意抱微憂而何言返中閨而復睡題三篇題天池圖小引呉華山有天池石壁老子枕中記云其地可度難盖古靈壌也元泰㝎間大癡黄先生逰而愛之為圖四三本而池之名益著此為其弟子李可道所畫尤得意者也温陵陳彦㢘得之求余賦詩其上㦯云此廬山天池景也余未有以辯然舊見别本張貞居題之首句云嘗讀枕中記則亦以為華山池矣前軰言貞居與大癡數同逰於此則其言信可徴初不必舎此而取彼也囙為賦長歌欲張吾郷之山水使與香鑪九老爭髙云題朱達悟傳後余舊聞達悟善恢語當其抵掌劇談雖貴富可畏人皆狎侮之然人不以為忤聞其說莫不捧腹絶倒達悟亦仰天大咲不自知其冠纓索絶也以是優㳺自終世之戚戚計得失未甞一伸眉破顔者視達悟為何如哉觀其以達悟自號豈果有所得者歟題髙士敏􅉝丑集後論文者有山林舘閣之目文豈有二哉盖居異則言異其理㦯然也今觀宗人士敏􅉝丑集有舂容温厚之辭無枯槁險薄之態豈山林舘閣者乎昔嘗有觀人之文而知其必貴者吾於士敏亦然嗟夫吾宗之衰乆矣振而大之者其在斯人歟䟦十篇䟦眉菴記後右嘉陵楊君眉菴記謂眉無用於人之身故取以自號夫女之羙者衆嫉其蛾眉士之賢者人慕其眉宇而不及口鼻耳目則眉豈輕於衆軆㦲盖衆軆皆有役眉安於其上雖無有為之事而實瞻望之所趋焉其有類乎君子者矣世方以㒒㒒為忠察察為智安重而為國之望者則以為無用楊君亦有感於是歟讀之為之太息䟦王右軍墨蹟右軍書在人間者甚少得唐人臨本已為尤物況近丗兵燹之餘圖籍掃地此卷獨存真巋然魯靈光也郭君好古必知所寳蔵矣䟦松雪臨蘭亭呉興公平生臨蘭亭最多此卷乃為錢塘仇伯夀所臨者自識曰余得意書也豈公亦嘗有未得意者邪抑以世真知其得意者少故特表而出邪䟦松雪書洛神賦趙魏公行草冩洛神賦其法雖出入王氏父子間然肆茟自得則别有天趣故其軆勢逸發真如見矯若㳺龍之入於烟霧中也䟦徐氏族譜後呉邑徐良輔懼其先徳之将泯宗黨之日踈與後世子孫之昧其所自出也乃譜其族系自太學生揆而下凡十二世合數十百人其用心亦􅌋矣間以示余余聞吾郷先正范文正公嘗言族之人雖有親踈自祖宗視之則皆子孫也故為執政日買田以贍其族今所謂義荘距良輔之居寔不逺一舎良輔亦嘗遊觀而興慕哉雖約居韋布力未得為公之為然能推其意於宗族之間慶弔以展其情燕合以辯其序閔其㓜孤周其匱乏則是譜不為虚噐矣良輔曰吾志也請書以自勉遂書于編後而歸之跋吕忠肅與魏太常喝和詩後右二詩江夏魏公在元至正間贈吕忠肅公而作忠肅荅章所謂誦君與我詩者是也方先生以愚嘗為録忠肅之詩于卷而公詩則未見焉覧者㦯未知所自公間以示啓遂請書附于左以見有唱斯和之義夫古者興運之佐多伏於衰季之世得碩望之士器遇以爲知巳者固非一人然未有如二公之相贈以言流于篇詠者也公於忠粛則期之重而無苟悅于名之辭忠肅於公則知之深而有樂天感時之意録而傳之亦可以見前軰風誼之厚也矣䟦張長史春草帖少陵觀張旭草聖極歎其妙至東坡題王逸少帖則詆張爲書工昌黎石皷歌則又詆王爲俗書是三公之言何戾耶盖王之於石皷張之於王其書固不可同語然詩人詞氣抑揚不無太過論者遂欲以爲口實未為知書者也亦未為知詩者也世人不以韓言而短王又可以蘇言而少張歟囙觀長史春草帖偶書䟦蘭亭近臨川饒氏家多法書藏蘭亭數十本晚始獲定武一刻酬以􅌋直毎有至寶難得之歎今此本𥿄墨尤舊饒巳殁惜不令一見之䟦張外史自書雜詩貞居始學書於趙文敏後得茅山碑其軆遂變故字畫清遒有唐人風格詩則出於蘇黄而雜以己語其意欲自為一家也近代浮屠之名能詩與書者雖衆然亦不能兩羙況道流之乆乏人㢤此其自書雜詩也古律行草各臻其妙宜子英之慎與而彦㢘之喜得矣䟦溝南詩後張端字希尹右溝南張先生詩若干首格律深穏不尚篆刻而往往有會理切事之語盖能寫其胸中之趣者也先生平日所著甚富此詩其子藻仲掇拾於兵燬之餘者爾然觀者如嘗旨于鼎一臠可知矣嗟夫前軰凋謝雅音寥寥幸先生猶康強方歸臥黄山之陽詠歌昇平所得當未止也藻仲尚謹録之評史六篇啇鞅范睢鞅睢之相秦也其罪同其禍則異何哉受諌不受諌也夫鞅以殘刻之資事孝公下變法之令以毒秦人至刑公子䖍黥公孫賈甞論囚而渭水盡赤盖仁民之道䘮也睢以傾危之性事昭襄王進近攻之計以亡山東之諸侯至罷穣俟廢太后逐涇陽華陽君盖親親之道㓕矣然睢聞蔡澤之言則謝病而歸卒完首領鞅聞趙良之說則貪啇於之富寵秦國之政徘徊而不忍去卒受車裂之慘二人者雖皆不足言然以此則睢為猶勝哉嗚呼進退禍福之㡬觀鞅睢之事後之人亦可以少鍳矣四公子余甞恠四公子好客而所飬皆縦横㳺俠之流故其㓛烈之卑如此使得天下之賢而禮之則其所就何如㦲及觀其書門無招諌執轡屠市與比食謝躄之事雖不皆中於道然其屈己下人之意可稱矣又觀其客汙隱困阨以待知己一遇稍薄則相率而去之雖不皆合於義然其忘人重己之意可尚矣後之時君與士大夫固皆耻之相與言曰我所求者道徳之士也曰我所學者聖賢之徒也然而下人者未甚至重己者弗甚䔍則是名過而實不及也可勝歎㢤樊噲樊噲武夫也嘗携劍摧鋒從沛公以芸菑墾害人所壯之者不過以其能脱戯下之急爾余竊以噲有可賢者焉𥘉沛公之入咸陽也見秦之宫室帷帳寳貨婦女欲留居之囙噲之諌遂遷屯霸上不然則逸欲遽生蹈亡秦之覆轍何以慰父老之心起范増之畏而觧項籍之怒乎恐漢之為漢未可知也史言當時諸将皆爭取金帛財物蕭何獨先入收丞相府圖籍藏之觀噲之䏻諌上則其不為是可知矣及髙帝既老嘗有疾惡見人詔戸者無得入群臣何雖為相亦莫知為計也噲排闥而入見上獨枕一宦者臥囙流涕以片言悟之其憂深慮逺有可為大臣者矣豈絳灌䓁比邪而㦯者乃以帝嘗欲殺噲恐百歲後從吕氏叛也嗟夫噲起屠狗以至封侯亦足矣況其賢如是乎且帝素少㤙又何有於一噲論者誠刻矣㢤羊祜昔夏桀不道湯使伊尹往問就之盖謂桀雖暴虐䏻用伊尹則其民有蘇息之惠而我無往誅之勞五往而桀卒至不用乃知桀之惡終不可改故不得巳而伐之聖人之志在救民而非富天下也如此自三代而下一以㓛利相侵奪欲求其彷彿先王之道者蔑矣而羊祜之守襄陽獨䏻以徳熏其鄰毎用兵刻曰方戰不為掩襲之計諸将有欲進譎計者則飲以醇酒不使得言軍行呉境刈糓為粮皆計所侵送絹償之每逰獵常止晉地所得禽獸㦯先為呉人所傷者皆送還之於是輕裘緩帶雍容鈴閤而信義之風藹然𬒳於江漢之間余固甞善之謂其非以功利相侵奪者比也及觀枯入朝力陳伐呉之計且謂張華曰成吾志者子也祜之志果為救民乎抑為滅吳乎亦滅呉而巳耳盖祐之言曰孫皓暴虐己甚于今可不戰而克若皓殁更立令主則雖有百萬之衆長江未可窺也夫皓可伐也枯直陳其惡勸武帝以援江左之民於燔溺豈不偉然哉廼汲汲以皓殁為憂則是幸其虐以為己利且夫幸人之虐以為己利則豈仁者之心哉仁者一視而同仁彼之民猶我之民也其君虐之邪我則往救之其君安之邪我亦可巳矣又何必俘其君籍其民然後為得哉枯之志未免於此則其去以功利相侵奪者何遠焉㦯曰如子之言則是呉終不可滅而晋終不䏻一天下也其可乎余曰王者在徳􅌋薄不在地之大小也晉雖兼南北以有之不旋踵而内禍四出果何在於一不一乎隋文帝嘗将伐陳命大作戰船人請宻之帝曰吾将顯行天誅何宻之有使投其棹於江曰彼若懼而䏻改吾復何求夫隋文帝雖未足為賢主然此一言亦可以王矣祜之致其君固不䏻及湯又不䏻如隋文乎雖然祜嘗與陸抗對壘䏻使抗飲其藥而不疑則祜亦賢矣余之言盖所以責賢者乃春秋之意也衞瓘瓘之死人常哀之以其忠也余曰殺瓘者非后也天也何以知其然也盖不祥莫大於無罪況有㓛乎𥘉鍾㑹鄧艾之西伐也瓘實監其軍蜀既滅㑹欲叛遂誣艾以叛㑹之志司馬昭知之欲悌知之賈充亦知之豈有智如瓘而不知耶瓘不知㑹之欲叛又不知艾之不叛耶使瓘於是時不附㑹議宻明於朝則艾可以不死艾不死則㑹無䏻為矣不知出此乃以小憾遂收艾以成㑹之惡亦云過哉及㑹敗而艾出又恐艾讎己則追殺之於綿竹瓘之賊禍如此蒼蒼者所以不赦而假手於一婦人也豈以撫牀致之㢤且怨艾者田續也而瓘族之怨瓘榮晦也而人亦使之艾之死及其子瓘之死及其孫則天之報相符可信矣不然豈有為臣忠而受禍若是烈者乎李泌甚矣小人之凶人國也天下之至親䔍愛出於天性而不可以言間計奪者莫父子若也然其變往往有至於殺其子而不疑弑其父而不顧者何哉小人間使之也沙丘之禍成於李兊湖城之恨發於江充若潘乙楊素之流又不可以悉數盖小人懐傾險之情挾奸亂之術居人父子間投隙抵罅常幸其有事以茍一切之富貴故必以刹蠱人子以害脅人父挾讎所親而嫉所愛一為所惑則父不得為慈父子不得為孝子夫父不慈而子不孝則人道㓕矣豈有人道㓕而可以為國乎此小人之所以必去而勿用也甞觀之於唐太宗賢也而承乾不䏻全其生玄宗明也而子瑛不克盡其死至於肅宗之昏孱徳宗之猜忌而太子卒得以不動者果誰之力哉一李泌而已耳當是時倓有功也而李輔國嫉之誦無過也而張延賞搆之二子盖岌岌矣賴泌居其間左右彌縫上下歡悅累數千言皆出於至誠盡忠之意委曲剴到悽惋惻怛有足以感人者故聽之䜛疑之跡廓然而雲銷渙然而氷釋既悔且悟不覺其泣下之霑襟也廼知天性之良有終非小人之所䏻掩者特患無君子以發之耳苟皆得泌則天下豈有相弑殺之禍㢤昔曹公以丁儀之譛亦欲廢其子問於賈詡詡不對公問其故詡曰属有所思故未即對耳公曰何思詡曰思袁本𥘉劉景升父子也公大咲而罷盖曹公智者也故雖聞他人之事而有悟有不待於辭之畢若二君者亦嘗親厄於其身親覩於其目矣然至於此非泌之反覆善諌則猶未必其國本之不揺也然則君無曹公之智臣無李泌之忠而小人是信則雖父子猶不䏻自保可不慎哉髙太史鳬藻集卷之四
